              <input value={t.label} onChange={e=>updShift(t.id,"label",e.target.value)} style={{flex:1}}/>
              <span className="tag" style={{background:t.color+"20",color:t.color,border:`1px solid ${t.color}40`,minWidth:80,justifyContent:"center"}}>{t.label}</span>
              <button className="btn-red" onClick={()=>removeShift(t.id)}>✕</button>
            </div>
          ))}
          <button className="btn-ghost btn-sm" onClick={addShift} style={{marginTop:8}}>+ הוסף סוג</button>
        </div>
      )}

      {tab==="templates"&&(
        <div>
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            {qt.map(t=>(
              <button key={t.id} className={selectedTpl===t.id?"btn-gold btn-sm":"btn-ghost btn-sm"} onClick={()=>setSelectedTpl(t.id)}>{t.name}</button>
            ))}
            <button className="btn-ghost btn-sm" onClick={()=>{const id=uid();setQt(ts=>[...ts,{id,name:"תבנית חדשה",lines:[]}]);setSelectedTpl(id);}}>+ תבנית חדשה</button>
          </div>
          {selectedTpl&&(()=>{
            const tpl=qt.find(t=>t.id===selectedTpl);if(!tpl)return null;
            return(
              <div className="card">
                <div style={{marginBottom:12}}>
                  <Lbl>שם תבנית</Lbl>
                  <input value={tpl.name} onChange={e=>setQt(ts=>ts.map(t=>t.id===selectedTpl?{...t,name:e.target.value}:t))}/>
                </div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:10}}>
                  <thead><tr style={{borderBottom:"1px solid var(--border)"}}>
                    {["תיאור","כמות","יחידה","מחיר",""].map(h=><th key={h} style={{textAlign:"right",padding:"5px 4px",color:"var(--muted)",fontWeight:700}}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {tpl.lines.map(l=>(
                      <tr key={l.id} style={{borderBottom:"1px solid var(--border)22"}}>
                        <td style={{padding:"3px"}}><input value={l.desc} onChange={e=>updTplLine(selectedTpl,l.id,"desc",e.target.value)} style={{padding:"4px 6px"}}/></td>
                        <td style={{padding:"3px",width:60}}><input type="number" value={l.qty} onChange={e=>updTplLine(selectedTpl,l.id,"qty",e.target.value)} style={{padding:"4px 6px"}}/></td>
                        <td style={{padding:"3px",width:80}}><input value={l.unit} onChange={e=>updTplLine(selectedTpl,l.id,"unit",e.target.value)} style={{padding:"4px 6px"}}/></td>
                        <td style={{padding:"3px",width:90}}><input type="number" value={l.price} onChange={e=>updTplLine(selectedTpl,l.id,"price",e.target.value)} style={{padding:"4px 6px"}}/></td>
                        <td style={{padding:"3px"}}><button className="btn-red" onClick={()=>removeTplLine(selectedTpl,l.id)}>✕</button></td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot><tr><td colSpan={3} style={{padding:"6px 4px",fontWeight:700}}>סה"כ תבנית</td>
                    <td style={{fontWeight:900,color:"var(--gold)",padding:"6px 4px"}}>{fmtMoney(tpl.lines.reduce((s,l)=>s+l.qty*l.price,0))}</td><td/></tr></tfoot>
                </table>
                <button className="btn-ghost btn-sm" style={{marginBottom:12}} onClick={()=>addTplLine(selectedTpl)}>+ הוסף שורה</button>
                <br/>
                <button className="btn-gold btn-sm" onClick={saveTpls}>💾 שמור תבניות</button>
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

function NewProjectModal({onClose,onAdd,nextNum}){

  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const submit=()=>{
    if(!form.name)return;
    const pn=String(nextNum).padStart(3,"0");
    onAdd({id:uid(),projectNumber:pn,...form,progress:0,shootDate:"",offlineScreening:"",onlineScreening:"",deliveryDate:"",statusNote:"",budgetPlanned:0,budgetActual:0,tasks:[],shifts:[],hours:[],quotes:[],plan:{crew:[],milestones:[],notes:""}});
    onClose();

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:800,fontSize:18,marginBottom:20}}>פרויקט חדש #{String(nextNum).padStart(3,"0")}</div>
        <div className="frow">
          <div className="fcol"><Lbl>שם הפרויקט *</Lbl><input value={form.name} onChange={f("name")} autoFocus/></div>

        <div className="frow">
          <div className="fcol"><Lbl>מפיקה אחראית</Lbl><input value={form.producer} onChange={f("producer")}/></div>
          <div className="fcol">
            <Lbl>סטטוס</Lbl>
            <select value={form.status} onChange={f("status")}>
              {Object.entries(STATUS_CFG).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginBottom:14}}><Lbl>תיאור</Lbl><textarea value={form.description} onChange={f("description")} style={{minHeight:60}}/></div>

          <button className="btn-gold" onClick={submit}>✓ צור פרויקט</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function App({initialData}){
  const [data,setData]=useState(initialData);
  const {users,projects,passwords,shiftTypes,quoteTemplates,nextProjNum,hoursReport,projectHours}=data;

  const upd=patch=>setData(d=>({...d,...patch}));
  const updateProject=p=>upd({projects:data.projects.map(x=>x.id===p.id?p:x)});
  const addProject=p=>upd({projects:[...data.projects,p],nextProjNum:(data.nextProjNum||1)+1});
  const addQuote=(pid,q,update)=>{
    upd({projects:data.projects.map(p=>{
      if(p.id!==pid)return p;
      if(update){return{...p,quotes:(p.quotes||[]).map(x=>x.id===q.id?q:x)};}
      return{...p,quotes:[...(p.quotes||[]),q]};
    })});
  };

  const [currentUser,setCurrentUser]=useState(null);
  const [view,setView]=useState("dashboard");
  const [selProjId,setSelProjId]=useState(null);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [showNewProj,setShowNewProj]=useState(false);

  // Persist
  useEffect(()=>{saveLocal(data);},[data]);

  // Auto-sync with Sheets on load
  useEffect(()=>{
    const url=getSheetsUrl();
    if(!url||!currentUser)return;
    (async()=>{
      try{
        const [projs,pws,staff,hoursRep,projHrs]=await Promise.all([
          sheetsCall(url,{action:"getAll",sheet:"projects"}),
          sheetsCall(url,{action:"getAll",sheet:"passwords"}),
          sheetsCall(url,{action:"getAll",sheet:"staff"}),
          sheetsCall(url,{action:"getAll",sheet:"hours_report"}),
          sheetsCall(url,{action:"getAll",sheet:"project_hours"}),
        ]);
        const patch={};
        if(projs&&projs.length)patch.projects=projs.map(r=>({tasks:[],shifts:[],hours:[],quotes:[],plan:{crew:[],milestones:[],notes:""},...mapProjectRow(r)}));
        if(pws&&pws.length)patch.passwords=pws.map(mapPasswordRow);
        if(staff&&staff.length)patch.users=staff.map(mapStaffRow);
        if(hoursRep&&hoursRep.length)patch.hoursReport=hoursRep.map(mapHoursReportRow);
        if(projHrs&&projHrs.length)patch.projectHours=projHrs.map(mapProjectHoursRow);
        if(Object.keys(patch).length)upd(patch);
      }catch{}
    })();
  },[currentUser]);

  if(!currentUser)return(<><GS/><Login users={users} onLogin={u=>{setCurrentUser(u);setView("dashboard");}}/></>);

  const isAdmin=currentUser.role==="admin";
  const isProd=currentUser.role==="producer";
  const selProj=projects.find(p=>p.id===selProjId);
  const goto=id=>{setView(id);setSelProjId(null);setSidebarOpen(false);};
  const gotoProj=id=>{setSelProjId(id);setView("project");setSidebarOpen(false);};

  const NAV=[
    {id:"dashboard",icon:"⬛",label:"לוח בקרה"},
    {id:"calendar", icon:"📅",label:"לוח שבועי"},
    ...(isAdmin||isProd?[{id:"projects",icon:"🎬",label:"פרויקטים"}]:[]),
    {id:"hours",    icon:"⏱", label:"שעות"},
    ...(isAdmin||isProd?[{id:"quotes",icon:"📝",label:"הצעות מחיר"},{id:"reports",icon:"📊",label:"דוחות"}]:[]),
    {id:"vault",    icon:"🔐",label:"סיסמאות"},
    ...(isAdmin?[{id:"users",icon:"👥",label:"משתמשים"},{id:"sheets",icon:"☁️",label:"Google Sheets"},{id:"backup",icon:"💾",label:"גיבוי"},{id:"settings",icon:"⚙️",label:"הגדרות"}]:[]),
  ];

  const Sidebar=({mobile})=>(
    <aside style={{background:"var(--surf)",borderLeft:"1px solid var(--border)",padding:"18px 10px",display:"flex",flexDirection:"column",gap:2,width:mobile?"100%":220,height:"100vh",overflowY:"auto",flexShrink:0,position:mobile?"fixed":"sticky",inset:mobile?0:"auto",top:0,zIndex:mobile?900:"auto"}}>
      <div style={{padding:"0 6px 16px",borderBottom:"1px solid var(--border)",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontWeight:900,fontSize:19,color:"var(--gold)"}}>🎞 PostFlow</div>
          <div style={{fontSize:10,color:"var(--muted)"}}>v7.0</div>
        </div>
        {mobile&&<button className="btn-ghost btn-sm" onClick={()=>setSidebarOpen(false)}>✕</button>}
      </div>
      <div style={{padding:"6px 8px 12px",borderBottom:"1px solid var(--border)",marginBottom:6}}>
        <div style={{fontWeight:700,fontSize:13}}>{currentUser.name}</div>
        <div style={{marginTop:4}}><RoleBadge role={currentUser.role}/></div>
        <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>{currentUser.email}</div>
      </div>
      {NAV.map(n=>(
        <div key={n.id} className={`nav-item${view===n.id&&!selProjId?" active":""}`} onClick={()=>goto(n.id)}>
          <span>{n.icon}</span>{n.label}
        </div>
      ))}
      {(isAdmin||isProd)&&projects.filter(p=>p.status==="active").length>0&&(
        <>
          <div style={{fontSize:10,color:"var(--muted)",padding:"10px 8px 3px",fontWeight:700,letterSpacing:1}}>פעיל</div>
          {projects.filter(p=>p.status==="active").map(p=>(
            <div key={p.id} className={`nav-item${selProjId===p.id?" active":""}`} style={{fontSize:11,padding:"7px 10px"}} onClick={()=>gotoProj(p.id)}>
              <span className="pulse" style={{width:6,height:6,borderRadius:"50%",background:"var(--green)",display:"inline-block",flexShrink:0}}/>
              <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
            </div>
          ))}
        </>
      )}
      <div style={{marginTop:"auto",paddingTop:12,borderTop:"1px solid var(--border)",display:"flex",flexDirection:"column",gap:8}}>
        {isAdmin&&<button className="btn-green btn-sm" style={{width:"100%"}} onClick={()=>{
          const rows=[["מספר","שם","לקוח","מפיקה","סטטוס","הקרנה","הערות"]];
          projects.filter(p=>p.status!=="cancelled"&&p.status!=="completed").forEach(p=>rows.push([p.projectNumber||"",p.name,p.client,p.producer,STATUS_CFG[p.status]?.label||"",p.onlineScreening||"",p.statusNote||""]));
          dlCSV(rows,`סטטוסים_${todayStr()}.csv`);
        }}>📤 יצוא סטטוסים</button>}
        <button className="btn-ghost btn-sm" style={{width:"100%"}} onClick={()=>{setCurrentUser(null);localStorage.removeItem(REMEMBER_KEY);}}>🚪 התנתקות</button>
      </div>
    </aside>
  );

  return(
    <>
      <GS/>
      <div style={{display:"flex",minHeight:"100vh"}}>
        <div className="desktop-sidebar" style={{display:"flex",flexShrink:0,width:220}}><Sidebar/></div>
        {sidebarOpen&&<><Sidebar mobile/><div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:899}} onClick={()=>setSidebarOpen(false)}/></>}

        <main style={{flex:1,padding:"24px 22px 90px",overflowY:"auto",minWidth:0}}>
          {/* Top bar */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22,flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <button className="btn-ghost btn-sm" style={{display:"none"}} onClick={()=>setSidebarOpen(true)} id="mob-menu">☰</button>
              {(isAdmin||isProd)&&view==="projects"&&<SmartSearch projects={projects} onSelect={gotoProj}/>}
              {!["projects"].includes(view)&&<div style={{fontSize:12,color:"var(--muted)"}}>{new Date().toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"})}</div>}
            </div>
            {isAdmin&&(
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {view==="projects"&&<button className="btn-gold btn-sm" onClick={()=>setShowNewProj(true)}>+ פרויקט חדש</button>}
              </div>
            )}
          </div>

          {/* Views */}
          {view==="project"&&selProj
            ?<ProjectDetail project={selProj} user={currentUser} users={users} onChange={proj=>{updateProject(proj);if(getSheetsUrl())sheetsPost(getSheetsUrl(),{action:"update",sheet:"projects",id:proj.id,row:proj}).catch(()=>{});}} onBack={()=>{setSelProjId(null);setView("projects");}}/>
            :view==="dashboard"?<Dashboard projects={projects} user={currentUser} users={users} onSelect={gotoProj} onGoto={goto}/>
            :view==="calendar" ?<WeeklyCalendar projects={projects} user={currentUser} users={users} onUpdateProject={p=>{updateProject(p);if(getSheetsUrl())sheetsPost(getSheetsUrl(),{action:"update",sheet:"projects",id:p.id,row:p}).catch(()=>{});}}/>
            :view==="projects"&&(isAdmin||isProd)?<ProjectsList projects={projects} user={currentUser} onSelect={gotoProj} onNew={()=>setShowNewProj(true)}/>
            :view==="hours"   ?<HoursLog projects={projects} user={currentUser} users={users} onChange={updateProject} sheetsUrl={getSheetsUrl()}/>
            :view==="quotes"  ?<QuoteBuilder projects={projects} users={users} quoteTemplates={quoteTemplates} onSave={addQuote} onUpdateTemplates={t=>upd({quoteTemplates:t})} onAddProject={addProject}/>
            :view==="reports" ?<Reports projects={projects} users={users} sheetsUrl={getSheetsUrl()}/>
            :view==="vault"   ?<PasswordVault passwords={passwords} onUpdate={p=>upd({passwords:p})} currentUser={currentUser}/>
            :view==="users"   ?<UserMgmt users={users} onUpdate={u=>upd({users:u})} currentUser={currentUser}/>
            :view==="sheets"  ?<SheetsSettings projects={projects} passwords={passwords} users={users}
                onProjectsLoaded={p=>upd({projects:p})}
                onPasswordsLoaded={p=>upd({passwords:p})}
                onStaffLoaded={u=>upd({users:u})}
                onHoursReportLoaded={h=>upd({hoursReport:h})}
                onProjectHoursLoaded={h=>upd({projectHours:h})}/>
            :view==="backup"  ?<BackupPanel users={users} projects={projects} passwords={passwords} onRestore={d=>{upd({users:d.users||users,projects:d.projects||projects,passwords:d.passwords||passwords});}}/>
            :view==="settings"?<Settings quoteTemplates={quoteTemplates} onUpdateTemplates={t=>upd({quoteTemplates:t})} shiftTypes={shiftTypes||SHIFT_TYPES} onUpdateShiftTypes={st=>upd({shiftTypes:st})}/>
            :null
          }
        </main>
      </div>

      {/* Mobile bottom nav */}
      <div className="mob-bar">
        <button className="mob-btn" onClick={()=>setSidebarOpen(true)}>☰<span>תפריט</span></button>
        {NAV.slice(0,4).map(n=>(
          <button key={n.id} className={`mob-btn${view===n.id?" active":""}`} onClick={()=>goto(n.id)}>
            {n.icon}<span>{n.label}</span>
          </button>
        ))}
      </div>

      {showNewProj&&<NewProjectModal onClose={()=>setShowNewProj(false)} onAdd={p=>{addProject(p);gotoProj(p.id);}} nextNum={nextProjNum||1}/>}
    </>
  );
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
function AppLoader(){
  const [initData,setInitData]=useState(null);
  useEffect(()=>{
    (async()=>{
      if(typeof Splash!=="undefined")Splash.set(20,"טוען נתונים...");
      const local=loadLocal();
      if(typeof Splash!=="undefined")Splash.set(50,"בודק Google Sheets...");
      const url=getSheetsUrl();
      if(url){
        try{
          const [projs,pws,staff,hoursRep,projHours]=await Promise.all([
            sheetsCall(url,{action:"getAll",sheet:"projects"}),
            sheetsCall(url,{action:"getAll",sheet:"passwords"}),
            sheetsCall(url,{action:"getAll",sheet:"staff"}),
            sheetsCall(url,{action:"getAll",sheet:"hours_report"}),
            sheetsCall(url,{action:"getAll",sheet:"project_hours"}),
          ]);
          if(typeof Splash!=="undefined")Splash.set(85,"מעבד נתונים...");
          const patch={};
          if(projs&&projs.length)patch.projects=projs.map(r=>({tasks:[],shifts:[],hours:[],quotes:[],plan:{crew:[],milestones:[],notes:""},...mapProjectRow(r)}));
          if(pws&&pws.length)patch.passwords=pws.map(mapPasswordRow);
          if(staff&&staff.length){
            patch.users=staff.map(mapStaffRow);
            const maxNum=Math.max(0,...(patch.projects||local.projects||[]).map(p=>parseInt(p.projectNumber||0)||0));
            patch.nextProjNum=maxNum+1;
          }
          if(hoursRep&&hoursRep.length)patch.hoursReport=hoursRep.map(mapHoursReportRow);
          if(projHours&&projHours.length)patch.projectHours=projHours.map(mapProjectHoursRow);
          setInitData({...local,...patch});
        }catch{setInitData(local);}
      }else{setInitData(local);}
      if(typeof Splash!=="undefined")Splash.set(100,"מוכן!");
      setTimeout(()=>{if(typeof Splash!=="undefined")Splash.hide();},400);
    })();
  },[]);
  if(!initData)return null;
  return <App initialData={initData}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppLoader/>);
</script>
</body>
</html>
