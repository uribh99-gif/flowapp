// Sync all 4 project schedule dates to Calendar
async function syncProjectDatesToCalendar(proj, prevProj) {
  const fields = [
    { key: "shootDate",        icon: "🎬", label: "יום צילום" },
    { key: "offlineScreening", icon: "🖥",  label: "הקרנת אופליין" },
    { key: "onlineScreening",  icon: "📡", label: "הקרנת אונליין" },
    { key: "deliveryDate",     icon: "📦", label: "הגשה" }
  ];
  const ids = { ...(proj.calendarEventIds || {}) };
  const location = getStudioLocation();

  for (const { key, icon, label } of fields) {
    const date = proj[key] || "";
    const prevDate = prevProj ? (prevProj[key] || "") : "";
    const eventId = ids[key] || null;
    const summary = `${icon} ${proj.name} — ${label}`;
    const desc = `פרויקט: ${proj.name}\nלקוח: ${proj.client||""}\nמפיקה: ${proj.producer||""}`;

    if (!date) {
      // Date removed → delete event
      if (eventId) { await gcalDeleteEvent(eventId); ids[key] = null; }
      continue;
    }
    if (!eventId) {
      // New event
      const newId = await gcalCreateEvent({ summary, description: desc, date, location });
      if (newId) ids[key] = newId;
    } else if (date !== prevDate) {
      // Date changed → update
      await gcalUpdateEvent(eventId, { summary, description: desc, date, location });
    }
    // else: same date, nothing to do
  }
  return ids; // return updated map
}
