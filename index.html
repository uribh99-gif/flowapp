  const role=u.role||"worker";

function loadLocal(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return defData();
    const d=JSON.parse(raw);
    if(!d||typeof d!=="object")return defData();
    const def=defData();
    return{
      users:          Array.isArray(d.users)&&d.users.length           ?d.users          :def.users,
      projects:       Array.isArray(d.projects)                         ?d.projects       :def.projects,
      passwords:      Array.isArray(d.passwords)                        ?d.passwords      :def.passwords,
      shiftTypes:     Array.isArray(d.shiftTypes)&&d.shiftTypes.length  ?d.shiftTypes     :def.shiftTypes,
      quoteTemplates: Array.isArray(d.quoteTemplates)&&d.quoteTemplates.length?d.quoteTemplates:def.quoteTemplates,
      nextProjNum:    typeof d.nextProjNum==="number"                   ?d.nextProjNum    :def.nextProjNum,
      logoUrl:        typeof d.logoUrl==="string"                       ?d.logoUrl        :def.logoUrl,

      globalShifts:   Array.isArray(d.globalShifts)                     ?d.globalShifts   :def.globalShifts,
    };
  }catch(e){console.warn("loadLocal error",e);return defData();}
}

// ── DatePicker — יומן מובנה עברי ──────────────────────────────
function DatePicker({value,onChange,placeholder,style}){
  const [open,setOpen]=useState(false);
  const [viewDate,setViewDate]=useState(()=>{
    if(value){const d=new Date(value);return isNaN(d)?new Date():d;}
    return new Date();
  });
  const ref=useRef();
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);

  const year=viewDate.getFullYear(),month=viewDate.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const HEB_MONTHS=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  const today=todayStr();

  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  const selectDay=d=>{
    const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    onChange(ds);setOpen(false);
  };

  const displayVal=value?new Date(value+"T00:00:00").toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit",year:"numeric"}):"";

  return(<div ref={ref} style={{position:"relative",...(style||{})}}>
    <div style={{display:"flex",gap:0}}>
      <input readOnly value={displayVal} placeholder={placeholder||"בחר תאריך"} onClick={()=>setOpen(x=>!x)} style={{cursor:"pointer",caretColor:"transparent"}}/>
      <button onClick={()=>setOpen(x=>!x)} style={{marginRight:-1,background:"var(--card2)",border:"1px solid var(--border)",borderRadius:"0 8px 8px 0",borderRight:"1px solid var(--border)",color:"var(--gold)",padding:"0 10px",cursor:"pointer",fontSize:14}}>📅</button>
    </div>
    {open&&<div style={{position:"absolute",top:"calc(100% + 4px)",right:0,zIndex:500,background:"var(--card)",border:"1px solid var(--border2)",borderRadius:12,padding:14,minWidth:260,boxShadow:"0 8px 32px rgba(0,0,0,.6)"}}>
      {/* header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick={()=>setViewDate(new Date(year,month-1,1))} style={{background:"none",border:"none",color:"var(--gold)",cursor:"pointer",fontSize:16,padding:"2px 8px"}}>›</button>
        <div style={{fontWeight:800,fontSize:13}}>{HEB_MONTHS[month]} {year}</div>
        <button onClick={()=>setViewDate(new Date(year,month+1,1))} style={{background:"none",border:"none",color:"var(--gold)",cursor:"pointer",fontSize:16,padding:"2px 8px"}}>‹</button>
      </div>
      {/* day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
        {["א","ב","ג","ד","ה","ו","ש"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:"var(--muted)",fontWeight:700,padding:"2px 0"}}>{d}</div>)}
      </div>
      {/* days grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const isToday=ds===today,isSel=ds===value;
          const dayOfWeek=new Date(year,month,d).getDay();
          const isWkndDay=dayOfWeek===5||dayOfWeek===6;
          return<div key={i} onClick={()=>selectDay(d)} style={{
            textAlign:"center",padding:"5px 2px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:isSel||isToday?800:400,
            background:isSel?"var(--gold)":isToday?"var(--gold)25":"transparent",
            color:isSel?"#07090f":isToday?"var(--gold)":isWkndDay?"var(--orange)":"var(--text)",
            border:isToday&&!isSel?"1px solid var(--gold)40":"1px solid transparent",
          }} onMouseEnter={e=>e.target.style.background=isSel?"var(--gold)":"var(--border)"} onMouseLeave={e=>e.target.style.background=isSel?"var(--gold)":isToday?"var(--gold)25":"transparent"}>{d}</div>;
        })}
      </div>
      {/* footer */}
      <div style={{display:"flex",gap:8,marginTop:10,paddingTop:8,borderTop:"1px solid var(--border)"}}>
        <button className="btn-ghost btn-sm" style={{flex:1}} onClick={()=>{onChange(today);setOpen(false);}}>היום</button>
        {value&&<button className="btn-ghost btn-sm" onClick={()=>{onChange("");setOpen(false);}}>נקה</button>}
      </div>
    </div>}
  </div>);
}

// Task Chips — multi-select
function TaskChips({shiftTypes,selected,onChange}){
  const sts=shiftTypes||DEF_SHIFT_TYPES;

  const syncSettingsToSheets=async(key,value,label)=>{
    const url=getSheetsUrl();if(!url)return;
    const v=typeof value==="object"?JSON.stringify(value):String(value);
    return sheetsPost(url,{action:"upsertSetting",sheet:"settings",row:{key,value:v,label,updatedAt:new Date().toISOString().slice(0,19).replace("T"," ")}});
  };
  const pullSettingsFromSheets=async()=>{
    const url=getSheetsUrl();if(!url)return null;
    const r=await sheetsPost(url,{action:"getAll",sheet:"settings"}).catch(()=>null);
    if(!r||!r.data)return null;
    const patch={};
    r.data.forEach(row=>{
      if(row.key==="shiftTypes"&&row.value){try{const st=JSON.parse(row.value);if(Array.isArray(st)&&st.length)patch.shiftTypes=st;}catch{}}
      if(row.key==="logoUrl"&&row.value)patch.logoUrl=row.value;
    });
    if(Object.keys(patch).length)upd(patch);
    return patch;
  };
  const onSaveShiftTypesToSheets=st=>syncSettingsToSheets("shiftTypes",st,"סוגי משמרות");
  const onSyncUser=u=>{
    const url=getSheetsUrl();if(!url)return;
    sheetsPost(url,{action:"upsert",sheet:"staff",id:u.id,row:u}).catch(()=>{});
  };
  const toggle=id=>{if(selected.includes(id))onChange(selected.filter(x=>x!==id));else onChange([...selected,id]);};
  return(<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
    {sts.map(t=>{const sel=selected.includes(t.id);return(
      <div key={t.id} className={`chip${sel?" sel":""}`}
        style={{color:sel?t.color:"var(--muted2)",borderColor:sel?t.color:"var(--border)",background:sel?t.color+"20":"transparent"}}
        onClick={()=>toggle(t.id)}>
        {sel&&"✓ "}{t.label}
      </div>
    );})}
  </div>);
}

// LOGIN
// ══════════════════════════════════════════
function Login({users,logoUrl,onLogin}){
  const saved=useMemo(()=>{try{return JSON.parse(localStorage.getItem(REMEMBER_KEY)||"null");}catch{return null;}},[]);
  const [selName,setSelName]=useState(saved?.name||"");
  const [pass,setPass]=useState(saved?.pass||"");
  const [showPw,setShowPw]=useState(false);
  const [remember,setRemember]=useState(!!saved);
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [screen,setScreen]=useState("login"); // "login" | "forgot"
  const [forgotName,setForgotName]=useState("");
  const [forgotMsg,setForgotMsg]=useState("");
  const [nameOpen,setNameOpen]=useState(false);
  const nameRef=useRef();
  useEffect(()=>{const h=e=>{if(nameRef.current&&!nameRef.current.contains(e.target))setNameOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);

  const activeUsers=useMemo(()=>users.filter(u=>u.active!=="false"&&u.active!=="0"),[users]);
  const filteredNames=useMemo(()=>{if(!selName.trim())return activeUsers;const lq=selName.toLowerCase();return activeUsers.filter(u=>(u.name||"").toLowerCase().includes(lq));},[selName,activeUsers]);

  // כניסה אוטומטית
  useEffect(()=>{
    if(!saved?.name||!saved?.pass)return;
    const u=activeUsers.find(u=>u.name===saved.name&&u.password===saved.pass);
    if(u)onLogin({...u,role:u.role||"worker"});
  // eslint-disable-next-line
  },[]);

  const doLogin=(user)=>{
    if(remember)localStorage.setItem(REMEMBER_KEY,JSON.stringify({name:user.name,pass:user.password}));
    else localStorage.removeItem(REMEMBER_KEY);
    onLogin(user);
  };

  const submit=async()=>{
    setErr("");setBusy(true);
    await new Promise(r=>setTimeout(r,220));
    const u=activeUsers.find(u=>u.name===selName&&u.password===pass);
    if(!u){setErr("שם משתמש או סיסמה שגויים");setBusy(false);return;}
    doLogin(u);setBusy(false);
  };

  const enterGuest=()=>onLogin({id:"guest",name:"אורח",role:"guest",email:"",password:"",active:"true"});

  if(screen==="forgot") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div className="card fade" style={{width:"min(380px,95vw)",padding:36}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          {logoUrl?<img src={logoUrl} id="appLogo" style={{height:48,objectFit:"contain",borderRadius:8,marginBottom:10}} alt="logo"/>:<div style={{fontSize:32,marginBottom:6}}>🎞</div>}
          <div style={{fontWeight:900,fontSize:20,color:"var(--gold)"}}>שכחתי סיסמה</div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>פנה למנהל המערכת לאיפוס</div>
        </div>
        {!forgotMsg?<>
          <div style={{marginBottom:12}}><Lbl>שם שלך</Lbl>
            <select value={forgotName} onChange={e=>setForgotName(e.target.value)}>
              <option value="">— בחר שם —</option>
              {activeUsers.map(u=><option key={u.id} value={u.name}>{u.name}</option>)}
            </select>
          </div>
          <button className="btn-gold" style={{width:"100%",padding:11}} onClick={()=>{if(!forgotName){setForgotMsg("⚠ בחר שם");return;}setForgotMsg(`✅ הבקשה נשלחה — המנהל יאפס את הסיסמה של ${forgotName}`);}} >שלח בקשה למנהל</button>
        </>:<div style={{padding:"14px 16px",background:"var(--green)15",borderRadius:10,color:"var(--green)",fontSize:13,textAlign:"center"}}>{forgotMsg}</div>}
        <button className="btn-ghost btn-sm" style={{marginTop:16,width:"100%"}} onClick={()=>{setScreen("login");setForgotMsg("");setForgotName("");}}>← חזור לכניסה</button>
      </div>
    </div>
  );

  return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
    <div className="card fade" style={{width:"min(400px,95vw)",padding:36}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        {logoUrl?<img src={logoUrl} id="appLogo" style={{height:56,objectFit:"contain",borderRadius:8,marginBottom:12}} alt="logo"/>:<div style={{fontSize:38,marginBottom:8}}>🎞</div>}
        <div style={{fontWeight:900,fontSize:24,color:"var(--gold)"}}>PostFlow</div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>ניהול פוסט-פרודקשן · v16</div>
      </div>

      {/* שם — dropdown חיפוש */}
      <div style={{marginBottom:12}} ref={nameRef}>
        <Lbl>שם</Lbl>
        <div style={{position:"relative"}}>
          <input value={selName} onChange={e=>{setSelName(e.target.value);setNameOpen(true);}} onFocus={()=>setNameOpen(true)} placeholder="הקלד או בחר שם..." onKeyDown={e=>e.key==="Enter"&&submit()}/>
          {nameOpen&&filteredNames.length>0&&<div className="srch-drop" style={{maxHeight:200}}>
            {filteredNames.map(u=><div key={u.id} className="srch-item" style={{display:"flex",alignItems:"center",gap:10}} onClick={()=>{setSelName(u.name);setNameOpen(false);}}>
              <Avatar name={u.name} idx={users.indexOf(u)} size={26}/>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{u.name}</div>
                <RoleBadge role={u.role}/>
          {u.permissions&&Object.keys(u.permissions).length>0&&<span style={{fontSize:9,background:"var(--orange)20",color:"var(--orange)",padding:"2px 6px",borderRadius:8,border:"1px solid var(--orange)40"}}>הרשאות מותאמות</span>}
              </div>
            </div>)}
          </div>}
        </div>
      </div>

      <div style={{marginBottom:6,position:"relative"}}><Lbl>סיסמה</Lbl>
        <input type={showPw?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} style={{paddingLeft:38}}/>
        <button onClick={()=>setShowPw(x=>!x)} style={{position:"absolute",left:10,bottom:8,background:"none",border:"none",color:"var(--muted)",fontSize:16,cursor:"pointer",padding:0}}>{showPw?"🙈":"👁"}</button>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"var(--muted2)",cursor:"pointer"}}>
          <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)}/>זכור אותי
        </label>
        <button style={{background:"none",border:"none",color:"var(--muted)",fontSize:12,cursor:"pointer",textDecoration:"underline"}} onClick={()=>setScreen("forgot")}>שכחתי סיסמה</button>
      </div>
      {err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:12,padding:"8px 12px",background:"var(--red)15",borderRadius:8}}>⚠ {err}</div>}
      <button className="btn-gold" style={{width:"100%",padding:12,fontSize:15,opacity:busy?.6:1}} onClick={submit} disabled={busy}>{busy?"מתחבר...":"כניסה →"}</button>
      <div style={{textAlign:"center",marginTop:14}}>
        <button style={{background:"none",border:"1px solid var(--border)",borderRadius:8,color:"var(--muted2)",fontSize:12,padding:"7px 18px",cursor:"pointer",width:"100%"}} onClick={enterGuest}>👁 כניסת אורח (צפייה בלוח בלבד)</button>
      </div>
    </div>
  </div>);
}

// WEEKLY CALENDAR — day-based, task chips, edit-in-place, Fri/Sat allowed
// ══════════════════════════════════════════
const calcHoursDisplay=(ts,te)=>{
  if(!ts||!te)return"?";
  const[sh,sm]=ts.split(":").map(Number);const[eh,em]=te.split(":").map(Number);
  const diff=(eh*60+em)-(sh*60+sm);return diff>0?(diff/60).toFixed(1):"?";
};
function WeeklyCalendar({projects,user,users,shiftTypes,globalShifts,onSaveShift,onDeleteShift,editModal,setEditModal}){
  const [weekStart,setWeekStart]=useState(()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());return d;});
  const [detailModal,setDetailModal]=useState(null);
  const canEdit=user.role==="admin"||user.role==="producer";
  const canSeeAll=user.role==="admin"||user.role==="producer"||user.role==="guest";
  const sts=shiftTypes||DEF_SHIFT_TYPES;

  const syncSettingsToSheets=async(key,value,label)=>{
    const url=getSheetsUrl();if(!url)return;
    const v=typeof value==="object"?JSON.stringify(value):String(value);
    return sheetsPost(url,{action:"upsertSetting",sheet:"settings",row:{key,value:v,label,updatedAt:new Date().toISOString().slice(0,19).replace("T"," ")}});
  };
  const pullSettingsFromSheets=async()=>{
    const url=getSheetsUrl();if(!url)return null;
    const r=await sheetsPost(url,{action:"getAll",sheet:"settings"}).catch(()=>null);
    if(!r||!r.data)return null;
    const patch={};
    r.data.forEach(row=>{
      if(row.key==="shiftTypes"&&row.value){try{const st=JSON.parse(row.value);if(Array.isArray(st)&&st.length)patch.shiftTypes=st;}catch{}}
      if(row.key==="logoUrl"&&row.value)patch.logoUrl=row.value;
    });
    if(Object.keys(patch).length)upd(patch);
    return patch;
  };
  const onSaveShiftTypesToSheets=st=>syncSettingsToSheets("shiftTypes",st,"סוגי משמרות");
  const onSyncUser=u=>{
    const url=getSheetsUrl();if(!url)return;
    sheetsPost(url,{action:"upsert",sheet:"staff",id:u.id,row:u}).catch(()=>{});
  };
  const allDays=Array.from({length:14},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d;});
  const week1=allDays.slice(0,7),week2=allDays.slice(7,14);

  // Build event map: date → [{...shift, projName, client}]
  const evMap=useMemo(()=>{
    const m={};
    // משמרות מפרויקטים
    projects.forEach(proj=>(proj.shifts||[]).forEach(s=>{
      if(!m[s.date])m[s.date]=[];
      const show=canSeeAll||s.person===user.id;
      if(show)m[s.date].push({...s,projName:proj.name,client:proj.client,projId:proj.id});
    }));
    // משמרות ללא פרויקט
    (globalShifts||[]).forEach(s=>{
      if(!m[s.date])m[s.date]=[];
      const show=canSeeAll||s.person===user.id;
      if(show)m[s.date].push({...s,projName:"",client:"",projId:""});
    });
    return m;
  },[projects,globalShifts,canSeeAll,user.id]);

  const openNew=date=>{
    if(!canEdit)return;
    setEditModal({mode:"new",shift:{id:null,date,tasks:[],person:"",projId:"",note:"",timeStart:"09:00",hours:2}});
  };
  const openEdit=ev=>{
    if(!canEdit){setDetailModal(ev);return;}
    setEditModal({mode:"edit",shift:{...ev,tasks:ev.tasks||[]}});
  };

  const renderWeek=(days,label)=>(
    <div style={{marginBottom:28}}>
      <div style={{fontSize:12,fontWeight:700,color:"var(--muted2)",marginBottom:8,padding:"4px 10px",background:"var(--card2)",borderRadius:8,display:"inline-block"}}>
        {label} · {fmtDate(days[0])} – {fmtDate(days[6])}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,minWidth:560}}>
        {days.map(d=>{
          const key=isoDate(d);const isToday=key===todayStr();const wknd=isWknd(d);
          const evs=evMap[key]||[];
          // Group by worker
          const byWorker={};
          evs.forEach(ev=>{const wid=ev.person||"_";if(!byWorker[wid])byWorker[wid]=[];byWorker[wid].push(ev);});
          return(<div key={key}
            className={`cal-day${isToday?" today":""}${wknd?" weekend":""}`}
            onClick={()=>openNew(key)}>
            {/* Header */}
            <div style={{textAlign:"center",marginBottom:6}}>
              <div style={{fontSize:10,fontWeight:700,color:isToday?"var(--gold)":wknd?"var(--red)":"var(--muted2)"}}>{HEB_DAYS[d.getDay()]}</div>
              <div style={{fontSize:13,fontWeight:800,color:isToday?"var(--gold)":wknd?"var(--muted)":"var(--text)"}}>{fmtDate(d)}</div>
              {wknd&&<div style={{fontSize:8,color:"var(--orange)",opacity:.7}}>סוף שבוע</div>}
            </div>
            {/* Events grouped by worker */}
            {Object.entries(byWorker).map(([wid,wevs])=>{
              const workerObj=users.find(u=>u.id===wid);
              const wColor=aCol(users.indexOf(workerObj)||0);
              return(<div key={wid} style={{marginBottom:4}} onClick={e=>e.stopPropagation()}>
                {canSeeAll&&workerObj&&(
                  <div style={{fontSize:8,color:wColor,fontWeight:700,marginBottom:2,display:"flex",alignItems:"center",gap:2}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:wColor,display:"inline-block"}}/>
                    {workerObj.name.split(" ")[0]}
                  </div>
                )}
                {wevs.map(ev=>{
                  const tasks=ev.tasks||[];const firstCol=stColor(tasks[0]||"other",sts);
                  return(<div key={ev.id} className="cal-ev"
                    style={{background:firstCol+"25",color:firstCol,border:`1px solid ${firstCol}40`}}
                    onClick={e=>{e.stopPropagation();openEdit(ev);}}>
                    {ev.projName&&<div style={{fontSize:8,opacity:.65,fontWeight:400}}>{ev.projName.slice(0,14)}</div>}
                    <div>{tasks.map(t=>stLabel(t,sts)).join(", ").slice(0,20)||"—"}</div>
                    {(ev.hours||ev.timeStart)&&<div style={{fontSize:8,opacity:.55,fontWeight:400}}>{ev.hours?""+ev.hours+"h":calcHoursDisplay(ev.timeStart,ev.timeEnd)+"h"}</div>}
                  </div>);
                })}
              </div>);
            })}
            {canEdit&&evs.length===0&&<div style={{fontSize:9,color:"var(--muted)",opacity:.3,textAlign:"center",marginTop:10}}>+ לחץ</div>}
          </div>);
        })}
      </div>
    </div>
  );

  return(<div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div className="section-title" style={{marginBottom:0}}>לוח שבועי</div>
      <div style={{display:"flex",gap:8}}>
        <button className="btn-ghost btn-sm" onClick={()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());setWeekStart(d);}}>היום</button>
        <button className="btn-ghost btn-sm" onClick={()=>{const d=new Date(weekStart);d.setDate(d.getDate()-14);setWeekStart(d);}}>← קודם</button>
        <button className="btn-ghost btn-sm" onClick={()=>{const d=new Date(weekStart);d.setDate(d.getDate()+14);setWeekStart(d);}}>הבא →</button>
      </div>
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
      {sts.map(t=><span key={t.id} className="tag" style={{color:t.color,background:t.color+"20",border:`1px solid ${t.color}30`}}>{t.label}</span>)}
      <span className="tag" style={{background:"var(--red)15",color:"var(--red)",border:"1px solid var(--red)30"}}>🟥 שישי/שבת</span>
    </div>
    {renderWeek(week1,"שבוע ראשון")}
    {renderWeek(week2,"שבוע שני")}

    {editModal&&<ShiftModal key={editModal.shift?.id||editModal.shift?.date||"new"} mode={editModal.mode} initialShift={editModal.shift} projects={projects} users={users} shiftTypes={sts}
      onSave={s=>{onSaveShift(s);setEditModal(null);}}
      onDelete={editModal.mode==="edit"?s=>{onDeleteShift(s);setEditModal(null);}:null}
      onClose={()=>setEditModal(null)}/>}

    {detailModal&&<div className="modal-bg" onClick={()=>setDetailModal(null)}>
      <div className="modal" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:800,fontSize:18,marginBottom:14}}>פרטי אירוע</div>
        <div style={{lineHeight:2,fontSize:13}}>
          <div>📁 {detailModal.projName||"ללא פרויקט"}</div>
          <div>🎬 {(detailModal.tasks||[]).map(t=>stLabel(t,sts)).join(", ")||"—"}</div>
          <div>👤 {users.find(u=>u.id===detailModal.person)?.name||"—"}</div>
          <div>📅 {detailModal.date} · {detailModal.timeStart||"—"} · <b>{detailModal.hours||calcHoursDisplay(detailModal.timeStart,detailModal.timeEnd)}h</b></div>
          {detailModal.note&&<div>📝 {detailModal.note}</div>}
        </div>
        <div style={{marginTop:16,display:"flex",gap:10}}>
          <a href={gcalLink(detailModal,detailModal.projName,detailModal.client)} target="_blank" rel="noreferrer">
            <button className="btn-blue btn-sm">📅 Google Calendar</button>
          </a>
          <button className="btn-ghost btn-sm" onClick={()=>setDetailModal(null)}>סגור</button>
        </div>
      </div>
    </div>}
  </div>);
}

// Shift modal — new or edit
function ShiftModal({mode,initialShift,projects,users,shiftTypes,onSave,onDelete,onClose}){
  // שעות: חישוב מ-timeStart/timeEnd קיימות, ברירת מחדל 2
  const calcHours=(ts,te)=>{
    if(!ts||!te)return 2;
    const[sh,sm]=ts.split(":").map(Number);const[eh,em]=te.split(":").map(Number);
    const diff=(eh*60+em)-(sh*60+sm);return Math.max(1,Math.min(10,Math.round(diff/60)));
  };
  const [s,setS]=useState({...initialShift,tasks:initialShift.tasks||[]});
  const [hours,setHours]=useState(()=>calcHours(initialShift.timeStart,initialShift.timeEnd)||2);
  const upd=k=>e=>setS(x=>({...x,[k]:e.target.value}));
  const sts=shiftTypes||DEF_SHIFT_TYPES;
  const proj=projects.find(p=>p.id===s.projId);

  // חישוב timeEnd מ-timeStart + hours
  const computeEnd=(start,h)=>{
    if(!start)return"";
    const[sh,sm]=start.split(":").map(Number);
    const total=sh*60+sm+h*60;
    return`${String(Math.floor(total/60)%24).padStart(2,"0")}:${String(total%60).padStart(2,"0")}`;
  };

  const buildShift=()=>{
    const ts=s.timeStart||"09:00";
    return{...s,id:s.id||uid(),timeStart:ts,timeEnd:computeEnd(ts,hours),hours};
  };

  return(<div className="modal-bg" onClick={onClose}>
    <div className="modal" style={{maxWidth:540}} onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>{mode==="new"?"+ הוספת שיבוץ":"✏️ עריכת שיבוץ"}</div>
      <div style={{fontSize:12,color:"var(--muted)",marginBottom:18}}>📅 {s.date}</div>
      <div style={{marginBottom:12}}><Lbl>פרויקט (אופציונלי)</Lbl><ProjSearchSelect projects={projects} value={s.projId} onChange={v=>setS(x=>({...x,projId:v}))}/></div>
      <div className="frow">
        <div className="fcol"><Lbl>עובד</Lbl>
          <select value={s.person} onChange={upd("person")}>
            <option value="">— בחר עובד —</option>
            {users.filter(u=>u.active!=="false"&&u.active!=="0").map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div className="fcol"><Lbl>שעת התחלה</Lbl>
          <input type="time" value={s.timeStart||"09:00"} onChange={upd("timeStart")}/>
        </div>
        <div className="fcol"><Lbl>מספר שעות</Lbl>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
            <input type="range" min={1} max={10} step={1} value={hours} onChange={e=>setHours(Number(e.target.value))} style={{flex:1,accentColor:"var(--gold)"}}/>
            <div style={{minWidth:52,background:"var(--card2)",border:"1px solid var(--border)",borderRadius:8,padding:"6px 10px",textAlign:"center",fontWeight:800,color:"var(--gold)",fontSize:15}}>{hours}h</div>
          </div>
          <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>
            סיום: <b style={{color:"var(--text)"}}>{computeEnd(s.timeStart||"09:00",hours)}</b>
          </div>
        </div>
      </div>
      <div style={{marginBottom:12}}><Lbl>סוג משמרת / משימה</Lbl><TaskChips shiftTypes={sts} selected={s.tasks} onChange={tasks=>setS(x=>({...x,tasks}))}/></div>
      <div style={{marginBottom:16}}><Lbl>הערה</Lbl><input value={s.note||""} onChange={upd("note")} placeholder="הערה חופשית..."/></div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button className="btn-gold" onClick={()=>{if(!s.date)return;onSave(buildShift());}}>💾 שמור</button>
        {onDelete&&<button className="btn-red" onClick={()=>onDelete(s)}>🗑 מחק</button>}
        <a href={gcalLink(buildShift(),proj?.name||"",proj?.client||"")} target="_blank" rel="noreferrer">
          <button className="btn-blue btn-sm">📅 Google Calendar</button>
        </a>
        <button className="btn-ghost" onClick={onClose}>ביטול</button>
      </div>
    </div>
  </div>);
}

// HOURS LOG — monthly view by worker or project
// ══════════════════════════════════════════
function HoursLog({projects,user,users,onChange,sheetsUrl}){
  const isAdmin=user.role==="admin",isProd=user.role==="producer";
  const canManage=isAdmin||isProd;
  const [form,setForm]=useState({projId:"",worker:user.id,date:todayStr(),timeIn:"09:00",timeOut:"18:00",note:""});
  const [editEntry,setEditEntry]=useState(null); // {projId, entryId}
  const [formErr,setFormErr]=useState("");
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const [viewBy,setViewBy]=useState("worker");
  const [month,setMonth]=useState(()=>new Date().toISOString().slice(0,7));
  const calcH=()=>{if(form.timeIn&&form.timeOut){const[h1,m1]=form.timeIn.split(":").map(Number);const[h2,m2]=form.timeOut.split(":").map(Number);return Math.max(0,((h2*60+m2)-(h1*60+m1))/60).toFixed(1);}return"0";};
  const resetForm=()=>{setEditEntry(null);setFormErr("");setForm({projId:"",worker:user.id,date:todayStr(),timeIn:"09:00",timeOut:"18:00",note:""});};
  const startEdit=h=>{
    setEditEntry({projId:h.projId,entryId:h.id});
    setForm({projId:h.projId,worker:h.worker,date:h.date,timeIn:h.timeIn||"09:00",timeOut:h.timeOut||"18:00",note:h.note||""});
    window.scrollTo({top:0,behavior:"smooth"});
  };
  const deleteEntry=(projId,entryId)=>{
    const proj=projects.find(p=>p.id===projId);if(!proj)return;
    onChange({...proj,hours:(proj.hours||[]).filter(h=>h.id!==entryId)});
    if(sheetsUrl)sheetsPost(sheetsUrl,{action:"softDelete",sheet:"hours_report",id:entryId,row:{deleted:"TRUE",deletedBy:user.name,deletedAt:new Date().toISOString().slice(0,19)}}).catch(()=>{});
  };
  const submit=()=>{
    setFormErr("");
    if(!form.projId){setFormErr("בחר פרויקט");return;}
    const proj=projects.find(p=>p.id===form.projId);if(!proj)return;
    if(!form.date){setFormErr("בחר תאריך");return;}
    const h=parseFloat(calcH())||0;
    if(h<=0){setFormErr("שעת יציאה חייבת להיות אחרי שעת כניסה");return;}
    const wName=users.find(u=>u.id===form.worker)?.name||form.worker;
    if(editEntry){
      // update existing
      const updated={...projects.find(p=>p.id===editEntry.projId)};
      const oldProj=projects.find(p=>p.id===editEntry.projId);
      if(oldProj){
        const newHours=(oldProj.hours||[]).map(he=>he.id===editEntry.entryId
          ?{...he,worker:form.worker,date:form.date,timeIn:form.timeIn,timeOut:form.timeOut,hours:h,note:form.note,correction:true}
          :he);
        onChange({...oldProj,hours:newHours});
        if(sheetsUrl)sheetsPost(sheetsUrl,{action:"upsert",sheet:"hours_report",id:editEntry.entryId,row:{id:editEntry.entryId,workerName:wName,date:form.date,timeIn:form.timeIn,timeOut:form.timeOut,totalHours:h,note:form.note,correction:"TRUE"}}).catch(()=>{});
      }
      resetForm();return;
    }
    const entry={id:uid(),worker:form.worker,date:form.date,timeIn:form.timeIn,timeOut:form.timeOut,hours:h,note:form.note,correction:false};
    onChange({...proj,hours:[...(proj.hours||[]),entry]});
    if(sheetsUrl){
      sheetsPost(sheetsUrl,{action:"upsert",sheet:"hours_report",id:entry.id,row:{id:entry.id,workerName:wName,date:form.date,timeIn:form.timeIn,timeOut:form.timeOut,totalHours:h,note:form.note,projId:proj.id,projName:proj.name}}).catch(()=>{});
    }
    setForm(p=>({...p,projId:"",note:""}));
  };
  const allHours=[];projects.forEach(p=>(p.hours||[]).filter(h=>h.date&&h.date.startsWith(month)&&(canManage||h.worker===user.id)).forEach(h=>{const u=users.find(u=>u.id===h.worker);allHours.push({...h,projName:p.name,projId:p.id,workerName:u?.name||h.worker});}));
  allHours.sort((a,b)=>b.date.localeCompare(a.date));
  const grouped=useMemo(()=>{
    if(viewBy==="worker"){const m={};allHours.forEach(h=>{if(!m[h.worker])m[h.worker]={name:h.workerName,items:[]};m[h.worker].items.push(h);});return Object.values(m);}
    else{const m={};allHours.forEach(h=>{if(!m[h.projId])m[h.projId]={name:h.projName,items:[]};m[h.projId].items.push(h);});return Object.values(m);}
  },[allHours,viewBy]);
  return(<div className="fade">
    <div className="section-title">⏱ דיווח שעות</div>
    <div className="card" style={{marginBottom:20,borderColor:editEntry?"var(--orange)":"var(--border)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:700}}>{editEntry?"✏️ עריכת דיווח":"+ הוספת דיווח"}</div>
        {editEntry&&<button className="btn-ghost btn-sm" onClick={resetForm}>✕ ביטול עריכה</button>}
      </div>
      <div className="frow">
        <div className="fcol"><Lbl>פרויקט</Lbl><select value={form.projId} onChange={f("projId")}><option value="">— בחר —</option>{projects.filter(p=>p.status==="active").map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
        {(isAdmin||isProd)&&<div className="fcol"><Lbl>עובד</Lbl><select value={form.worker} onChange={f("worker")}>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>}
        <div className="fcol"><Lbl>תאריך</Lbl><DatePicker value={form.date} onChange={v=>setForm(p=>({...p,date:v}))}/></div>
      </div>
      <div className="frow">
        <div className="fcol"><Lbl>כניסה</Lbl><input type="time" value={form.timeIn} onChange={f("timeIn")}/></div>
        <div className="fcol"><Lbl>יציאה</Lbl><input type="time" value={form.timeOut} onChange={f("timeOut")}/></div>
        <div className="fcol" style={{maxWidth:90}}><Lbl>סה"כ</Lbl><div style={{fontWeight:900,color:"var(--gold)",fontSize:20,paddingTop:6}}>{calcH()}h</div></div>
      </div>
      <div style={{marginBottom:12}}><Lbl>הערה</Lbl><input value={form.note} onChange={f("note")} placeholder="תיאור..."/></div>
      {formErr&&<div style={{color:"var(--red)",fontSize:12,marginBottom:8,padding:"6px 10px",background:"var(--red)15",borderRadius:8}}>⚠ {formErr}</div>}
      <div style={{display:"flex",gap:10}}>
        <button className="btn-gold" onClick={submit}>{editEntry?"💾 שמור שינויים":"+ הוסף"}</button>
        {editEntry&&<button className="btn-ghost btn-sm" onClick={resetForm}>ביטול</button>}
      </div>
    </div>
    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
      <input type="month" value={month} onChange={e=>setMonth(e.target.value)} style={{width:"auto"}}/>
      <button className={`btn-sm ${viewBy==="worker"?"btn-gold":"btn-ghost"}`} onClick={()=>setViewBy("worker")}>👤 לפי עובד</button>
      <button className={`btn-sm ${viewBy==="project"?"btn-gold":"btn-ghost"}`} onClick={()=>setViewBy("project")}>🎬 לפי פרויקט</button>
      {(isAdmin||isProd)&&<button className="btn-green btn-sm" onClick={()=>{const rows=[["עובד","פרויקט","תאריך","כניסה","יציאה","שעות","הערה"]];allHours.forEach(h=>rows.push([h.workerName,h.projName,h.date,h.timeIn||"",h.timeOut||"",h.hours.toFixed(1),h.note||""]));dlCSV(rows,`שעות_${month}.csv`);}}>📤 ייצוא CSV</button>}
    </div>
    <div style={{marginBottom:14,color:"var(--muted2)",fontSize:13}}>חודש {month} · סה"כ: <span style={{color:"var(--gold)",fontWeight:800}}>{allHours.reduce((s,h)=>s+h.hours,0).toFixed(1)}h</span></div>
    {grouped.map(g=><div key={g.name} className="card" style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:15}}>{g.name}</div>
        <div style={{fontWeight:900,color:"var(--gold)",fontSize:18}}>{g.items.reduce((s,h)=>s+h.hours,0).toFixed(1)}h</div>
      </div>
      {g.items.map(h=><div key={h.id} style={{display:"flex",gap:8,justifyContent:"space-between",fontSize:12,color:"var(--muted)",padding:"6px 0",borderBottom:"1px solid var(--border)",flexWrap:"wrap",alignItems:"center"}}>
        <span style={{minWidth:76}}>{h.date}</span>
        <span style={{flex:1,minWidth:80}}>{viewBy==="worker"?h.projName:h.workerName}</span>
        <span>{h.timeIn&&h.timeOut?`${h.timeIn}–${h.timeOut}`:""}</span>
        <span style={{color:h.correction?"var(--orange)":"var(--text)",fontWeight:700}}>{h.correction?"✏ ":""}{h.hours.toFixed(1)}h</span>
        <span style={{opacity:.6,maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.note}</span>
        {canManage&&<div style={{display:"flex",gap:4,marginRight:"auto"}}>
          <button className="btn-ghost btn-sm" style={{padding:"2px 8px",fontSize:11}} onClick={()=>startEdit({...h,projId:h.projId})}>✏️</button>
          <button className="btn-red" style={{padding:"2px 8px",fontSize:11}} onClick={()=>{if(window.confirm("מחק דיווח זה?"))deleteEntry(h.projId,h.id);}}>🗑</button>
        </div>}
      </div>)}
    </div>)}
    {grouped.length===0&&<div style={{color:"var(--muted)",textAlign:"center",padding:32}}>אין דיווחים לחודש זה</div>}
  </div>);
}

// ══════════════════════════════════════════
// PROJECT DETAIL
// ══════════════════════════════════════════
function ProjectDetail({project,user,users,shiftTypes,onChange,onBack}){
  const [tab,setTab]=useState("overview");
  const isAdmin=user.role==="admin",canEdit=user.role==="admin"||user.role==="producer";
  const sts=shiftTypes||DEF_SHIFT_TYPES;

  const syncSettingsToSheets=async(key,value,label)=>{
    const url=getSheetsUrl();if(!url)return;
    const v=typeof value==="object"?JSON.stringify(value):String(value);
    return sheetsPost(url,{action:"upsertSetting",sheet:"settings",row:{key,value:v,label,updatedAt:new Date().toISOString().slice(0,19).replace("T"," ")}});
  };
  const pullSettingsFromSheets=async()=>{
    const url=getSheetsUrl();if(!url)return null;
    const r=await sheetsPost(url,{action:"getAll",sheet:"settings"}).catch(()=>null);
    if(!r||!r.data)return null;
    const patch={};
    r.data.forEach(row=>{
      if(row.key==="shiftTypes"&&row.value){try{const st=JSON.parse(row.value);if(Array.isArray(st)&&st.length)patch.shiftTypes=st;}catch{}}
      if(row.key==="logoUrl"&&row.value)patch.logoUrl=row.value;
    });
    if(Object.keys(patch).length)upd(patch);
    return patch;
  };
  const onSaveShiftTypesToSheets=st=>syncSettingsToSheets("shiftTypes",st,"סוגי משמרות");
  const onSyncUser=u=>{
    const url=getSheetsUrl();if(!url)return;
    sheetsPost(url,{action:"upsert",sheet:"staff",id:u.id,row:u}).catch(()=>{});
  };
  const wName=id=>users.find(u=>u.id===id)?.name||id;

  const [nt,setNt]=useState({title:"",type:"editing"});
  const addTask=()=>{if(!nt.title.trim())return;onChange({...project,tasks:[...(project.tasks||[]),{id:uid(),title:nt.title,type:nt.type,done:false}]});setNt(p=>({...p,title:""}));};

  const [ns,setNs]=useState({date:"",tasks:[],person:"",timeStart:"09:00",hours:2,note:""});
  const addShift=()=>{if(!ns.date)return;onChange({...project,shifts:[...(project.shifts||[]),{id:uid(),...ns}]});setNs(p=>({...p,date:"",note:"",tasks:[]}));};

  const [nh,setNh]=useState({worker:user.id,date:todayStr(),timeIn:"09:00",timeOut:"18:00",note:""});
  const addHour=()=>{const[h1,m1]=nh.timeIn.split(":").map(Number);const[h2,m2]=nh.timeOut.split(":").map(Number);const h=Math.max(0,((h2*60+m2)-(h1*60+m1))/60);onChange({...project,hours:[...(project.hours||[]),{id:uid(),...nh,hours:h,correction:false}]});setNh(p=>({...p,note:""}));};

  const done=(project.tasks||[]).filter(t=>t.done).length;
  const taskPct=(project.tasks||[]).length?pct(done,(project.tasks||[]).length):0;
  const TABS=[{id:"overview",label:"סקירה"},...(canEdit?[{id:"tasks",label:"משימות"},{id:"schedule",label:"לוז"}]:[]),{id:"hours",label:"שעות"},...(canEdit?[{id:"planning",label:"תכנון"}]:[]),...(isAdmin?[{id:"budget",label:"תקציב"}]:[])];

  return(<div className="fade">
    <button className="btn-ghost btn-sm" style={{marginBottom:14}} onClick={onBack}>← חזרה</button>
    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontWeight:800,fontSize:11,color:"var(--gold)",background:"var(--gold)18",border:"1px solid var(--gold)40",borderRadius:6,padding:"2px 8px"}}>#{project.projectNumber||"—"}</span>
          <span style={{fontSize:22,fontWeight:900}}>{project.name}</span>
        </div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{project.client}{project.producer?` · 👤 ${project.producer}`:""}</div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <StatusBadge s={project.status}/>
        {canEdit&&<select value={project.status} onChange={e=>onChange({...project,status:e.target.value})} style={{width:"auto",fontSize:12}}>{Object.entries(STATUS_CFG).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>}
      </div>
    </div>
    <div className="card2" style={{marginBottom:16,borderRight:"3px solid var(--blue)"}}>
      <div style={{fontSize:11,color:"var(--blue)",fontWeight:700,marginBottom:5}}>סטטוס עדכני</div>
      {canEdit?<textarea value={project.statusNote||""} onChange={e=>onChange({...project,statusNote:e.target.value})} placeholder="מה הסטטוס הנוכחי?" style={{background:"transparent",border:"none",padding:0,minHeight:40,fontSize:13,width:"100%"}}/>:<div style={{fontSize:13}}>{project.statusNote||"—"}</div>}
    </div>
    <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
      {TABS.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
    </div>

    {tab==="overview"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:14}}>
      <div className="card"><Lbl>התקדמות</Lbl><div style={{fontSize:34,fontWeight:900,color:"var(--gold)"}}>{project.progress}%</div><PBar v={project.progress}/>{canEdit&&<input type="range" min={0} max={100} value={project.progress} onChange={e=>onChange({...project,progress:+e.target.value})} style={{width:"100%",marginTop:8}}/>}</div>
      <div className="card"><Lbl>משימות</Lbl><div style={{fontSize:34,fontWeight:900,color:"var(--blue)"}}>{done}/{(project.tasks||[]).length}</div><PBar v={taskPct} color="var(--blue)"/></div>
      <div className="card"><Lbl>שעות עבודה</Lbl><div style={{fontSize:34,fontWeight:900,color:"var(--gold)"}}>{(project.hours||[]).reduce((s,h)=>s+h.hours,0).toFixed(1)}h</div></div>
      <div className="card"><Lbl>תאריכים</Lbl>
        {[{l:"📷 צילום",v:project.shootDate},{l:"🎬 אופליין",v:project.offlineScreening},{l:"📽 אונליין",v:project.onlineScreening},{l:"📦 מסירה",v:project.deliveryDate}].filter(x=>x.v).map(x=><div key={x.l} style={{fontSize:12,marginBottom:4}}><span style={{color:"var(--muted)"}}>{x.l}:</span> <b style={{color:"var(--red)"}}>{x.v}</b></div>)}
        {canEdit&&<div style={{marginTop:8}}><Lbl>הקרנת אונליין</Lbl><DatePicker value={project.onlineScreening||""} onChange={v=>onChange({...project,onlineScreening:v})}/></div>}
      </div>
    </div>}

    {tab==="tasks"&&<div>
      <div className="frow">
        <div className="fcol"><input placeholder="שם משימה" value={nt.title} onChange={e=>setNt(p=>({...p,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTask()}/></div>
        <div className="fcol" style={{maxWidth:160}}><select value={nt.type} onChange={e=>setNt(p=>({...p,type:e.target.value}))}>{sts.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select></div>
        <button className="btn-gold btn-sm" onClick={addTask}>+ הוסף</button>
      </div>
      {(project.tasks||[]).map(t=>{const col=stColor(t.type,sts);return(<div key={t.id} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
        <div style={{width:20,height:20,borderRadius:6,background:t.done?"var(--green)":"transparent",border:`2px solid ${t.done?"var(--green)":"var(--border2)"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .2s",flexShrink:0}} onClick={()=>onChange({...project,tasks:(project.tasks||[]).map(x=>x.id===t.id?{...x,done:!x.done}:x)})}>
          {t.done&&<span style={{color:"#07090f",fontSize:11,fontWeight:900}}>✓</span>}
        </div>
        <div style={{flex:1,fontWeight:600,textDecoration:t.done?"line-through":"none",color:t.done?"var(--muted)":"var(--text)"}}>{t.title}</div>
        <span className="tag" style={{background:col+"20",color:col}}>{stLabel(t.type,sts)}</span>
        <button className="btn-red" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>onChange({...project,tasks:(project.tasks||[]).filter(x=>x.id!==t.id)})}>✕</button>
      </div>);})}
    </div>}

    {tab==="schedule"&&<div>
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:700,marginBottom:12}}>+ הוספת משמרת</div>
        <div className="frow">
          <div className="fcol"><Lbl>תאריך</Lbl><DatePicker value={ns.date} onChange={v=>setNs(x=>({...x,date:v}))}/></div>
          <div className="fcol"><Lbl>עובד</Lbl><select value={ns.person} onChange={e=>setNs(x=>({...x,person:e.target.value}))}><option value="">— בחר —</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
          <div className="fcol"><Lbl>משעה</Lbl><input type="time" value={ns.timeStart} onChange={e=>setNs(x=>({...x,timeStart:e.target.value}))}/></div>
          <div className="fcol"><Lbl>עד שעה</Lbl><input type="time" value={ns.timeEnd} onChange={e=>setNs(x=>({...x,timeEnd:e.target.value}))}/></div>
        </div>
        <div style={{marginBottom:10}}><Lbl>משימות</Lbl><TaskChips shiftTypes={sts} selected={ns.tasks} onChange={tasks=>setNs(x=>({...x,tasks}))}/></div>
        <div style={{marginBottom:12}}><Lbl>הערה</Lbl><input value={ns.note} onChange={e=>setNs(x=>({...x,note:e.target.value}))}/></div>
        <button className="btn-gold btn-sm" onClick={addShift}>+ הוסף</button>
      </div>
      {(project.shifts||[]).sort((a,b)=>a.date.localeCompare(b.date)).map(s=>{const tasks=s.tasks||[];const firstCol=stColor(tasks[0]||"other",sts);return(<div key={s.id} className="card2" style={{marginBottom:8,borderRight:`3px solid ${firstCol}`}}>
        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>{s.date} · {s.timeStart||"—"} · {s.hours?""+s.hours+"h":calcHoursDisplay(s.timeStart,s.timeEnd)+"h"}</div>
            <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>
              {tasks.map(t=><span key={t} className="tag" style={{background:stColor(t,sts)+"20",color:stColor(t,sts),marginLeft:4}}>{stLabel(t,sts)}</span>)}
              {s.person&&<span style={{marginRight:6}}>{wName(s.person)}</span>}
              {s.note&&<span style={{opacity:.7}}>· {s.note}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <a href={gcalLink(s,project.name,project.client)} target="_blank" rel="noreferrer"><button className="btn-blue btn-sm">📅</button></a>
            <button className="btn-red" onClick={()=>onChange({...project,shifts:(project.shifts||[]).filter(x=>x.id!==s.id)})}>הסר</button>
          </div>
        </div>
      </div>);})}
    </div>}

    {tab==="hours"&&<div>
      {canEdit&&<div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:700,marginBottom:12}}>הוספת שעות</div>
        <div className="frow">
          {isAdmin&&<div className="fcol"><Lbl>עובד</Lbl><select value={nh.worker} onChange={e=>setNh(x=>({...x,worker:e.target.value}))}>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>}
          <div className="fcol"><Lbl>תאריך</Lbl><DatePicker value={nh.date} onChange={v=>setNh(x=>({...x,date:v}))}/></div>
          <div className="fcol"><Lbl>כניסה</Lbl><input type="time" value={nh.timeIn} onChange={e=>setNh(x=>({...x,timeIn:e.target.value}))}/></div>
          <div className="fcol"><Lbl>יציאה</Lbl><input type="time" value={nh.timeOut} onChange={e=>setNh(x=>({...x,timeOut:e.target.value}))}/></div>
        </div>
        <div style={{marginBottom:12}}><Lbl>הערה</Lbl><input value={nh.note} onChange={e=>setNh(x=>({...x,note:e.target.value}))}/></div>
        <button className="btn-gold btn-sm" onClick={addHour}>+ הוסף</button>
      </div>}
      {users.map(u=>{const wh=(project.hours||[]).filter(h=>h.worker===u.id);if(!wh.length)return null;return(<div key={u.id} className="card" style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={{fontWeight:700}}>{u.name}</div><div style={{fontWeight:900,color:"var(--gold)",fontSize:18}}>{wh.reduce((s,h)=>s+h.hours,0).toFixed(1)}h</div></div>
        {wh.sort((a,b)=>b.date.localeCompare(a.date)).map(h=><div key={h.id} style={{display:"flex",gap:8,justifyContent:"space-between",fontSize:12,color:"var(--muted)",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
          <span>{h.date}</span><span>{h.timeIn&&h.timeOut?`${h.timeIn}–${h.timeOut}`:""}</span>
          <span style={{color:h.correction?"var(--orange)":"var(--text)",fontWeight:700}}>{h.correction?"[תיקון]":h.hours.toFixed(1)+"h"}</span>
          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.note}</span>
        </div>)}
      </div>);})}
    </div>}

    {tab==="planning"&&<ProjectPlanning project={project} users={users} onChange={onChange} canEdit={canEdit}/>}

    {tab==="budget"&&isAdmin&&<div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <div className="card"><Lbl>תקציב מתוכנן</Lbl><div style={{fontSize:30,fontWeight:900,color:"var(--blue)"}}>{fmtMoney(project.budgetPlanned)}</div><div style={{marginTop:10}}><Lbl>עדכון</Lbl><input type="number" value={project.budgetPlanned||0} onChange={e=>onChange({...project,budgetPlanned:+e.target.value})}/></div></div>
        <div className="card"><Lbl>תקציב בפועל</Lbl><div style={{fontSize:30,fontWeight:900,color:pct(project.budgetActual,project.budgetPlanned)>80?"var(--red)":"var(--green)"}}>{fmtMoney(project.budgetActual)}</div><div style={{marginTop:10}}><Lbl>עדכון</Lbl><input type="number" value={project.budgetActual||0} onChange={e=>onChange({...project,budgetActual:+e.target.value})}/></div></div>
      </div>
      <div className="card"><Lbl>ניצול</Lbl><div style={{fontSize:26,fontWeight:900,color:"var(--gold)",marginBottom:8}}>{pct(project.budgetActual,project.budgetPlanned)}%</div><PBar v={pct(project.budgetActual,project.budgetPlanned)} color={pct(project.budgetActual,project.budgetPlanned)>80?"var(--red)":"var(--green)"}/></div>
    </div>}
  </div>);
}

function ProjectPlanning({project,users,onChange,canEdit}){
  const plan=project.plan||{crew:[],milestones:[],notes:""};
  const upd=p=>onChange({...project,plan:{...plan,...p}});
  const [nc,setNc]=useState({userId:"",role:""});
  const [nm,setNm]=useState({title:"",date:"",done:false});
  return(<div>
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>📅 תאריכי מפתח</div>
      <div className="frow">
        {[["shootDate","צילום"],["offlineScreening","אופליין"],["onlineScreening","אונליין"],["deliveryDate","מסירה"]].map(([k,l])=><div key={k} className="fcol"><Lbl>{l}</Lbl>{canEdit?<DatePicker value={project[k]||""} onChange={v=>onChange({...project,[k]:v})}/>:<input type="date" value={project[k]||""} disabled/>}</div>)}
      </div>
    </div>
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>👥 צוות</div>
      {canEdit&&<div className="frow">
        <div className="fcol"><select value={nc.userId} onChange={e=>setNc(x=>({...x,userId:e.target.value}))}><option value="">— בחר עובד —</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
        <div className="fcol"><input placeholder="תפקיד" value={nc.role} onChange={e=>setNc(x=>({...x,role:e.target.value}))}/></div>
        <button className="btn-gold btn-sm" onClick={()=>{if(!nc.userId)return;upd({crew:[...(plan.crew||[]),{id:uid(),...nc}]});setNc({userId:"",role:""});}}>+ הוסף</button>
      </div>}
      {(plan.crew||[]).map(c=>{const u=users.find(u=>u.id===c.userId);return(<div key={c.id} className="card2" style={{marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:700}}>{u?.name||c.userId} <span style={{color:"var(--muted)",fontWeight:400,fontSize:12}}>· {c.role}</span></div>
        {canEdit&&<button className="btn-red" onClick={()=>upd({crew:(plan.crew||[]).filter(x=>x.id!==c.id)})}>הסר</button>}
      </div>);})}
    </div>
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>🏁 אבני דרך</div>
      {canEdit&&<div className="frow">
        <div className="fcol"><input placeholder="כותרת" value={nm.title} onChange={e=>setNm(x=>({...x,title:e.target.value}))}/></div>
        <div className="fcol"><DatePicker value={nm.date} onChange={v=>setNm(x=>({...x,date:v}))}/></div>
        <button className="btn-gold btn-sm" onClick={()=>{if(!nm.title)return;upd({milestones:[...(plan.milestones||[]),{id:uid(),...nm}]});setNm({title:"",date:"",done:false});}}>+ הוסף</button>
      </div>}
      {(plan.milestones||[]).map(m=><div key={m.id} style={{display:"flex",gap:10,alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
        <div style={{width:18,height:18,borderRadius:4,background:m.done?"var(--green)":"transparent",border:`2px solid ${m.done?"var(--green)":"var(--border2)"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} onClick={()=>upd({milestones:(plan.milestones||[]).map(x=>x.id===m.id?{...x,done:!x.done}:x)})}>
          {m.done&&<span style={{color:"#07090f",fontSize:10,fontWeight:900}}>✓</span>}
        </div>
        <div style={{flex:1,textDecoration:m.done?"line-through":"none",color:m.done?"var(--muted)":"var(--text)"}}>{m.title}</div>
        {m.date&&<div style={{fontSize:11,color:"var(--red)"}}>{m.date}</div>}
      </div>)}
    </div>
    <div className="card"><div style={{fontWeight:700,marginBottom:8}}>📝 הערות תכנון</div><textarea value={plan.notes||""} onChange={e=>upd({notes:e.target.value})} disabled={!canEdit} style={{minHeight:80,width:"100%"}}/></div>
  </div>);
}

function Reports({projects,users}){
  const [tab,setTab]=useState("projects");
  const [month,setMonth]=useState(()=>new Date().toISOString().slice(0,7));

  // דוח סטטוס — קסטומיזציה
  const [reportMode,setReportMode]=useState("active"); // "active" | "custom"
  const [selectedIds,setSelectedIds]=useState([]);
  const toggleProj=id=>setSelectedIds(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const reportProjects=useMemo(()=>{
    if(reportMode==="active")return projects.filter(p=>p.status==="active");
    return projects.filter(p=>selectedIds.includes(p.id));
  },[projects,reportMode,selectedIds]);

  const printStatusReport=()=>{
    const logo=document.querySelector("#appLogo");
    const dateStr=new Date().toLocaleDateString("he-IL",{year:"numeric",month:"long",day:"numeric"});
    const rows=reportProjects.map(p=>`
      <div class="proj-block">
        <div class="proj-header">
          <span class="proj-num">#${p.projectNumber||"—"}</span>
          <span class="proj-name">${p.name}</span>
          <span class="proj-status status-${p.status}">${STATUS_CFG[p.status]?.label||p.status}</span>
        </div>
        <div class="proj-meta">
          ${p.client?`<span>🏢 ${p.client}</span>`:""}
          ${p.producer?`<span>👤 ${p.producer}</span>`:""}
          ${p.onlineScreening?`<span>📽 הקרנה: <b>${p.onlineScreening}</b></span>`:""}
          ${p.deliveryDate?`<span>📦 מסירה: <b>${p.deliveryDate}</b></span>`:""}
        </div>
        <div class="prog-wrap">
          <div class="prog-bar" style="width:${p.progress||0}%"></div>
        </div>
        <div class="prog-label">התקדמות: <b>${p.progress||0}%</b>
          &nbsp;·&nbsp; משימות: <b>${(p.tasks||[]).filter(t=>t.done).length}/${(p.tasks||[]).length}</b>
          &nbsp;·&nbsp; שעות: <b>${(p.hours||[]).reduce((s,h)=>s+h.hours,0).toFixed(1)}h</b>
        </div>
        ${p.statusNote?`<div class="status-note">📝 ${p.statusNote}</div>`:""}
      </div>`).join("");
    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="utf-8">
      <title>דוח סטטוס פרויקטים — ${dateStr}</title>
      <style>
        body{font-family:Arial,sans-serif;padding:32px 40px;direction:rtl;color:#1a1a2e;background:#fff}
        .report-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #e8c547;padding-bottom:16px;margin-bottom:24px}
        .report-title{font-size:22px;font-weight:900;color:#1a1a2e}
        .report-date{font-size:12px;color:#666;margin-top:4px}
        .logo{height:48px;object-fit:contain}
        .proj-block{border:1px solid #e0e0e0;border-radius:10px;padding:16px 18px;margin-bottom:14px;page-break-inside:avoid}
        .proj-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
        .proj-num{background:#e8c54720;color:#b8950f;font-weight:900;font-size:11px;padding:2px 8px;border-radius:5px;border:1px solid #e8c54760}
        .proj-name{font-weight:800;font-size:15px;flex:1}
        .proj-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
        .status-active{background:#6ee7b720;color:#059669}
        .status-review{background:#4fc3f720;color:#0284c7}
        .status-paused{background:#e8c54720;color:#b8950f}
        .status-completed{background:#a3e63520;color:#4d7c0f}
        .status-cancelled{background:#f0707020;color:#dc2626}
        .proj-meta{display:flex;gap:16px;font-size:12px;color:#555;margin-bottom:10px;flex-wrap:wrap}
        .prog-wrap{background:#f0f0f0;border-radius:4px;height:8px;margin-bottom:5px}
        .prog-bar{background:linear-gradient(90deg,#e8c547,#f5a623);height:8px;border-radius:4px;transition:width .3s}
        .prog-label{font-size:11px;color:#666;margin-bottom:6px}
        .status-note{font-size:12px;color:#444;background:#f9f9f9;border-right:3px solid #e8c547;padding:7px 10px;border-radius:4px;margin-top:6px}
        .footer{margin-top:32px;border-top:1px solid #e0e0e0;padding-top:12px;font-size:10px;color:#aaa;text-align:center}
        @media print{body{padding:16px 20px}.proj-block{border-color:#ccc}}
      </style></head><body>
      <div class="report-header">
        <div>
          <div class="report-title">📊 דוח סטטוס פרויקטים</div>
          <div class="report-date">תאריך הפקה: ${dateStr} · סה"כ: ${reportProjects.length} פרויקטים</div>
        </div>
        ${logo?`<img src="${logo.src}" class="logo"/>`:""}

    </body></html>`);

    setTimeout(()=>w.print(),400);
  };

  return(<div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <div className="section-title" style={{marginBottom:0}}>📊 דוחות</div>
      <input type="month" value={month} onChange={e=>setMonth(e.target.value)} style={{width:"auto"}}/>
    </div>
    <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
      {[{id:"projects",l:"🎬 סטטוס פרויקטים"},{id:"hours",l:"⏱ שעות"},{id:"monthly",l:"📅 חודשי"}].map(t=><button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
    </div>
    {tab==="projects"&&<div>
      {/* בחירת מצב דוח */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:700,marginBottom:12}}>⚙️ הגדרות דוח</div>
        <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <button className={`btn-sm ${reportMode==="active"?"btn-gold":"btn-ghost"}`} onClick={()=>setReportMode("active")}>
            ✅ פרויקטים פעילים ({projects.filter(p=>p.status==="active").length})
          </button>
          <button className={`btn-sm ${reportMode==="custom"?"btn-gold":"btn-ghost"}`} onClick={()=>setReportMode("custom")}>
            🎯 בחירה ידנית ({selectedIds.length} נבחרו)
          </button>
        </div>
        {reportMode==="custom"&&<div>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}>לחץ על פרויקט לבחירה / ביטול:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:200,overflowY:"auto"}}>
            {projects.filter(p=>p.status!=="cancelled").map(p=>{
              const sel=selectedIds.includes(p.id);
              const sc=STATUS_CFG[p.status]?.color||"#aaa";
              return(<div key={p.id} onClick={()=>toggleProj(p.id)}
                style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:8,cursor:"pointer",border:`1px solid ${sel?"var(--gold)":"var(--border)"}`,background:sel?"var(--gold)15":"transparent",transition:"all .15s"}}>
                <div style={{width:14,height:14,borderRadius:3,background:sel?"var(--gold)":"transparent",border:`2px solid ${sel?"var(--gold)":"var(--border2)"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {sel&&<span style={{color:"#07090f",fontSize:9,fontWeight:900}}>✓</span>}
                </div>
                <span style={{fontSize:10,color:"var(--gold)",fontWeight:800}}>#{p.projectNumber||"—"}</span>
                <span style={{fontSize:12,fontWeight:600}}>{p.name}</span>
                <span style={{width:6,height:6,borderRadius:"50%",background:sc,display:"inline-block",flexShrink:0}}/>
              </div>);
            })}
          </div>
          {projects.filter(p=>p.status!=="cancelled").length>3&&<div style={{display:"flex",gap:8,marginTop:10}}>
            <button className="btn-ghost btn-sm" onClick={()=>setSelectedIds(projects.filter(p=>p.status!=="cancelled").map(p=>p.id))}>בחר הכל</button>
            <button className="btn-ghost btn-sm" onClick={()=>setSelectedIds([])}>נקה</button>
          </div>}
        </div>}
        <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
          <button className="btn-gold btn-sm" onClick={printStatusReport} disabled={reportProjects.length===0}>
            🖨️ הדפס / PDF ({reportProjects.length} פרויקטים)
          </button>
          <button className="btn-green btn-sm" onClick={()=>{
            const rows=[["#","שם","לקוח","מפיקה","סטטוס","התקדמות","הקרנה","מסירה","שעות","משימות","הערות"]];
            reportProjects.forEach(p=>rows.push([p.projectNumber||"",p.name,p.client||"",p.producer||"",STATUS_CFG[p.status]?.label||"",p.progress+"%",p.onlineScreening||"",p.deliveryDate||"",(p.hours||[]).reduce((s,h)=>s+h.hours,0).toFixed(1),`${(p.tasks||[]).filter(t=>t.done).length}/${(p.tasks||[]).length}`,p.statusNote||""]));
            dlCSV(rows,`סטטוס_${todayStr()}.csv`);
          }}>📤 CSV</button>
        </div>
      </div>
      {/* תצוגת טבלה */}
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{borderBottom:"2px solid var(--border)"}}>{["#","שם","לקוח","מפיקה","סטטוס","התקדמות","הקרנה","שעות","הערות"].map(h=><th key={h} style={{textAlign:"right",padding:"8px 6px",color:"var(--muted)",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>
            {reportProjects.map(p=><tr key={p.id} style={{borderBottom:"1px solid var(--border)"}}>
              <td style={{padding:"8px 6px",fontWeight:800,color:"var(--gold)"}}>{p.projectNumber||"—"}</td>
              <td style={{padding:"8px 6px",fontWeight:700}}>{p.name}</td>
              <td style={{padding:"8px 6px",color:"var(--muted)"}}>{p.client}</td>
              <td style={{padding:"8px 6px",color:"var(--green)"}}>{p.producer}</td>
              <td style={{padding:"8px 6px"}}><StatusBadge s={p.status}/></td>
              <td style={{padding:"8px 6px"}}><div style={{display:"flex",gap:6,alignItems:"center"}}><div style={{width:40}}><PBar v={p.progress}/></div><span style={{color:"var(--gold)"}}>{p.progress}%</span></div></td>
              <td style={{padding:"8px 6px",color:"var(--red)"}}>{p.onlineScreening||"—"}</td>
              <td style={{padding:"8px 6px",color:"var(--blue)"}}>{(p.hours||[]).reduce((s,h)=>s+h.hours,0).toFixed(1)}h</td>
              <td style={{padding:"8px 6px",color:"var(--muted)",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.statusNote||"—"}</td>
            </tr>)}
          </tbody>
        </table>
        {reportProjects.length===0&&<div style={{color:"var(--muted)",textAlign:"center",padding:32}}>אין פרויקטים לתצוגה</div>}
      </div>
    </div>}
    {tab==="hours"&&(()=>{
      const all=[];projects.forEach(p=>(p.hours||[]).filter(h=>h.date&&h.date.startsWith(month)).forEach(h=>{const u=users.find(u=>u.id===h.worker);all.push({...h,projName:p.name,workerName:u?.name||h.worker});}));
      all.sort((a,b)=>b.date.localeCompare(a.date));
      return(<div>
        <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{color:"var(--muted2)"}}>סה"כ <span style={{color:"var(--gold)",fontWeight:800}}>{all.reduce((s,h)=>s+h.hours,0).toFixed(1)}h</span></div>
          <button className="btn-green btn-sm" onClick={()=>{const rows=[["עובד","פרויקט","תאריך","כניסה","יציאה","שעות","הערה"]];all.forEach(h=>rows.push([h.workerName,h.projName,h.date,h.timeIn||"",h.timeOut||"",h.hours.toFixed(1),h.note||""]));dlCSV(rows,`שעות_${month}.csv`);}}>📤 ייצוא CSV</button>
        </div>
        {[...new Set(all.map(h=>h.worker))].map(wid=>{const wh=all.filter(h=>h.worker===wid);const wt=wh.reduce((s,h)=>s+h.hours,0);return(<div key={wid} className="card" style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={{fontWeight:700,fontSize:15}}>{wh[0]?.workerName}</div><div style={{fontWeight:900,color:"var(--gold)",fontSize:18}}>{wt.toFixed(1)}h</div></div>
          {wh.map(h=><div key={h.id} style={{display:"flex",gap:8,justifyContent:"space-between",fontSize:12,color:"var(--muted)",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
            <span style={{minWidth:80}}>{h.date}</span><span style={{flex:1}}>{h.projName}</span><span>{h.timeIn&&h.timeOut?`${h.timeIn}–${h.timeOut}`:""}</span><span style={{color:"var(--text)",fontWeight:700}}>{h.hours.toFixed(1)}h</span>
          </div>)}
        </div>);})}
      </div>);
    })()}
    {tab==="monthly"&&projects.filter(p=>{const d=p.onlineScreening||p.deliveryDate||"";return d.startsWith(month);}).map(p=><div key={p.id} className="card" style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}><div><div style={{fontWeight:800}}>{p.name}</div><div style={{fontSize:12,color:"var(--muted)"}}>{p.client}</div></div><StatusBadge s={p.status}/></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10}}>
        {[{l:"התקדמות",v:`${p.progress}%`,c:"var(--gold)"},{l:"משימות",v:`${(p.tasks||[]).filter(t=>t.done).length}/${(p.tasks||[]).length}`,c:"var(--blue)"},{l:"שעות",v:`${(p.hours||[]).reduce((s,h)=>s+h.hours,0).toFixed(1)}h`,c:"var(--green)"},{l:"הקרנה",v:p.onlineScreening||"—",c:"var(--red)"}].map(x=><div key={x.l} className="card2" style={{padding:"10px 12px"}}><div style={{fontSize:10,color:"var(--muted)",marginBottom:3}}>{x.l}</div><div style={{fontWeight:800,color:x.c}}>{x.v}</div></div>)}
      </div>
    </div>)}
  </div>);
}

// QUOTE BUILDER — with template editor + full customization
