const _rtSubs = {};

function sbSubscribe(table, onEvent) {

      clearTimeout(reconnectTimer);
      // Send JWT in payload so RLS-gated tables work correctly

        topic: "realtime:public:" + table,
        event: "phx_join",
        payload: {
          config: {
            broadcast: { self: false },
            postgres_changes: [{ event: "*", schema: "public", table }]
          },
          access_token: SB_KEY

        ref: "1"

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: "hb" }));
        }
      }, 25000);
    };

    ws.onmessage = e => {
      try {
        const m = JSON.parse(e.data);
        const pl = m.payload;
        const cb = _rtCallbacks[table];
        if (!cb) return;

        // Supabase Realtime v2
        if (pl && pl.data) {
          const d = pl.data;
          if (d.type && (d.record || d.old_record)) {
            const rec = d.type === "DELETE" ? d.old_record : d.record;
            console.log("[RT]", table, d.type, rec?.id || "");
            cb(d.type, rec, d.old_record);
            lastPollTime = Date.now(); // WS is working, reset poll baseline
            return;
          }
        }
        // v1 / broadcast fallback
        if (pl && pl.type && (pl.record || pl.old_record)) {
          const rec = pl.type === "DELETE" ? pl.old_record : pl.record;
          cb(pl.type, rec, pl.old_record);
          lastPollTime = Date.now();
        }
      } catch(err) {
        console.warn("[sbSubscribe] parse error", err);
      }
    };

    ws.onerror = () => {};

      if (!destroyed) scheduleReconnect();

    pollTimer = setInterval(async () => {
      if (destroyed) return;
      if (Date.now() - lastPollTime < 32000) return; // WS is alive, skip

          `${SB_URL}/rest/v1/${table}?updated_at=gte.${encodeURIComponent(since)}&order=updated_at.desc&limit=50`,
          { headers: SB_HEADERS }

  startPoll();

    destroyed = true;
    clearInterval(hbTimer);

    { key: "offlineScreening", icon: "🖥",  label: "הקרנת אופליין" },
    { key: "onlineScreening",  icon: "📡", label: "הקרנת אונליין" },
    { key: "deliveryDate",     icon: "📦", label: "הגשה" }
  ];
  const ids = { ...(proj.calendarEventIds || {}) };
  const location = getStudioLocation();

  for (const { key, icon, label } of fields) {
    const date = proj[key] || "";
    const prevDate = prevProj ? (prevProj[key] || "") : "";
    const eventId = ids[key] || null;
    const summary = `${icon} ${proj.name} — ${label}`;
    const desc = `פרויקט: ${proj.name}\nלקוח: ${proj.client||""}\nמפיקה: ${proj.producer||""}`;

    if (!date) {
      // Date removed → delete event
      if (eventId) { await gcalDeleteEvent(eventId); ids[key] = null; }
      continue;
    }
    if (!eventId) {
      // New event
      const newId = await gcalCreateEvent({ summary, description: desc, date, location });
      if (newId) ids[key] = newId;
    } else if (date !== prevDate) {
      // Date changed → update
      await gcalUpdateEvent(eventId, { summary, description: desc, date, location });
    }
    // else: same date, nothing to do
  }
  return ids; // return updated map
}

.total-label{font-size:10px;color:#93c5fd;font-weight:600;margin-bottom:3px}
.total-amount{font-size:20px;font-weight:900;letter-spacing:-.5px}
.total-vat{font-size:10px;color:#93c5fd;margin-top:3px;font-weight:500}
/* Payment */
.payment-row{display:flex;align-items:center;gap:8px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:8px 12px;margin:9px 0}
.payment-icon{font-size:16px}
.payment-label{font-size:9px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}
.payment-val{font-size:11.5px;color:#111827;font-weight:700}
/* Notes */
.note{background:#f9fafb;border:1px solid #e5e7eb;border-right:3px solid #1d4ed8;border-radius:0 6px 6px 0;padding:10px 13px;margin-top:9px;font-size:10px;line-height:1.75;color:#4b5563}
.note b{color:#111827}
/* Footer */
.footer{margin-top:14px;border-top:2px solid #1d4ed8;padding-top:9px;display:flex;justify-content:space-between;align-items:center}
.footer-text{font-size:9px;color:#6b7280}
.footer-brand{font-size:10px;font-weight:800;color:#1d4ed8}
@media print{
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .page{padding:0}
  .note{page-break-inside:avoid}
  .tbl-wrap{page-break-inside:avoid}

}

    const allNums = projects.map(p => parseInt(p.projectNumber)||0);

      id: uid(),

      name: q.projName || proj.name || "פרויקט חדש",

// QUOTE BUILDER FORM — v27 (Separated Deliverables & Costs)
// ══════════════════════════════════════════
function QuoteBuilderForm({ projects, quoteTemplates, onUpdateTemplates, editingQuote, onSave, onBack, user, nextProjNum }) {
  const isAdmin = user.role === "admin";
  const tmpls = quoteTemplates || DEF_QUOTE_TMPLS;
  const DEFAULT_NOTE = `רישיון שימוש בלתי מוגבל:\nבהתאם למסמך תנאים והגבלות המצורף, ועם סיום הפרויקט וקבלת תשלום מלא, פלואו-פוסט-וידאו בע"מ תעניק רישיון שימוש בלעדי ובלתי מוגבל ללקוח כמפורט בסעיף "פלטפורמות" לעיל.\nרישיון זה הוא רישיון "חד-יישומי" ולא רישיון "רב שימושי".\nאין להפיץ מחדש את הסרט כחומרי ספרייה, בכלי או תבנית, או עם קבצי מקור.\n\nמדיניות ביטולים:\nביטול עד 48 שעות מתחילת עבודה — 5% דמי ביטול.\nביטול לאחר תחילת עבודה — חלק יחסי + 10% עמלת הפקה.`;
  const UNIT_OPTS = ["פרויקט", "משמרת", "יום", "סרט", "שעה", ""];
  const RATIO_OPTS = ["16:9", "9:16", "4:5", "1:1"];
  const PLATFORM_OPTS = ["טלוויזיה", "רדיו", "דיגיטל", "קולנוע", "אינסטגרם", "יוטיוב", "פייסבוק", "טיקטוק"];

  const RES_BY_RATIO = {
    "16:9": ["1920×1080 (Full HD)", "3840×2160 (4K)", "1280×720", "2560×1440"],
    "9:16": ["1080×1920", "2160×3840", "720×1280"],
    "4:5": ["1080×1350", "2160×2700", "864×1080"],
    "1:1": ["1080×1080", "2160×2160", "1200×1200"]
  };

  const isEditing = editingQuote && !editingQuote._fromTemplate;
  const fromTemplate = editingQuote?._fromTemplate;
  const tmplToLoad = fromTemplate ? tmpls.find(t => t.id === fromTemplate) : null;

  const [projId, setProjId] = useState(isEditing ? (editingQuote.projId || "") : "");
  const [isStandalone, setIsStandalone] = useState(isEditing ? !!editingQuote.isStandalone : false);
  const [qClient, setQClient] = useState(isEditing ? (editingQuote.client || "") : "");
  const [qProjName, setQProjName] = useState(isEditing ? (editingQuote.projName || "") : (tmplToLoad ? "" : ""));
  const [qProjDesc, setQProjDesc] = useState(isEditing ? (editingQuote.projDesc || "") : "");
  const [qScope, setQScope] = useState(isEditing ? (editingQuote.scope || "") : "");
  const [qPayment, setQPayment] = useState(isEditing ? (editingQuote.payment || "שוטף+40") : "שוטף+40");
  const [qNote, setQNote] = useState(isEditing ? (editingQuote.note || DEFAULT_NOTE) : DEFAULT_NOTE);
  const [qClientResp, setQClientResp] = useState(isEditing ? (editingQuote.clientResp || "") : "");
  const [tplName, setTplName] = useState(isEditing ? (editingQuote.template || "") : (tmplToLoad?.name || ""));
  
  // 1. Deliverables State (תוצרים ומפרט טכני)
  const [deliverables, setDeliverables] = useState(() => {
    if (isEditing && editingQuote.deliverablesArr) return editingQuote.deliverablesArr;
    return [{ id: uid(), desc: "", timing: "", platforms: [], proportions: [] }];
  });

  // 2. Costs/Pricing State (פירוט עלויות)
  const [lines, setLines] = useState(() => {
    if (isEditing) return (editingQuote.lines || []).map(l => ({ id: uid(), ...l }));
    if (tmplToLoad) return tmplToLoad.lines.map(l => ({ ...l, id: uid() }));
    return [{ id: uid(), desc: "", qty: 1, unit: "פרויקט", price: 0 }];
  });

  // 3. Appendix State (נספחים)
  const [appendixRows, setAppendixRows] = useState(() => isEditing ? (editingQuote.appendix || []) : []);
  
  const [showTechFor, setShowTechFor] = useState({});
  const [showPreview, setShowPreview] = useState(false);

  const clientList = [...new Set(projects.map(p => p.client).filter(Boolean))].sort();
  const total = lines.reduce((s, l) => s + (l.qty || 0) * (l.price || 0), 0);

  // --- Deliverables Handlers ---
  const updDeliverable = (id, k, v) => setDeliverables(ds => ds.map(d => d.id === id ? { ...d, [k]: v } : d));
  const addDeliverable = () => setDeliverables(ds => [...ds, { id: uid(), desc: "", timing: "", platforms: [], proportions: [] }]);
  const delDeliverable = id => setDeliverables(ds => ds.filter(d => d.id !== id));
  const moveDeliverable = (id, dir) => {
    const idx = deliverables.findIndex(d => d.id === id);
    if (dir === -1 && idx === 0) return;
    if (dir === 1 && idx === deliverables.length - 1) return;
    const nd = [...deliverables];
    [nd[idx], nd[idx + dir]] = [nd[idx + dir], nd[idx]];
    setDeliverables(nd);
  };
  const toggleTech = id => setShowTechFor(x => ({ ...x, [id]: !x[id] }));
  
  const toggleProportion = (id, prop) => {
    setDeliverables(ds => ds.map(d => {
      if (d.id !== id) return d;
      const props = d.proportions || [];
      const newProps = props.includes(prop) ? props.filter(p => p !== prop) : [...props, prop];
      const newRes = { ...d.resolutions };
      if (!props.includes(prop)) newRes[prop] = RES_BY_RATIO[prop][0];
      else delete newRes[prop];
      return { ...d, proportions: newProps, resolutions: newRes };
    }));
  };
  const setResolution = (id, prop, resValue) => {
    setDeliverables(ds => ds.map(d => d.id === id ? { ...d, resolutions: { ...(d.resolutions || {}), [prop]: resValue } } : d));
  };

  // --- Cost Lines Handlers ---
  const updLine = (id, k, v) => setLines(ls => ls.map(l => l.id === id ? { ...l, [k]: k === "qty" || k === "price" ? +v || 0 : v } : l));
  const addLine = () => setLines(ls => [...ls, { id: uid(), desc: "", qty: 1, unit: "פרויקט", price: 0 }]);
  const delLine = id => setLines(ls => ls.filter(l => l.id !== id));
  const moveLine = (id, dir) => {
    const idx = lines.findIndex(l => l.id === id);
    if (dir === -1 && idx === 0) return;
    if (dir === 1 && idx === lines.length - 1) return;
    const nl = [...lines];
    [nl[idx], nl[idx + dir]] = [nl[idx + dir], nl[idx]];
    setLines(nl);
  };

  // --- Appendix Handlers ---
  const addAppendixRow = () => setAppendixRows(ar => [...ar, { id: uid(), title: "", imageUrl: "", linkUrl: "" }]);
  const updAppendixRow = (id, k, v) => setAppendixRows(ar => ar.map(a => a.id === id ? { ...a, [k]: v } : a));
  const delAppendixRow = id => setAppendixRows(ar => ar.filter(a => a.id !== id));

  // --- Save Logic ---
  const buildQuoteObj = (standalone) => ({
    id: isEditing ? editingQuote.id : uid(),
    date: isEditing ? (editingQuote.date || todayStr()) : todayStr(),
    client: qClient,
    total,
    note: qNote,
    template: tplName,
    approved: false,
    quoteStatus: isEditing ? (editingQuote.quoteStatus || "draft") : "draft",
    projId: projId || null,
    projName: qProjName,
    projDesc: qProjDesc,
    scope: qScope,
    clientResp: qClientResp,
    payment: qPayment,
    lines, // Financial costs
    deliverablesArr: deliverables, // Tech specs and products
    appendix: appendixRows,
    isStandalone: standalone
  });

  const save = () => {
    const standalone = isStandalone || !projId;
    if (!standalone && !projId) { alert("יש לבחור פרויקט או לסמן הצעה עצמאית"); return; }
    onSave(buildQuoteObj(standalone), standalone);
  };

  // --- HTML Generator for Preview & Print ---
  const buildHtmlDocument = () => {
    // ── Pull design settings ──
    const hdrBg    = qDesign.headerColor  || "#1e3a8a";
    const accent   = qDesign.accentColor  || "#1d4ed8";
    const altRow   = qDesign.altRowColor  || "#f8fafc";
    const rowPad   = qDesign.rowHeight === "compact" ? "5px 11px" : qDesign.rowHeight === "spacious" ? "14px 11px" : "9px 11px";
    const clientBg = accent + "18";
    const clientBd = accent + "60";
    const accentDark = hdrBg;

    const dateStr = new Date().toLocaleDateString("he-IL", { year: "numeric", month: "long", day: "numeric" });
    const quoteNum = `QT-${new Date().getFullYear()}-${String(Date.now()).slice(-4)}`;
    const logo = document.querySelector("#appLogo");
    const logoHtml = logo ? `<img src="${logo.src}" style="height:54px;object-fit:contain;"/>` : `<div style="font-size:26px;font-weight:900;color:${accent}">FLOW</div>`;
    const sec = (label, val) => val ? `<div class="sec"><div class="sec-label">${label}</div><div class="sec-val">${String(val).replace(/\n/g,"<br/>")}</div></div>` : "";
    
    // HTML for Deliverables Table
    const deliverablesHtml = deliverables.filter(d => d.desc).length > 0 ? `
      <div class="sec-label" style="font-size:14px; margin-top:24px; border-bottom:2px solid ${accent};">רשימת תוצרים ומפרט טכני</div>
      <table style="margin-top:10px; margin-bottom:24px;">
        <thead><tr>
          <th style="text-align:right;">תיאור התוצר</th>
          <th style="text-align:right;">פרופורציה ורזולוציה</th>
          <th style="text-align:right;">פלטפורמות יעד</th>
        </tr></thead>
        <tbody>
          ${deliverables.filter(d => d.desc).map(d => {
            let techInfo = "—";
            if (d.proportions && d.proportions.length > 0) {
              techInfo = d.proportions.map(p => `<b>${p}</b> <span style="color:#6b7280;font-size:11px;">(${d.resolutions[p] || ''})</span>`).join('<br/>');
            }
            return `<tr>
              <td style="font-weight:600; width:40%;">${d.desc||""}</td>
              <td style="width:30%; line-height:1.5;">${techInfo}</td>
              <td style="width:30%;">${d.platform||"—"}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    ` : "";

    // HTML for Costs Table
    const costsHtml = lines.length > 0 ? `
      <div class="sec-label" style="font-size:14px; margin-top:20px; border-bottom:2px solid ${accent};">פירוט עלויות</div>
      <table style="margin-top:10px; margin-bottom:20px;">
        <thead><tr>
          <th>תיאור שירות / תפקיד</th>
          <th style="width:60px;text-align:center">כמות</th>
          <th style="width:80px">יחידה</th>
          <th style="width:110px">מחיר יחידה</th>
          <th style="width:110px">סה״כ</th>
        </tr></thead>
        <tbody>
          ${lines.map(l => `<tr>
            <td style="font-weight:600;">${l.desc||""}</td>
            <td style="text-align:center">${l.qty}</td>
            <td>${l.unit||""}</td>
            <td>${fmtMoney(l.price)}</td>
            <td style="font-weight:700;color:${hdrBg}">${fmtMoney(l.qty*l.price)}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    ` : "";

    const appendixHtml = appendixRows.length > 0 ? `
      <div class="page-break" style="page-break-before: always; padding-top: 20px;">
          <div class="doc-title" style="margin-bottom:20px;">נספח: רפרנסים ודוגמאות</div>
          <div style="display:flex; flex-wrap:wrap; gap:20px;">
              ${appendixRows.map(a => `
                  <div style="width:calc(50% - 10px); border:1px solid #e5e7eb; padding:12px; border-radius:8px; background:#f9fafb; display:flex; flex-direction:column;">
                      <div style="font-weight:800; margin-bottom:8px; font-size:14px;">${a.title || 'רפרנס'}</div>
                      ${a.imageUrl ? `<img src="${a.imageUrl}" style="max-width:100%; max-height:200px; object-fit:cover; border-radius:4px; margin-bottom:8px; border:1px solid #ccc;" />` : ''}
                      ${a.linkUrl ? `<div style="margin-top:auto;"><a href="${a.linkUrl}" target="_blank" style="color:#1d4ed8; text-decoration:none; font-weight:bold;">🔗 צפה בקישור המלא</a></div>` : ''}
                  </div>
              `).join('')}
          </div>
