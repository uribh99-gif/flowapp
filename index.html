function SaveAsTemplateBtn({lines,payment,tmpls,onUpdateTemplates}){
  const [open,setOpen]=useState(false);
  const [name,setName]=useState("");
  const [msg,setMsg]=useState("");
  const ref=useRef();
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  const save=()=>{
    if(!name.trim()){setMsg("הזן שם");return;}
    if(!lines||!lines.length){setMsg("אין שורות לשמירה");return;}
    const newTmpl={id:uid(),name:name.trim(),lines:lines.map(l=>({...l,id:uid()})),payment};
    onUpdateTemplates([...(tmpls||[]),newTmpl]);
    setMsg("✅ נשמר: "+name.trim());setName("");
    setTimeout(()=>{setMsg("");setOpen(false);},1800);
  };
  return(<div ref={ref} style={{position:"relative"}}>
    <button className="btn-ghost btn-sm" onClick={()=>setOpen(x=>!x)}>📋 שמור כתבנית</button>
    {open&&<div style={{position:"absolute",bottom:"calc(100% + 6px)",right:0,background:"var(--card)",border:"1px solid var(--border2)",borderRadius:10,padding:14,minWidth:240,zIndex:300,boxShadow:"0 6px 24px rgba(0,0,0,.5)"}}>
      <div style={{fontWeight:700,marginBottom:8,fontSize:13}}>📋 שמור תבנית חדשה</div>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="שם התבנית..." onKeyDown={e=>e.key==="Enter"&&save()} autoFocus/>
      <div style={{fontSize:11,color:"var(--muted)",marginTop:4,marginBottom:8}}>{lines?.length||0} שורות יישמרו</div>
      <div style={{display:"flex",gap:8}}>
        <button className="btn-gold btn-sm" onClick={save} style={{flex:1}}>שמור</button>
        <button className="btn-ghost btn-sm" onClick={()=>setOpen(false)}>ביטול</button>
      </div>
      {msg&&<div style={{marginTop:8,fontSize:12,color:msg.startsWith("✅")?"var(--green)":"var(--red)"}}>{msg}</div>}
    </div>}
  </div>);
}

function QuoteBuilder({projects,quoteTemplates,onSave,onUpdateTemplates,user}){
  const isAdmin=user.role==="admin";
  const [step,setStep]=useState("list");
  const [projId,setProjId]=useState("");
  const [lines,setLines]=useState([]);
  const [tplName,setTplName]=useState("");
  const [editingTplId,setEditingTplId]=useState(null);
  const [etName,setEtName]=useState("");
  const [etLines,setEtLines]=useState([]);
  // Custom fields
  const [qClient,setQClient]=useState("");
  const [qProjName,setQProjName]=useState("");
  const [qProjDesc,setQProjDesc]=useState("");
  const [qDeliverables,setQDeliverables]=useState(""); // רשימת תוצרים
  const [qFormats,setQFormats]=useState("");            // פורמטים
  const [qResolutions,setQResolutions]=useState("");    // רזולוציות
  const [qRatios,setQRatios]=useState("");              // פרופורציות
  const [qPlatforms,setQPlatforms]=useState("");        // פלטפורמות שידור
  const [qUsageRights,setQUsageRights]=useState("");    // סמן שימוש
  const [qClientResp,setQClientResp]=useState("");      // באחריות הלקוח
  const [qScope,setQScope]=useState("");                // תכולה מפורטת
  const [qPayment,setQPayment]=useState("50% בחתימה, 50% במסירה"); // תנאי תשלום
  const [qNote,setQNote]=useState("");

  const tmpls=quoteTemplates||DEF_QUOTE_TMPLS;
  const total=lines.reduce((s,l)=>s+l.qty*l.price,0);
  const updLine=(id,k,v)=>setLines(ls=>ls.map(l=>l.id===id?{...l,[k]:k==="qty"||k==="price"?+v||0:v}:l));

  const loadTemplate=tid=>{
    const t=tmpls.find(t=>t.id===tid);if(!t)return;
    setTplName(t.name);
    setLines(t.lines.map(l=>({...l,id:uid()})));
    const p=projects.find(x=>x.id===projId);
    setQClient(p?.client||"");
    setQProjName(p?.name||"");
    setStep("build");
  };

  const save=()=>{
    if(!projId)return;
    const q={id:uid(),date:todayStr(),client:qClient,total,note:qNote,template:tplName,approved:false,
      projId,projName:qProjName,projDesc:qProjDesc,deliverables:qDeliverables,formats:qFormats,
      resolutions:qResolutions,ratios:qRatios,platforms:qPlatforms,usageRights:qUsageRights,
      clientResp:qClientResp,scope:qScope,payment:qPayment,lines};
    onSave(projId,q);
    setStep("list");setLines([]);setProjId("");
    setQClient("");setQProjName("");setQProjDesc("");setQDeliverables("");setQFormats("");
    setQResolutions("");setQRatios("");setQPlatforms("");setQUsageRights("");setQClientResp("");
    setQScope("");setQPayment("50% בחתימה, 50% במסירה");setQNote("");
  };

  const printQuote=(q,lns,tot)=>{
    const w=window.open("","_blank");
    const logo=document.querySelector("#appLogo");
    const dateStr=new Date().toLocaleDateString("he-IL",{year:"numeric",month:"long",day:"numeric"});
    const section=(label,val)=>val?`<div class="section"><div class="sec-label">${label}</div><div class="sec-val">${val.replace(/\n/g,"<br/>")}</div></div>`:"";
    w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="utf-8"><title>הצעת מחיר — ${q.client||""}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:36px 44px;direction:rtl;color:#1a1a2e;background:#fff;font-size:13px}
      .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #e8c547;padding-bottom:16px;margin-bottom:22px}
      .logo{height:52px;object-fit:contain}
      .doc-title{font-size:22px;font-weight:900;color:#1a1a2e}
      .doc-date{font-size:11px;color:#666;margin-top:4px}
      .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
      .meta-item{background:#f9f9f9;border-radius:8px;padding:10px 14px}
      .meta-label{font-size:10px;color:#888;font-weight:700;margin-bottom:3px}
      .meta-val{font-weight:700;font-size:14px}
      .section{margin-bottom:14px;padding:10px 14px;border:1px solid #e8e8e8;border-radius:8px}
      .sec-label{font-size:10px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
      .sec-val{font-size:13px;line-height:1.6}
      table{width:100%;border-collapse:collapse;margin:18px 0}
      th{background:#f5f5f5;padding:9px 10px;text-align:right;font-size:12px;color:#444;border-bottom:2px solid #e8c547}
      td{padding:9px 10px;border-bottom:1px solid #f0f0f0;font-size:13px}
      .total-row td{font-weight:900;font-size:16px;color:#b8950f;border-top:2px solid #e8c547;background:#fffbeb}
      .payment{background:#fffbeb;border:1px solid #e8c54760;border-radius:8px;padding:12px 16px;margin:16px 0}
      .payment-label{font-size:10px;font-weight:700;color:#888;margin-bottom:5px}
      .sign-block{margin-top:36px;display:grid;grid-template-columns:1fr 1fr;gap:30px}
      .sign-box{border:1px solid #ddd;border-radius:8px;padding:16px}
      .sign-title{font-size:11px;font-weight:700;color:#888;margin-bottom:30px}
      .sign-line{border-bottom:1px solid #ccc;margin-bottom:8px}
      .sign-name{font-size:10px;color:#aaa}
      .footer{margin-top:24px;border-top:1px solid #e0e0e0;padding-top:10px;font-size:9px;color:#aaa;text-align:center}
      @media print{body{padding:18px 24px}}
    </style></head><body>
    <div class="header">
      <div>${logo?`<img src="${logo.src}" class="logo"/>`:""}
        <div class="doc-title">הצעת מחיר</div>
        <div class="doc-date">תאריך: ${dateStr}</div>
      </div>
    </div>
    <div class="meta-grid">
      <div class="meta-item"><div class="meta-label">לקוח</div><div class="meta-val">${q.client||""}</div></div>
      <div class="meta-item"><div class="meta-label">פרויקט</div><div class="meta-val">${q.projName||""}</div></div>
    </div>
    ${section("תיאור הפרויקט",q.projDesc)}
    ${section("תכולה מפורטת",q.scope)}
    ${q.deliverables||q.formats||q.resolutions||q.ratios||q.platforms?`
    <div class="section">
      <div class="sec-label">תוצרים ומפרט</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:6px">
        ${q.deliverables?`<div><div style="font-size:10px;color:#888;margin-bottom:3px">תוצרים</div><div>${q.deliverables}</div></div>`:""}
        ${q.formats?`<div><div style="font-size:10px;color:#888;margin-bottom:3px">פורמטים</div><div>${q.formats}</div></div>`:""}
        ${q.resolutions?`<div><div style="font-size:10px;color:#888;margin-bottom:3px">רזולוציות</div><div>${q.resolutions}</div></div>`:""}
        ${q.ratios?`<div><div style="font-size:10px;color:#888;margin-bottom:3px">פרופורציות</div><div>${q.ratios}</div></div>`:""}
        ${q.platforms?`<div><div style="font-size:10px;color:#888;margin-bottom:3px">פלטפורמות</div><div>${q.platforms}</div></div>`:""}
        ${q.usageRights?`<div><div style="font-size:10px;color:#888;margin-bottom:3px">סמן שימוש</div><div>${q.usageRights}</div></div>`:""}
      </div>
    </div>`:""}
    ${section("באחריות הלקוח",q.clientResp)}
    <table>
      <thead><tr><th>תיאור</th><th style="width:70px">כמות</th><th style="width:90px">יחידה</th><th style="width:110px">מחיר יחידה</th><th style="width:110px">סה"כ</th></tr></thead>
      <tbody>${(lns||[]).map(l=>`<tr><td>${l.desc}</td><td>${l.qty}</td><td>${l.unit}</td><td>₪${(l.price||0).toLocaleString("he-IL")}</td><td>₪${((l.qty||0)*(l.price||0)).toLocaleString("he-IL")}</td></tr>`).join("")}</tbody>
      <tfoot><tr class="total-row"><td colspan="4">סה"כ כולל מע"מ</td><td>₪${(tot||0).toLocaleString("he-IL")}</td></tr></tfoot>
    </table>
    ${q.payment?`<div class="payment"><div class="payment-label">תנאי תשלום</div><div>${q.payment}</div></div>`:""}
    ${q.note?`<div class="section"><div class="sec-label">הערות</div><div class="sec-val">${q.note}</div></div>`:""}
    <div class="sign-block">
      <div class="sign-box"><div class="sign-title">אישור הזמנת עבודה — הלקוח</div><div class="sign-line" style="margin-bottom:8px"></div><div style="display:flex;gap:20px"><div style="flex:1"><div class="sign-line"></div><div class="sign-name">חתימה</div></div><div style="flex:1"><div class="sign-line"></div><div class="sign-name">תאריך</div></div></div><div style="margin-top:12px"><div class="sign-line"></div><div class="sign-name">שם וחותמת</div></div></div>
      <div class="sign-box"><div class="sign-title">אישור — הפקת פוסט</div><div class="sign-line" style="margin-bottom:8px"></div><div style="display:flex;gap:20px"><div style="flex:1"><div class="sign-line"></div><div class="sign-name">חתימה</div></div><div style="flex:1"><div class="sign-line"></div><div class="sign-name">תאריך</div></div></div><div style="margin-top:12px"><div class="sign-line"></div><div class="sign-name">שם וחותמת</div></div></div>
    </div>
    <div class="footer">PostFlow · הופק ב-${dateStr}</div>
    </body></html>`);
    w.document.close();setTimeout(()=>w.print(),400);
  };

  const openTplEdit=tid=>{if(tid==="new"){const id=uid();setEditingTplId(id);setEtName("תבנית חדשה");setEtLines([{id:uid(),desc:"",qty:1,unit:"פרויקט",price:0}]);}else{const t=tmpls.find(t=>t.id===tid);if(!t)return;setEditingTplId(tid);setEtName(t.name);setEtLines(t.lines.map(l=>({...l})));}setStep("editTpl");};
  const saveTpl=()=>{const existing=tmpls.find(t=>t.id===editingTplId);if(existing)onUpdateTemplates(tmpls.map(t=>t.id===editingTplId?{...t,name:etName,lines:etLines}:t));else onUpdateTemplates([...tmpls,{id:editingTplId,name:etName,lines:etLines}]);setStep("list");};

  if(step==="editTpl"&&isAdmin)return(<div className="fade">
    <button className="btn-ghost btn-sm" style={{marginBottom:14}} onClick={()=>setStep("list")}>← חזרה</button>
    <div className="section-title">✏️ עריכת תבנית</div>
    <div style={{marginBottom:12}}><Lbl>שם תבנית</Lbl><input value={etName} onChange={e=>setEtName(e.target.value)} style={{maxWidth:300}}/></div>
    <div style={{overflowX:"auto",marginBottom:12}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{borderBottom:"1px solid var(--border)"}}>{["תיאור","כמות","יחידה","מחיר",""].map(h=><th key={h} style={{textAlign:"right",padding:"6px 4px",fontSize:11,color:"var(--muted)"}}>{h}</th>)}</tr></thead>
        <tbody>
          {etLines.map(l=><tr key={l.id} style={{borderBottom:"1px solid var(--border)22"}}>
            <td style={{padding:"4px 3px",minWidth:160}}><input value={l.desc} onChange={e=>setEtLines(ls=>ls.map(x=>x.id===l.id?{...x,desc:e.target.value}:x))} style={{padding:"4px 8px"}}/></td>
            <td style={{padding:"4px 3px",width:60}}><input type="number" value={l.qty} onChange={e=>setEtLines(ls=>ls.map(x=>x.id===l.id?{...x,qty:+e.target.value||1}:x))} style={{padding:"4px 6px"}}/></td>
            <td style={{padding:"4px 3px",width:80}}><input value={l.unit} onChange={e=>setEtLines(ls=>ls.map(x=>x.id===l.id?{...x,unit:e.target.value}:x))} style={{padding:"4px 6px"}}/></td>
            <td style={{padding:"4px 3px",width:100}}><input type="number" value={l.price} onChange={e=>setEtLines(ls=>ls.map(x=>x.id===l.id?{...x,price:+e.target.value||0}:x))} style={{padding:"4px 6px"}}/></td>
            <td style={{padding:"4px 3px"}}><button className="btn-red" onClick={()=>setEtLines(ls=>ls.filter(x=>x.id!==l.id))}>✕</button></td>
          </tr>)}
        </tbody>
        <tfoot><tr><td colSpan={3} style={{padding:"8px 4px",fontWeight:700}}>סה"כ תבנית</td><td style={{fontWeight:900,color:"var(--gold)"}}>{fmtMoney(etLines.reduce((s,l)=>s+l.qty*l.price,0))}</td><td/></tr></tfoot>
      </table>
    </div>
    <div style={{display:"flex",gap:10}}>
      <button className="btn-ghost btn-sm" onClick={()=>setEtLines(ls=>[...ls,{id:uid(),desc:"",qty:1,unit:"פרויקט",price:0}])}>+ שורה</button>
      <button className="btn-gold" onClick={saveTpl}>💾 שמור תבנית</button>
    </div>
  </div>);

  if(step==="build")return(<div className="fade">
    <button className="btn-ghost btn-sm" style={{marginBottom:14}} onClick={()=>setStep("list")}>← חזרה</button>
    <div className="section-title">📝 הצעת מחיר — {tplName}</div>

    {/* פרטי לקוח ופרויקט */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>👤 פרטי לקוח ופרויקט</div>
      <div className="frow">
        <div className="fcol"><Lbl>שם לקוח</Lbl><input value={qClient} onChange={e=>setQClient(e.target.value)}/></div>
        <div className="fcol"><Lbl>שם הפרויקט</Lbl><input value={qProjName} onChange={e=>setQProjName(e.target.value)}/></div>
      </div>
      <div style={{marginBottom:10}}><Lbl>תיאור הפרויקט</Lbl><textarea value={qProjDesc} onChange={e=>setQProjDesc(e.target.value)} style={{minHeight:60}}/></div>
      <div style={{marginBottom:10}}><Lbl>תכולה מפורטת</Lbl><textarea value={qScope} onChange={e=>setQScope(e.target.value)} style={{minHeight:80}} placeholder="פירוט מלא של תכולת העבודה..."/></div>
    </div>

    {/* מפרט תוצרים */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>📦 תוצרים ומפרט</div>
      <div className="frow">
        <div className="fcol"><Lbl>רשימת תוצרים</Lbl><input value={qDeliverables} onChange={e=>setQDeliverables(e.target.value)} placeholder="סרט, טריילר, 3 קצרים..."/></div>
        <div className="fcol"><Lbl>פורמטים</Lbl><input value={qFormats} onChange={e=>setQFormats(e.target.value)} placeholder="ProRes, H.264, MP4..."/></div>
      </div>
      <div className="frow">
        <div className="fcol"><Lbl>רזולוציות</Lbl><input value={qResolutions} onChange={e=>setQResolutions(e.target.value)} placeholder="4K, 1080p, 720p..."/></div>
        <div className="fcol"><Lbl>פרופורציות</Lbl><input value={qRatios} onChange={e=>setQRatios(e.target.value)} placeholder="16:9, 9:16, 1:1..."/></div>
        <div className="fcol"><Lbl>פלטפורמות שידור</Lbl><input value={qPlatforms} onChange={e=>setQPlatforms(e.target.value)} placeholder="YouTube, TV, Cinema..."/></div>
      </div>
      <div className="frow">
        <div className="fcol"><Lbl>סמן שימוש</Lbl><input value={qUsageRights} onChange={e=>setQUsageRights(e.target.value)} placeholder="ישראל בלבד / עולמי / 3 שנים..."/></div>
        <div className="fcol"><Lbl>באחריות הלקוח</Lbl><input value={qClientResp} onChange={e=>setQClientResp(e.target.value)} placeholder="חומרי גלם, גישת סטורג', סינק מוסיקה..."/></div>
      </div>
    </div>

    {/* טבלת מחירים */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>💰 פירוט עלויות</div>
      <div style={{overflowX:"auto",marginBottom:12}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{borderBottom:"1px solid var(--border)"}}>{["תיאור","כמות","יחידה","מחיר יחידה",'סה"כ',""].map(h=><th key={h} style={{textAlign:"right",padding:"8px 4px",fontSize:11,color:"var(--muted)"}}>{h}</th>)}</tr></thead>
          <tbody>
            {lines.map(l=><tr key={l.id} style={{borderBottom:"1px solid var(--border)"}}>
              <td style={{padding:"5px 3px",minWidth:160}}><input value={l.desc} onChange={e=>updLine(l.id,"desc",e.target.value)} style={{padding:"5px 8px"}}/></td>
              <td style={{padding:"5px 3px",width:70}}><input type="number" value={l.qty} onChange={e=>updLine(l.id,"qty",e.target.value)} style={{padding:"5px 8px"}}/></td>
              <td style={{padding:"5px 3px",width:100}}><input value={l.unit} onChange={e=>updLine(l.id,"unit",e.target.value)} style={{padding:"5px 8px"}}/></td>
              <td style={{padding:"5px 3px",width:110}}><input type="number" value={l.price} onChange={e=>updLine(l.id,"price",e.target.value)} style={{padding:"5px 8px"}}/></td>
              <td style={{padding:"5px 3px",fontWeight:700,color:"var(--gold)"}}>{fmtMoney(l.qty*l.price)}</td>
              <td><button className="btn-red" onClick={()=>setLines(ls=>ls.filter(x=>x.id!==l.id))}>✕</button></td>
            </tr>)}
          </tbody>
          <tfoot><tr><td colSpan={4} style={{padding:"10px 4px",fontWeight:700,fontSize:15}}>סה"כ</td><td style={{fontWeight:900,fontSize:20,color:"var(--gold)"}}>{fmtMoney(total)}</td><td/></tr></tfoot>
        </table>
      </div>
      <button className="btn-ghost btn-sm" onClick={()=>setLines(ls=>[...ls,{id:uid(),desc:"",qty:1,unit:"פרויקט",price:0}])}>+ שורה</button>
    </div>

    {/* תנאי תשלום והערות */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>📋 תנאים והערות</div>
      <div style={{marginBottom:10}}><Lbl>תנאי תשלום</Lbl><input value={qPayment} onChange={e=>setQPayment(e.target.value)}/></div>
      <div style={{marginBottom:10}}><Lbl>הערות נוספות</Lbl><textarea value={qNote} onChange={e=>setQNote(e.target.value)}/></div>
    </div>

    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:8}}>
      <button className="btn-gold" onClick={save}>💾 שמור הצעה</button>
      <button className="btn-blue" onClick={()=>printQuote({client:qClient,projName:qProjName,projDesc:qProjDesc,deliverables:qDeliverables,formats:qFormats,resolutions:qResolutions,ratios:qRatios,platforms:qPlatforms,usageRights:qUsageRights,clientResp:qClientResp,scope:qScope,payment:qPayment,note:qNote},lines,total)}>🖨️ הדפסה / PDF</button>
      <SaveAsTemplateBtn lines={lines} payment={qPayment} tmpls={tmpls} onUpdateTemplates={onUpdateTemplates}/>
    </div>
  </div>);

  return(<div className="fade">
    <div className="section-title">📝 הצעות מחיר</div>
    <div style={{marginBottom:16}}><Lbl>פרויקט</Lbl><select value={projId} onChange={e=>setProjId(e.target.value)} style={{maxWidth:400}}><option value="">— בחר פרויקט —</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
    <div style={{fontWeight:700,marginBottom:12}}>תבניות</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:10,marginBottom:20}}>
      {tmpls.map(t=><div key={t.id} className="card2" style={{cursor:"pointer",transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--gold)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
        <div onClick={()=>loadTemplate(t.id)} style={{marginBottom:8}}>
          <div style={{fontWeight:700,marginBottom:4}}>{t.name}</div>
          <div style={{fontSize:11,color:"var(--muted)"}}>{t.lines.length} סעיפים · {fmtMoney(t.lines.reduce((s,l)=>s+l.qty*l.price,0))}</div>
        </div>
        {isAdmin&&<button className="btn-ghost btn-sm" style={{fontSize:10}} onClick={e=>{e.stopPropagation();openTplEdit(t.id);}}>✏️ ערוך</button>}
      </div>)}
      {isAdmin&&<div className="card2" style={{cursor:"pointer",borderStyle:"dashed"}} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--gold)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
        <div onClick={()=>openTplEdit("new")} style={{fontWeight:700,marginBottom:6}}>+ תבנית חדשה</div>
        <div onClick={()=>{setTplName("מותאם");setLines([{id:uid(),desc:"",qty:1,unit:"פרויקט",price:0}]);const p=projects.find(x=>x.id===projId);setQClient(p?.client||"");setQProjName(p?.name||"");setStep("build");}} style={{fontSize:11,color:"var(--muted)",cursor:"pointer"}}>או בנה מאפס</div>
      </div>}
    </div>
    {projects.some(p=>(p.quotes||[]).length)&&<>
      <div style={{fontWeight:700,fontSize:13,color:"var(--muted2)",marginBottom:10}}>הצעות שמורות</div>
      {projects.flatMap(p=>(p.quotes||[]).map(q=>({...q,projName:p.name,projId:p.id}))).map(q=><div key={q.id} className="card2" style={{marginBottom:8,borderRight:`3px solid ${q.approved?"var(--green)":"var(--border2)"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div><div style={{fontWeight:700}}>{q.projName} · {q.client}</div><div style={{fontSize:11,color:"var(--muted)"}}>{q.date} · {q.template}</div></div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <div style={{fontWeight:800,color:"var(--gold)"}}>{fmtMoney(q.total)}</div>
            <button className="btn-blue btn-sm" onClick={()=>printQuote(q,q.lines||[],q.total)}>🖨️</button>
            {q.approved?<span className="tag" style={{color:"var(--green)",background:"var(--green)20"}}>✅ אושרה</span>:<button className="btn-green btn-sm" onClick={()=>onSave(q.projId,{...q,approved:true},true)}>✓ אשר</button>}
          </div>
        </div>
      </div>)}
    </>}
  </div>);
}

function PasswordVault(){

function PermissionsEditor({user,onSave,onClose}){
  const role=user.role||"worker";
  const [perms,setPerms]=useState(()=>getPerms(user));
  const toggle=k=>setPerms(p=>({...p,[k]:!p[k]}));
  const isDefault=k=>perms[k]===(PERM_DEFS.find(d=>d.key===k)?.default[role]||false);
  return(<div className="modal-bg" onClick={onClose}>
    <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>🔑 הרשאות — {user.name}</div>
      <div style={{fontSize:11,color:"var(--muted)",marginBottom:16}}>תפקיד: <RoleBadge role={role}/> · שינויים ידניים מחליפים ברירות מחדל של התפקיד</div>
      <div style={{display:"grid",gap:8}}>
        {PERM_DEFS.map(d=>{
          const val=perms[d.key];
          const def=d.default[role]||false;
          const custom=user.permissions&&user.permissions[d.key]!==undefined&&user.permissions[d.key]!==def;
          return(<div key={d.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"var(--card2)",borderRadius:8,border:`1px solid ${custom?"var(--orange)":"var(--border)"}`}}>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{d.label}</div>
              {custom&&<div style={{fontSize:10,color:"var(--orange)"}}>שונה מברירת מחדל ({def?"✓":"✗"})</div>}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {custom&&<button style={{fontSize:10,background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"2px 6px",color:"var(--muted)",cursor:"pointer"}} onClick={()=>setPerms(p=>({...p,[d.key]:def}))}>↩ ברירת מחדל</button>}
              <div onClick={()=>toggle(d.key)} style={{width:40,height:22,borderRadius:11,background:val?"var(--green)":"var(--border2)",cursor:"pointer",position:"relative",transition:"background .2s"}}>
                <div style={{position:"absolute",top:3,left:val?20:3,width:16,height:16,borderRadius:"50%",background:"white",transition:"left .2s"}}/>
              </div>
            </div>
          </div>);
        })}
      </div>
      <div style={{display:"flex",gap:10,marginTop:18}}>
        <button className="btn-gold" onClick={()=>onSave(perms)}>💾 שמור הרשאות</button>
        <button className="btn-ghost" onClick={()=>{
          if(window.confirm("איפוס לברירות מחדל של תפקיד?"))onSave(null);
        }}>↩ אפס לברירת מחדל</button>
        <button className="btn-ghost" onClick={onClose}>ביטול</button>
      </div>
    </div>
  </div>);
}

function UserMgmt({users,onUpdate,currentUser,onSyncUser}){
  const [form,setForm]=useState({name:"",email:"",role:"worker",password:"",phone:"",active:"true"});
  const [editId,setEditId]=useState(null);
  const [permUser,setPermUser]=useState(null);
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const save=()=>{
    if(!form.name)return;
    const newUser=editId?{...users.find(u=>u.id===editId),...form}:{id:uid(),...form};
    if(editId)onUpdate(users.map(u=>u.id===editId?newUser:u));else onUpdate([...users,newUser]);
    if(onSyncUser)onSyncUser(newUser);
    setEditId(null);setForm({name:"",email:"",role:"worker",password:"",phone:"",active:"true"});
  };
  const hasGuest=users.some(u=>u.role==="guest");
  const addGuestUser=()=>{
    if(hasGuest)return;
    const g={id:uid(),name:"אורח",email:"",role:"guest",password:"",phone:"",active:"true"};
    onUpdate([...users,g]);
    if(onSyncUser)onSyncUser(g);
  };
  return(<div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontWeight:800,fontSize:20}}>👥 ניהול משתמשים</div>
      {!hasGuest&&<button className="btn-ghost btn-sm" onClick={addGuestUser}>👁 הוסף כניסת אורח</button>}
      {hasGuest&&<span style={{fontSize:11,color:"var(--green)"}}>👁 כניסת אורח פעילה</span>}
    </div>
    <div className="card" style={{marginBottom:20}}>
      <div style={{fontWeight:700,marginBottom:14}}>{editId?"✏️ עריכת משתמש":"+ הוספת משתמש"}</div>
      <div className="frow"><div className="fcol"><Lbl>שם מלא</Lbl><input value={form.name} onChange={f("name")}/></div><div className="fcol"><Lbl>אימייל</Lbl><input type="email" value={form.email} onChange={f("email")} disabled={form.role==="guest"}/></div><div className="fcol"><Lbl>טלפון</Lbl><input value={form.phone} onChange={f("phone")}/></div></div>
      <div className="frow">
        <div className="fcol"><Lbl>תפקיד</Lbl><select value={form.role} onChange={f("role")}><option value="admin">מנהל — גישה מלאה</option><option value="producer">מפיקה — ניהול פרויקט</option><option value="worker">עובד — לוח + שעות</option></select></div>
        <div className="fcol"><Lbl>סיסמה</Lbl><input type="text" value={form.password} onChange={f("password")}/></div>
        <div className="fcol"><Lbl>פעיל</Lbl><select value={form.active} onChange={f("active")}><option value="true">פעיל</option><option value="false">לא פעיל</option></select></div>
      </div>
      <div style={{display:"flex",gap:10}}><button className="btn-gold btn-sm" onClick={save}>{editId?"💾 שמור":"+ הוסף"}</button>{editId&&<button className="btn-ghost btn-sm" onClick={()=>{setEditId(null);setForm({name:"",email:"",role:"worker",password:"",phone:"",active:"true"});}}>ביטול</button>}</div>
    </div>
    <div style={{display:"grid",gap:10}}>
      {users.map(u=><div key={u.id} className="card2" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}><Avatar name={u.name} idx={users.indexOf(u)} size={36}/><div><div style={{fontWeight:700}}>{u.name}</div><div style={{fontSize:11,color:"var(--muted)"}}>{u.email}{u.phone?` · ${u.phone}`:""}</div></div></div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <RoleBadge role={u.role}/>
          {u.id!==currentUser.id&&<>
            <button className="btn-blue btn-sm" onClick={()=>{setEditId(u.id);setForm({name:u.name,email:u.email,role:u.role,password:u.password||"",phone:u.phone||"",active:u.active||"true"});}}>✏️ ערוך</button>
            <button className="btn-ghost btn-sm" title="עריכת הרשאות" onClick={()=>setPermUser(u)}>🔑 הרשאות</button>
            <button className="btn-ghost btn-sm" onClick={()=>onUpdate(users.map(x=>x.id===u.id?{...x,password:"1234"}:x))}>↩ אפס סיסמה</button>
            <button className="btn-red" onClick={()=>onUpdate(users.filter(x=>x.id!==u.id))}>הסר</button>
          </>}
        </div>
      </div>)}
    </div>
    {permUser&&<PermissionsEditor user={permUser} onClose={()=>setPermUser(null)} onSave={perms=>{
      const updated=users.map(u=>u.id===permUser.id?{...u,permissions:perms===null?undefined:perms}:u);
      onUpdate(updated);
      if(onSyncUser)onSyncUser(updated.find(u=>u.id===permUser.id));
      setPermUser(null);
    }}/>}
  </div>);
}

function SheetsSettings({projects,users,onProjectsLoaded,onStaffLoaded,onSettingsLoaded}){
  const [url,setUrl]=useState(getSheetsUrl);const [msg,setMsg]=useState("");const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(()=>localStorage.getItem("pf_v8_last_sync")||"");
  const save=()=>{setSheetsUrl(url.trim());setMsg("✅ URL נשמר");};
  const test=async()=>{setMsg("בודק...");try{const r=await fetch(`${url.trim()}?action=ping`);const j=await r.json();setMsg(j.ok?"✅ מחובר!":"❌ "+j.error);}catch(e){setMsg("❌ "+e.message);}};
  const pull=async()=>{setSyncing(true);setMsg("מושך...");try{const u=getSheetsUrl();
    const[projs,staff,settingsRows]=await Promise.all([
      sheetsCall(u,{action:"getAll",sheet:"projects"}),
      sheetsCall(u,{action:"getAll",sheet:"staff"}),
      sheetsCall(u,{action:"getAll",sheet:"settings"})
    ]);
    if(projs)onProjectsLoaded(projs.map(r=>({tasks:[],shifts:[],hours:[],quotes:[],plan:{crew:[],milestones:[],notes:""},...mapProject(r)})));
    if(staff)onStaffLoaded(staff.map(mapStaff));
    if(settingsRows&&settingsRows.length)onSettingsLoaded(settingsRows);
    const now=new Date().toLocaleString("he-IL");setLastSync(now);localStorage.setItem("pf_v8_last_sync",now);setMsg("✅ עודכן!");}catch(e){setMsg("❌ "+e.message);}setSyncing(false);};
  const push=async()=>{setSyncing(true);setMsg("שולח...");try{const u=getSheetsUrl();
    await Promise.all([
      sheetsPost(u,{action:"batchUpdate",sheet:"projects",rows:projects}),
      sheetsPost(u,{action:"batchUpdate",sheet:"staff",rows:users}),
    ]);
    const now=new Date().toLocaleString("he-IL");setLastSync(now);localStorage.setItem("pf_v8_last_sync",now);setMsg("✅ עודכן!");}catch(e){setMsg("❌ "+e.message);}setSyncing(false);};
  return(<div className="fade">
    <div className="section-title">☁️ Google Sheets Sync</div>
    {lastSync&&<div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>סנכרון אחרון: {lastSync}</div>}
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>Web App URL</div>
      <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec" style={{fontFamily:"monospace",fontSize:12,marginBottom:12}}/>
      <div style={{display:"flex",gap:10}}><button className="btn-gold btn-sm" onClick={save}>💾 שמור</button><button className="btn-blue btn-sm" onClick={test} disabled={!url.trim()}>🔌 בדוק</button></div>
      {msg&&<div style={{marginTop:10,fontSize:13,color:msg.startsWith("✅")?"var(--green)":"var(--red)"}}>{msg}</div>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
      <div className="card" style={{textAlign:"center"}}><div style={{fontSize:32,marginBottom:8}}>⬇️</div><div style={{fontWeight:700,marginBottom:10}}>משוך מ-Sheets</div><button className="btn-blue" onClick={pull} disabled={syncing||!getSheetsUrl()}>{syncing?"⏳":"⬇️ משוך הכל"}</button></div>
      <div className="card" style={{textAlign:"center"}}><div style={{fontSize:32,marginBottom:8}}>⬆️</div><div style={{fontWeight:700,marginBottom:10}}>דחוף ל-Sheets</div><button className="btn-green" onClick={push} disabled={syncing||!getSheetsUrl()}>{syncing?"⏳":"⬆️ דחוף הכל"}</button></div>
    </div>
    <div className="card">
      <div style={{fontWeight:700,marginBottom:10}}>מבנה גיליונות</div>
      {[
  {n:"staff",f:"id, name, role, email, phone, active, password"},
  {n:"projects",f:"id, projectNumber, name, producer, shootDate, offlineScreening, onlineScreening, deliveryDate, status, progress, client, description, statusNote"},
  {n:"calendar",f:"id, date, timeStart, timeEnd, personName, projName, tasks, note, projId, person, deleted, deletedBy, deletedAt"},
  {n:"hours_report",f:"id, workerName, date, timeIn, timeOut, totalHours, note"},
  {n:"settings",f:"key, value, label, updatedAt"},
  {n:"quotes",f:"id, projId, date, client, total, approved, template, note"}
].map(s=><div key={s.n} style={{display:"flex",gap:12,padding:"8px 0",borderBottom:"1px solid var(--border)22",flexWrap:"wrap"}}><div style={{fontWeight:700,color:"var(--gold)",minWidth:110}}>{s.n}</div><div style={{fontSize:11,color:"var(--muted)",fontFamily:"monospace"}}>{s.f}</div></div>)}
    </div>
  </div>);
}

// BACKUP — auto-save + manual + drive folder
// ══════════════════════════════════════════
function BackupPanel({users,projects,passwords,lastAutoSave,onRestore,driveFolder,onCloudRestore}){
  const [confirm,setConfirm]=useState(false);const [rd,setRd]=useState(null);const [err,setErr]=useState("");const [driveMsg,setDriveMsg]=useState("");const [cloudMsg,setCloudMsg]=useState("");
  const handleFile=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.projects||d.users){setRd(d);setConfirm(true);}else setErr("קובץ לא תקין");}catch{setErr("שגיאת קריאה");}};r.readAsText(file);};
  const backupToDrive=async()=>{
    const url=getSheetsUrl();
    if(!url){setDriveMsg("❌ אין URL של Sheets — הגדר ב'Sheets'");return;}
    setDriveMsg("שומר...");
    try{
      const filename=`postflow_backup_v16_${todayStr()}.json`;
      const allData={users,projects,passwords,exportDate:todayStr(),version:"v16"};
      await fetch(url,{method:"POST",body:JSON.stringify({action:"saveBackup",data:JSON.stringify(allData),filename,folderId:driveFolder||""})});
      setDriveMsg(`✅ גיבוי נשמר${driveFolder?" בתיקיה המוגדרת":""} — ${filename}`);
    }catch(e){setDriveMsg("❌ "+e.message);}
  };
  const cloudRestore=async()=>{
    const url=getSheetsUrl();
    if(!url){setCloudMsg("❌ אין URL של Sheets — הגדר בהגדרות");return;}
    setCloudMsg("מושך מענן...");
    try{
      const r=await sheetsPost(url,{action:"getCloudBackup"});
      if(!r||!r.data){setCloudMsg("❌ לא נמצא גיבוי בענן");return;}
      const d=r.data;
      if(d.projects||d.users){setRd(d);setConfirm(true);setCloudMsg("");}
      else setCloudMsg("❌ גיבוי לא תקין");
    }catch(e){setCloudMsg("❌ "+e.message);}
  };

  return(<div className="fade">
    <div className="section-title">💾 גיבוי ושחזור</div>
    {lastAutoSave&&<div style={{fontSize:12,color:"var(--green)",marginBottom:14}}>✅ גיבוי אוטומטי אחרון: {lastAutoSave}</div>}
    {driveFolder&&<div style={{fontSize:12,color:"var(--blue)",marginBottom:14,padding:"8px 12px",background:"var(--blue)15",borderRadius:8}}>📁 תיקיית Drive: <code style={{fontSize:11}}>{driveFolder}</code></div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:20}}>
      {[
        {icon:"🗄️",label:"גיבוי מלא (JSON)",desc:"משתמשים + פרויקטים + סיסמאות",action:()=>dlJSON({users,projects,passwords,exportDate:todayStr(),version:"v16"},`postflow_backup_v16_${todayStr()}.json`),color:"var(--blue)"},
        {icon:"🎬",label:"פרויקטים בלבד",desc:"JSON של כל הפרויקטים",action:()=>dlJSON({projects},`postflow_projects_${todayStr()}.json`),color:"var(--gold)"},
        {icon:"📝",label:"הצעות מחיר",desc:"CSV לפי עמודות הגיליון",action:()=>{const rows=[["id","projId","date","client","total","approved","template","note"]];projects.forEach(p=>(p.quotes||[]).forEach(q=>rows.push([q.id||"",p.id,q.date||"",q.client||"",q.total||0,q.approved?"true":"false",q.template||"",q.note||""])));dlCSV(rows,`הצעות_מחיר_${todayStr()}.csv`);},color:"var(--purple)"},
        {icon:"⏱",label:"שעות עבודה",desc:"CSV של כל דיווחי השעות",action:()=>{const rows=[["עובד","פרויקט","תאריך","כניסה","יציאה","שעות","הערה"]];projects.forEach(p=>(p.hours||[]).forEach(h=>{const u=users.find(u=>u.id===h.worker);rows.push([u?.name||h.worker,p.name,h.date,h.timeIn||"",h.timeOut||"",h.hours.toFixed(1),h.note||""]);} ));dlCSV(rows,`שעות_${todayStr()}.csv`);},color:"var(--green)"},
      ].map(b=><div key={b.label} className="card" style={{cursor:"pointer",textAlign:"center",transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=b.color} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"} onClick={b.action}>
        <div style={{fontSize:30,marginBottom:8}}>{b.icon}</div><div style={{fontWeight:700,marginBottom:4}}>{b.label}</div><div style={{fontSize:11,color:"var(--muted)"}}>{b.desc}</div>
      </div>)}
      <div className="card" style={{cursor:"pointer",textAlign:"center",transition:"border-color .2s",borderColor:"var(--green)40"}} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--green)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--green)40"} onClick={backupToDrive}>
        <div style={{fontSize:30,marginBottom:8}}>☁️</div>
        <div style={{fontWeight:700,marginBottom:4}}>גיבוי ל-Drive</div>
        <div style={{fontSize:11,color:"var(--muted)"}}>שמור את כל הנתונים ב-Google Drive{driveFolder?" (תיקיה מוגדרת)":""}</div>
        {driveMsg&&<div style={{fontSize:12,marginTop:8,color:driveMsg.startsWith("✅")?"var(--green)":"var(--red)"}}>{driveMsg}</div>}
      </div>
      <div className="card" style={{cursor:"pointer",textAlign:"center",transition:"border-color .2s",borderColor:"var(--blue)40"}} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--blue)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--blue)40"} onClick={cloudRestore}>
        <div style={{fontSize:30,marginBottom:8}}>⬇️</div>
        <div style={{fontWeight:700,marginBottom:4}}>משוך גיבוי מענן</div>
        <div style={{fontSize:11,color:"var(--muted)"}}>שחזר נתונים מגיבוי שמור ב-Drive</div>
        {cloudMsg&&<div style={{fontSize:12,marginTop:8,color:cloudMsg.includes("✅")?"var(--green)":"var(--red)"}}>{cloudMsg}</div>}
      </div>
    </div>
    <div className="card">{err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:10}}>{err}</div>}
      <div style={{fontWeight:700,marginBottom:12}}>📥 שחזור מקובץ JSON</div>
      <label className="btn-ghost" style={{cursor:"pointer",display:"inline-block"}}>📁 בחר קובץ JSON<input type="file" accept=".json" style={{display:"none"}} onChange={handleFile}/></label>
    </div>
    {confirm&&rd&&<div className="modal-bg" onClick={()=>setConfirm(false)}>
      <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:800,fontSize:18,marginBottom:14}}>⚠️ אישור שחזור</div>
        <div style={{fontSize:13,color:"var(--muted2)",marginBottom:20}}>נמצאו: {rd.projects?.length||0} פרויקטים · {rd.users?.length||0} משתמשים · {rd.passwords?.length||0} סיסמאות<br/><br/><b style={{color:"var(--red)"}}>פעולה זו תחליף את כל הנתונים!</b></div>
        <div style={{display:"flex",gap:10}}><button className="btn-gold" onClick={()=>{onRestore(rd);setConfirm(false);}}>✓ אשר שחזור</button><button className="btn-ghost" onClick={()=>setConfirm(false)}>ביטול</button></div>
      </div>
    </div>}
  </div>);
}

// SETTINGS — logo + shift types + drive folder
// ══════════════════════════════════════════
function Settings({shiftTypes,onUpdateShiftTypes,logoUrl,onUpdateLogo,driveFolder,onUpdateDriveFolder,onSaveShiftTypesToSheets,onPullSettingsFromSheets}){
  const [etSt,setEtSt]=useState(shiftTypes||DEF_SHIFT_TYPES);
  const [dFolder,setDFolder]=useState(driveFolder||"");
  const [stMsg,setStMsg]=useState("");
  // re-sync local state when parent shiftTypes changes (e.g. after pull from sheets)
  useEffect(()=>setEtSt(shiftTypes||DEF_SHIFT_TYPES),[shiftTypes]);
  const updSt=(id,k,v)=>setEtSt(ts=>ts.map(t=>t.id===id?{...t,[k]:v}:t));
  const saveSt=async()=>{
    onUpdateShiftTypes(etSt);
    if(onSaveShiftTypesToSheets){
      setStMsg("שולח...");
      const r=await onSaveShiftTypesToSheets(etSt);
      setStMsg(r&&r.ok!==false?"✅ נשמר בגליון":"❌ שגיאה — בדוק URL");
      setTimeout(()=>setStMsg(""),3000);
    }
  };
  const pullSt=async()=>{
    if(!onPullSettingsFromSheets){setStMsg("❌ הגדר URL של Sheets קודם");setTimeout(()=>setStMsg(""),3000);return;}
    setStMsg("מושך...");
    const r=await onPullSettingsFromSheets();
    if(r&&r.shiftTypes)setEtSt(r.shiftTypes);
    setStMsg(r?"✅ עודכן מגליון":"❌ שגיאה");
    setTimeout(()=>setStMsg(""),3000);
  };
  return(<div className="fade">
    <div className="section-title">⚙️ הגדרות מערכת</div>
    {/* Logo */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>🖼 לוגו מותאם אישית</div>
      {logoUrl&&<div style={{marginBottom:12}}><img src={logoUrl} style={{height:50,objectFit:"contain",borderRadius:6}} alt="logo"/></div>}
      <div className="frow">
        <div className="fcol"><Lbl>URL של תמונה (PNG/JPG/SVG)</Lbl><input value={logoUrl||""} onChange={e=>onUpdateLogo(e.target.value)} placeholder="https://..."/></div>
      </div>
      <div style={{fontSize:11,color:"var(--muted)"}}>💡 העלה תמונה ל-imgur.com או Cloudinary, הדבק את ה-URL ישירות כאן</div>
    </div>
    {/* Drive folder */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12}}>📁 תיקיית גיבוי ב-Google Drive</div>
      <div style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>הכנס את ה-ID של התיקיה ב-Drive לשמירת גיבויים אוטומטיים. נמצא ב-URL של התיקיה: <code style={{color:"var(--gold)"}}>drive.google.com/drive/folders/<b>FOLDER_ID</b></code></div>
      <div className="frow">
        <div className="fcol"><Lbl>Folder ID</Lbl><input value={dFolder} onChange={e=>setDFolder(e.target.value)} placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs..."/></div>
      </div>
      <button className="btn-gold btn-sm" onClick={()=>{setDriveFolder(dFolder);onUpdateDriveFolder(dFolder);}}>💾 שמור</button>
      {dFolder&&<div style={{fontSize:11,color:"var(--green)",marginTop:8}}>✅ תיקיה מוגדרת — גיבויים ישמרו שם</div>}
    </div>
    {/* Shift types */}
    <div className="card">
      <div style={{fontWeight:700,marginBottom:14}}>🎬 סוגי משמרות / משימות</div>
      {etSt.map(t=><div key={t.id} style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
        <input type="color" value={t.color} onChange={e=>updSt(t.id,"color",e.target.value)} style={{width:36,height:36,padding:2,cursor:"pointer",background:"none",border:"1px solid var(--border)",borderRadius:6}}/>
        <input value={t.label} onChange={e=>updSt(t.id,"label",e.target.value)} style={{flex:1}}/>
        <span className="tag" style={{background:t.color+"20",color:t.color,border:`1px solid ${t.color}40`,minWidth:80,justifyContent:"center"}}>{t.label}</span>
        <button className="btn-red" onClick={()=>setEtSt(ts=>ts.filter(x=>x.id!==t.id))}>✕</button>
      </div>)}
      <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
        <button className="btn-ghost btn-sm" onClick={()=>setEtSt(ts=>[...ts,{id:uid(),label:"חדש",color:"#94a3b8"}])}>+ הוסף סוג</button>
        <button className="btn-gold btn-sm" onClick={saveSt}>💾 שמור + סנכרן Sheets</button>
        <button className="btn-ghost btn-sm" onClick={pullSt}>☁️ משוך מגליון</button>
        {stMsg&&<span style={{fontSize:12,color:stMsg.startsWith("✅")?"var(--green)":stMsg.startsWith("❌")?"var(--red)":"var(--muted)",alignSelf:"center"}}>{stMsg}</span>}
      </div>
      <div style={{fontSize:11,color:"var(--muted)",marginTop:8}}>💡 גליון <code style={{color:"var(--gold)"}}>settings</code> — ניתן לערוך שם ולמשוך חזרה לאפליקציה</div>
    </div>
  </div>);
}

// NEW PROJECT MODAL
// ══════════════════════════════════════════
function NewProjectModal({onClose,onAdd,nextNum}){
  const [form,setForm]=useState({name:"",client:"",producer:"",status:"active",description:""});
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const submit=()=>{if(!form.name)return;const pn=String(nextNum).padStart(3,"0");onAdd({id:uid(),projectNumber:pn,...form,progress:0,shootDate:"",offlineScreening:"",onlineScreening:"",deliveryDate:"",statusNote:"",budgetPlanned:0,budgetActual:0,tasks:[],shifts:[],hours:[],quotes:[],plan:{crew:[],milestones:[],notes:""}});onClose();};
  return(<div className="modal-bg" onClick={onClose}>
    <div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:20}}>פרויקט חדש #{String(nextNum).padStart(3,"0")}</div>
      <div className="frow"><div className="fcol"><Lbl>שם הפרויקט *</Lbl><input value={form.name} onChange={f("name")} autoFocus/></div><div className="fcol"><Lbl>לקוח</Lbl><input value={form.client} onChange={f("client")}/></div></div>
      <div className="frow"><div className="fcol"><Lbl>מפיקה אחראית</Lbl><input value={form.producer} onChange={f("producer")}/></div><div className="fcol"><Lbl>סטטוס</Lbl><select value={form.status} onChange={f("status")}>{Object.entries(STATUS_CFG).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div></div>
      <div style={{marginBottom:14}}><Lbl>תיאור</Lbl><textarea value={form.description} onChange={f("description")} style={{minHeight:60}}/></div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button className="btn-ghost" onClick={onClose}>ביטול</button><button className="btn-gold" onClick={submit}>✓ צור פרויקט</button></div>
    </div>
  </div>);
}

// ══════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════
function App({initialData}){
  const [data,setData]=useState(initialData);
  const {users,projects,passwords,shiftTypes,quoteTemplates,nextProjNum,logoUrl,clients}=data;
  const upd=patch=>setData(d=>({...d,...patch}));
  const updateProject=p=>upd({projects:data.projects.map(x=>x.id===p.id?p:x)});
  const addProject=p=>upd({projects:[...data.projects,p],nextProjNum:(data.nextProjNum||1)+1});
  const addQuote=(pid,q,update)=>upd({projects:data.projects.map(p=>{if(p.id!==pid)return p;if(update)return{...p,quotes:(p.quotes||[]).map(x=>x.id===q.id?q:x)};return{...p,quotes:[...(p.quotes||[]),q]};})});
  const [driveFolder,setDriveFolderState]=useState(getDriveFolder);
  const handleUpdateDriveFolder=v=>{setDriveFolderState(v);setDriveFolder(v);};

  const [currentUser,setCurrentUser]=useState(null);
  const [view,setView]=useState("dashboard");
  const [selProjId,setSelProjId]=useState(null);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [showNewProj,setShowNewProj]=useState(false);
  const [lastAutoSave,setLastAutoSave]=useState("");
  const [calEditModal,setCalEditModal]=useState(null);

  // Persist to localStorage
  useEffect(()=>{saveLocal(data);},[data]);

  // Auto-save every 2 minutes
  useEffect(()=>{
    const t=setInterval(()=>{
      saveLocal(data);
      const now=new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
      setLastAutoSave(now);
    },120000);
    // auto cloud backup every 10 minutes
    const t2=setInterval(()=>{
      const url=getSheetsUrl();if(!url)return;
      const fname=`postflow_autobkp_${todayStr()}.json`;
      const payload={users:data.users,projects:data.projects,exportDate:todayStr(),version:"v16"};
      sheetsPost(url,{action:"saveBackup",filename:fname,data:JSON.stringify(payload),folderId:getDriveFolder()}).catch(()=>{});
    },600000);
    return()=>{clearInterval(t);clearInterval(t2);};
  },[data]);

  // Save before tab close
  useEffect(()=>{
    const h=()=>saveLocal(data);
    window.addEventListener("beforeunload",h);
    return()=>window.removeEventListener("beforeunload",h);
  },[data]);

  // Update logo in splash
  useEffect(()=>{if(logoUrl)Splash.setLogo(logoUrl);},[logoUrl]);

  // Auto-sync Sheets — רץ פעם אחת בלבד אחרי לוגין, לא יוצר לופ
  const didSyncRef=useRef(false);
  useEffect(()=>{
    if(!currentUser||didSyncRef.current)return;
    const url=getSheetsUrl();
    if(!url)return;
    didSyncRef.current=true;
    (async()=>{
      try{
        const[projs,pws,staff,settingsRows]=await Promise.all([
          sheetsCall(url,{action:"getAll",sheet:"projects"}),
          sheetsCall(url,{action:"getAll",sheet:"passwords"}),
          sheetsCall(url,{action:"getAll",sheet:"staff"}),
          sheetsCall(url,{action:"getAll",sheet:"settings"})
        ]);
        const patch={};
        const localData=loadLocal();
        const localProjects=localData.projects||[];
        if(projs&&projs.length)patch.projects=projs.map(r=>{
          const local=localProjects.find(p=>p.id===r.id);
          return{tasks:local?.tasks||[],shifts:local?.shifts||[],hours:local?.hours||[],quotes:local?.quotes||[],plan:local?.plan||{crew:[],milestones:[],notes:""},...mapProject(r)};
        });
        if(pws&&pws.length)patch.passwords=pws.map(mapPassword);
        if(staff&&staff.length){
          patch.users=staff.map(mapStaff);
          const maxNum=Math.max(0,...(patch.projects||localProjects).map(p=>parseInt(p.projectNumber||0)||0));
          patch.nextProjNum=maxNum+1;
        }
        if(settingsRows&&settingsRows.length){
          settingsRows.forEach(row=>{
            if(row.key==="shiftTypes"&&row.value){try{const st=JSON.parse(row.value);if(Array.isArray(st)&&st.length)patch.shiftTypes=st;}catch{}}
            if(row.key==="logoUrl"&&row.value)patch.logoUrl=row.value;
          });
        }
        if(Object.keys(patch).length)upd(patch);
      }catch{}
    })();
  },[currentUser]);

  if(!currentUser)return(<><GS/><Login users={users} logoUrl={logoUrl} onLogin={u=>{
    if(u.role==="guest"){setCurrentUser(u);setView("calendar");return;}
    const fresh=users.find(x=>x.id===u.id)||u;
    setCurrentUser({...fresh,role:fresh.role||"worker"});setView("dashboard");
  }}/></>);

  const isAdmin=currentUser.role==="admin",isProd=currentUser.role==="producer",isGuest=currentUser.role==="guest";
  const selProj=projects.find(p=>p.id===selProjId);
  const goto=id=>{setView(id);setSelProjId(null);setSidebarOpen(false);};
  const gotoProj=id=>{setSelProjId(id);setView("project");setSidebarOpen(false);};

  const sts=shiftTypes||DEF_SHIFT_TYPES;

  const syncSettingsToSheets=async(key,value,label)=>{
    const url=getSheetsUrl();if(!url)return;
    const v=typeof value==="object"?JSON.stringify(value):String(value);
    return sheetsPost(url,{action:"upsertSetting",sheet:"settings",row:{key,value:v,label,updatedAt:new Date().toISOString().slice(0,19).replace("T"," ")}});
  };
  const pullSettingsFromSheets=async()=>{
    const url=getSheetsUrl();if(!url)return null;
    const r=await sheetsPost(url,{action:"getAll",sheet:"settings"}).catch(()=>null);
    if(!r||!r.data)return null;
    const patch={};
    r.data.forEach(row=>{
      if(row.key==="shiftTypes"&&row.value){try{const st=JSON.parse(row.value);if(Array.isArray(st)&&st.length)patch.shiftTypes=st;}catch{}}
      if(row.key==="logoUrl"&&row.value)patch.logoUrl=row.value;
    });
    if(Object.keys(patch).length)upd(patch);
    return patch;
  };
  const onSaveShiftTypesToSheets=st=>syncSettingsToSheets("shiftTypes",st,"סוגי משמרות");
  const onSyncUser=u=>{
    const url=getSheetsUrl();if(!url)return;
    sheetsPost(url,{action:"upsert",sheet:"staff",id:u.id,row:u}).catch(()=>{});
  };

  // Handle shift save/delete from calendar
  const onSaveShift=shift=>{
    const url=getSheetsUrl();
    const finalId=shift.id||uid();
    const shiftRow={id:finalId,date:shift.date||"",timeStart:shift.timeStart||"",timeEnd:shift.timeEnd||"",hours:shift.hours||"",personName:users.find(u=>u.id===shift.person)?.name||"",projName:projects.find(p=>p.id===shift.projId)?.name||"",tasks:(shift.tasks||[]).map(t=>stLabel(t,sts)).join(", "),note:shift.note||"",projId:shift.projId||"",person:shift.person||"",deleted:"",deletedBy:"",deletedAt:""};
    if(!shift.projId){
      const existing=(data.globalShifts||[]).find(s=>s.id===shift.id);
      const newGlobal=existing
        ?(data.globalShifts||[]).map(s=>s.id===shift.id?{...shift,id:finalId}:s)
        :[...(data.globalShifts||[]),{...shift,id:finalId}];
      upd({globalShifts:newGlobal});
      if(url){
        if(existing)sheetsPost(url,{action:"update",sheet:"calendar",id:finalId,row:shiftRow}).catch(()=>{});
        else sheetsPost(url,{action:"appendRow",sheet:"calendar",row:shiftRow}).catch(()=>{});
      }
      return;
    }
    const proj=projects.find(p=>p.id===shift.projId);if(!proj)return;
    const existing=(proj.shifts||[]).find(s=>s.id===shift.id);
    const newShifts=existing?(proj.shifts||[]).map(s=>s.id===shift.id?{...shift,id:finalId}:s):[...(proj.shifts||[]),{...shift,id:finalId}];
    updateProject({...proj,shifts:newShifts});
    if(url){
      sheetsPost(url,{action:"update",sheet:"projects",id:proj.id,row:{...proj,shifts:newShifts}}).catch(()=>{});
      if(existing)sheetsPost(url,{action:"update",sheet:"calendar",id:finalId,row:shiftRow}).catch(()=>{});
      else sheetsPost(url,{action:"appendRow",sheet:"calendar",row:shiftRow}).catch(()=>{});
    }
  };
  const onDeleteShift=shift=>{
    const url=getSheetsUrl();
    const deletedRow={deleted:"TRUE",deletedBy:currentUser?.name||"",deletedAt:new Date().toISOString().slice(0,19).replace("T"," ")};
    if(url)sheetsPost(url,{action:"softDelete",sheet:"calendar",id:shift.id,row:deletedRow}).catch(()=>{});
    if(!shift.projId){
      upd({globalShifts:(data.globalShifts||[]).filter(s=>s.id!==shift.id)});
      return;
    }
    const proj=projects.find(p=>p.id===shift.projId);if(!proj)return;
    updateProject({...proj,shifts:(proj.shifts||[]).filter(s=>s.id!==shift.id)});
  };

  const NAV=[
    {id:"dashboard",icon:"⬛",label:"לוח בקרה"},
    {id:"calendar",icon:"📅",label:"לוח שבועי"},
    ...((isAdmin||isProd)?[{id:"projects",icon:"🎬",label:"פרויקטים"}]:[]),
    {id:"hours",icon:"⏱",label:"שעות"},
    ...((isAdmin||isProd)?[{id:"quotes",icon:"📝",label:"הצעות מחיר"},{id:"reports",icon:"📊",label:"דוחות"}]:[]),
    {id:"vault",icon:"🔐",label:"סיסמאות"},
    ...(isAdmin?[{id:"clients",icon:"🏢",label:"לקוחות"},{id:"users",icon:"👥",label:"משתמשים"},{id:"sheets",icon:"☁️",label:"Sheets"},{id:"backup",icon:"💾",label:"גיבוי"},{id:"settings",icon:"⚙️",label:"הגדרות"}]:[]),
  ];

  const Sidebar=({mobile})=>(
    <aside style={{background:"var(--surf)",borderLeft:"1px solid var(--border)",padding:"18px 10px",display:"flex",flexDirection:"column",gap:2,width:mobile?"100%":220,height:"100vh",overflowY:"auto",flexShrink:0,position:mobile?"fixed":"sticky",inset:mobile?0:"auto",top:0,zIndex:mobile?900:"auto"}}>
      <div style={{padding:"0 6px 16px",borderBottom:"1px solid var(--border)",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          {logoUrl?<img src={logoUrl} style={{height:36,objectFit:"contain",borderRadius:5}} alt="logo"/>:<div style={{fontWeight:900,fontSize:18,color:"var(--gold)"}}>🎞 PostFlow</div>}
          <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>v14 <span style={{background:"var(--gold)",color:"#07090f",padding:"1px 5px",borderRadius:10,fontSize:8,fontWeight:900}}>v16</span></div>
        </div>
        {mobile&&<button className="btn-ghost btn-sm" onClick={()=>setSidebarOpen(false)}>✕</button>}
      </div>
      <div style={{padding:"6px 8px 12px",borderBottom:"1px solid var(--border)",marginBottom:6}}>
        <div style={{fontWeight:700,fontSize:13}}>{currentUser.name}</div>
        <div style={{marginTop:4}}><RoleBadge role={currentUser.role}/></div>
        <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>{currentUser.email}</div>
      </div>
      {NAV.map(n=><div key={n.id} className={`nav-item${view===n.id&&!selProjId?" active":""}`} onClick={()=>goto(n.id)}><span>{n.icon}</span>{n.label}</div>)}
      {(isAdmin||isProd)&&projects.filter(p=>p.status==="active").length>0&&<>
        <div style={{fontSize:10,color:"var(--muted)",padding:"10px 8px 3px",fontWeight:700,letterSpacing:1}}>פעיל</div>
        {projects.filter(p=>p.status==="active").map(p=><div key={p.id} className={`nav-item${selProjId===p.id?" active":""}`} style={{fontSize:11,padding:"7px 10px"}} onClick={()=>gotoProj(p.id)}>
          <span className="pulse" style={{width:6,height:6,borderRadius:"50%",background:"var(--green)",display:"inline-block",flexShrink:0}}/>
          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
        </div>)}
      </>}
      <div style={{marginTop:"auto",paddingTop:12,borderTop:"1px solid var(--border)",display:"flex",flexDirection:"column",gap:8}}>
        {isAdmin&&<button className="btn-green btn-sm" style={{width:"100%"}} onClick={()=>{const rows=[["#","שם","לקוח","מפיקה","סטטוס","הקרנה","הערות"]];projects.filter(p=>p.status!=="cancelled"&&p.status!=="completed").forEach(p=>rows.push([p.projectNumber||"",p.name,p.client,p.producer,STATUS_CFG[p.status]?.label||"",p.onlineScreening||"",p.statusNote||""]));dlCSV(rows,`סטטוסים_${todayStr()}.csv`);}}>📤 יצוא סטטוסים</button>}
        <button className="btn-ghost btn-sm" style={{width:"100%"}} onClick={()=>{setCurrentUser(null);localStorage.removeItem(REMEMBER_KEY);}}>🚪 התנתקות</button>
      </div>
    </aside>
  );

  const updateProjAndSync=proj=>{
    updateProject(proj);
    const url=getSheetsUrl();if(url)sheetsPost(url,{action:"update",sheet:"projects",id:proj.id,row:proj}).catch(()=>{});
  };

  return(<>
    <GS/>
    <div style={{display:"flex",minHeight:"100vh"}}>
      <div className="desktop-sidebar" style={{display:"flex",flexShrink:0,width:220}}><Sidebar/></div>
      {sidebarOpen&&<><Sidebar mobile/><div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:899}} onClick={()=>setSidebarOpen(false)}/></>}
      <main style={{flex:1,padding:"24px 22px 90px",overflowY:"auto",minWidth:0}}>
        {/* Topbar */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22,flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <button className="btn-ghost btn-sm" onClick={()=>setSidebarOpen(true)} style={{display:"none"}} id="mob-menu-btn">☰</button>
            <div style={{fontSize:12,color:"var(--muted)"}}>{new Date().toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            {isAdmin&&view==="projects"&&<button className="btn-gold btn-sm" onClick={()=>setShowNewProj(true)}>+ פרויקט חדש</button>}
            {isAdmin&&<button className="btn-green btn-sm" onClick={()=>{saveLocal(data);const now=new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});setLastAutoSave(now);}}>💾</button>}
          </div>
        </div>
        {/* Views */}
        {view==="project"&&selProj?<ProjectDetail project={selProj} user={currentUser} users={users} shiftTypes={sts} onChange={updateProjAndSync} onBack={()=>{setSelProjId(null);setView("projects");}}/>
          :view==="dashboard"?<Dashboard projects={projects} user={currentUser} logoUrl={logoUrl} onSelect={gotoProj} onGoto={goto}/>
          :view==="calendar"?<WeeklyCalendar projects={projects} user={currentUser} users={users} shiftTypes={sts} globalShifts={data.globalShifts||[]} onSaveShift={onSaveShift} onDeleteShift={onDeleteShift} editModal={calEditModal} setEditModal={setCalEditModal}/>
          :(view==="projects"&&(isAdmin||isProd))?<ProjectsList projects={projects} user={currentUser} onSelect={gotoProj} onNew={()=>setShowNewProj(true)}/>
          :view==="hours"?<HoursLog projects={projects} user={currentUser} users={users} onChange={updateProjAndSync} sheetsUrl={getSheetsUrl()}/>
          :view==="quotes"?<QuoteBuilder projects={projects} quoteTemplates={quoteTemplates} onSave={addQuote} onUpdateTemplates={t=>upd({quoteTemplates:t})} user={currentUser}/>
          :view==="reports"?<Reports projects={projects} users={users}/>
          :view==="vault"?<PasswordVault/>
          :view==="clients"?<ClientList projects={projects} clients={clients} onUpdate={c=>upd({clients:c})}/>
          :view==="users"?<UserMgmt users={users} onUpdate={u=>upd({users:u})} currentUser={currentUser} onSyncUser={onSyncUser}/>
          :view==="sheets"?<SheetsSettings projects={projects} users={users} onProjectsLoaded={p=>upd({projects:p})} onStaffLoaded={u=>upd({users:u})} onSettingsLoaded={rows=>{const patch={};rows.forEach(r=>{if(r.key==="shiftTypes"&&r.value){try{const st=JSON.parse(r.value);if(Array.isArray(st)&&st.length)patch.shiftTypes=st;}catch{}}if(r.key==="logoUrl"&&r.value)patch.logoUrl=r.value;});if(Object.keys(patch).length)upd(patch);}}/>
          :view==="backup"?<BackupPanel users={users} projects={projects} passwords={passwords} lastAutoSave={lastAutoSave} driveFolder={driveFolder} onRestore={d=>upd({users:d.users||users,projects:d.projects||projects,passwords:d.passwords||passwords})}/>
          :view==="settings"?<Settings shiftTypes={sts} onUpdateShiftTypes={st=>{upd({shiftTypes:st});}} logoUrl={logoUrl} onUpdateLogo={url=>{upd({logoUrl:url});syncSettingsToSheets("logoUrl",url,"לוגו");}} driveFolder={driveFolder} onUpdateDriveFolder={handleUpdateDriveFolder} onSaveShiftTypesToSheets={async(st)=>{upd({shiftTypes:st});return syncSettingsToSheets("shiftTypes",st,"סוגי משמרות");}} onPullSettingsFromSheets={pullSettingsFromSheets}/>
          :null}
      </main>
    </div>
    {/* Mobile bottom nav */}
    <div className="mob-bar">
      <button className="mob-btn" onClick={()=>setSidebarOpen(true)}>☰<span>תפריט</span></button>
      {NAV.slice(0,4).map(n=><button key={n.id} className={`mob-btn${view===n.id?" active":""}`} onClick={()=>goto(n.id)}>{n.icon}<span>{n.label}</span></button>)}
    </div>
    {showNewProj&&<NewProjectModal onClose={()=>setShowNewProj(false)} onAdd={p=>{addProject(p);gotoProj(p.id);}} nextNum={nextProjNum||1}/>}
  </>);
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
function AppLoader(){
  const [initData,setInitData]=useState(null);
  useEffect(()=>{(async()=>{
    Splash.set(20,"טוען נתונים...");
    const local=loadLocal();
    Splash.set(50,"בודק Google Sheets...");
    const url=getSheetsUrl();
    if(url){try{
      const[projs,pws,staff]=await Promise.all([sheetsCall(url,{action:"getAll",sheet:"projects"}),sheetsCall(url,{action:"getAll",sheet:"passwords"}),sheetsCall(url,{action:"getAll",sheet:"staff"})]);
      Splash.set(85,"מעבד נתונים...");
      const patch={};
      if(projs&&projs.length)patch.projects=projs.map(r=>{const loc=(local.projects||[]).find(p=>p.id===r.id);return{tasks:loc?.tasks||[],shifts:loc?.shifts||[],hours:loc?.hours||[],quotes:loc?.quotes||[],plan:loc?.plan||{crew:[],milestones:[],notes:""},...mapProject(r)};});
      if(pws&&pws.length)patch.passwords=pws.map(mapPassword);
      if(staff&&staff.length){patch.users=staff.map(mapStaff);const maxNum=Math.max(0,...(patch.projects||local.projects||[]).map(p=>parseInt(p.projectNumber||0)||0));patch.nextProjNum=maxNum+1;}
      setInitData({...local,...patch});
    }catch{setInitData(local);}}
    else setInitData(local);
    Splash.set(100,"מוכן!");
    if(local.logoUrl)Splash.setLogo(local.logoUrl);
    setTimeout(()=>Splash.hide(),500);
  })();},[]);
  if(!initData)return null;
  return <App initialData={initData}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppLoader/>);

</script>
</body>
</html>
