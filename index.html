function dlCSV(rows,fn){
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download=fn;a.click();
}
function dlJSON(obj,fn){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}));
  a.download=fn;a.click();
}
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  const headers=lines[0].split("\t").length>1
    ?lines[0].split("\t").map(h=>h.trim())
    :lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
  const delim=lines[0].includes("\t")?"\t":",";
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){inQ=!inQ;continue}
      if(ch===delim&&!inQ){vals.push(cur.trim());cur="";continue}
      cur+=ch;
    }
    vals.push(cur.trim());
    const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||"";});
    return obj;
  });
}

function Login({users,onLogin}){
  const saved=useMemo(()=>{try{return JSON.parse(localStorage.getItem(REMEMBER_KEY)||"null");}catch{return null;}},[]);
  const [email,setEmail]=useState(saved?.email||"");
  const [pass,setPass]=useState(saved?.pass||"");
  const [showPw,setShowPw]=useState(false);
  const [remember,setRemember]=useState(!!saved);
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);

  const submit=async()=>{
    setErr("");setBusy(true);
    await new Promise(r=>setTimeout(r,300));
    const em=email.trim().toLowerCase();
    // Master admin bypass
    if(em===ADMIN_EMAIL&&pass===ADMIN_PASS){
      const admin=users.find(u=>u.email===em)||{id:"u_admin",name:"אורי",email:em,role:"admin",password:pass,active:"admin"};
      if(remember)localStorage.setItem(REMEMBER_KEY,JSON.stringify({email:em,pass}));
      else localStorage.removeItem(REMEMBER_KEY);
      onLogin(admin);setBusy(false);return;
    }
    const u=users.find(u=>(u.email||"").toLowerCase()===em&&u.password===pass);
    if(!u){setErr("אימייל או סיסמה שגויים");setBusy(false);return;}
    if(u.active==="false"||u.active==="0"){setErr("משתמש זה אינו פעיל");setBusy(false);return;}
    if(remember)localStorage.setItem(REMEMBER_KEY,JSON.stringify({email:em,pass}));
    else localStorage.removeItem(REMEMBER_KEY);
    onLogin(u);setBusy(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div className="card fade" style={{width:"min(400px,95vw)",padding:36}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:38,marginBottom:8}}>🎞</div>
          <div style={{fontWeight:900,fontSize:24,color:"var(--gold)"}}>PostFlow</div>
          <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>מערכת ניהול פוסט-פרודקשן</div>
        </div>
        <div style={{marginBottom:12}}>
          <Lbl>כתובת אימייל</Lbl>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        <div style={{marginBottom:14,position:"relative"}}>
          <Lbl>סיסמה</Lbl>
          <input type={showPw?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} style={{paddingLeft:38}}/>
          <button onClick={()=>setShowPw(x=>!x)} style={{position:"absolute",left:10,bottom:8,background:"none",border:"none",color:"var(--muted)",fontSize:16,cursor:"pointer",padding:0}}>{showPw?"🙈":"👁"}</button>
        </div>
        <label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"var(--muted2)",marginBottom:16,cursor:"pointer"}}>
          <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)}/>
          זכור אותי
        </label>
        {err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:12,padding:"8px 12px",background:"var(--red)15",borderRadius:8}}>⚠ {err}</div>}
        <button className="btn-gold" style={{width:"100%",padding:12,fontSize:15,opacity:busy?.6:1}} onClick={submit} disabled={busy}>
          {busy?"מתחבר...":"כניסה למערכת →"}
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SMART SEARCH BAR
// ═══════════════════════════════════════════════════════════
function SmartSearch({projects,onSelect}){
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const ref=useRef();

  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);

  const results=useMemo(()=>{
    if(q.trim().length<1)return[];
    const lq=q.toLowerCase();
    return projects.filter(p=>
      (p.name||"").toLowerCase().includes(lq)||
      (p.projectNumber||"").toString().includes(lq)||
      (p.client||"").toLowerCase().includes(lq)||
      (p.producer||"").toLowerCase().includes(lq)
    ).slice(0,8);
  },[q,projects]);

  return(
    <div className="search-wrap" ref={ref} style={{position:"relative",maxWidth:380,flex:1}}>
      <span className="search-icon">🔍</span>
      <input
        value={q}
        onChange={e=>{setQ(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        placeholder="חיפוש פרויקט לפי שם, מספר, לקוח..."
        style={{paddingRight:34}}
      />
      {open&&results.length>0&&(
        <div className="search-dropdown">
          {results.map(p=>(
            <div key={p.id} className="search-item" onClick={()=>{setQ("");setOpen(false);onSelect(p.id);}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontWeight:800,color:"var(--gold)",fontSize:11,minWidth:40}}>#{p.projectNumber||"—"}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                  <div style={{fontSize:11,color:"var(--muted)"}}>{p.client}{p.producer?` · ${p.producer}`:""}</div>
                </div>
                <StatusBadge s={p.status}/>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// WEEKLY CALENDAR — 2 weeks, by-worker, hour grid
// ═══════════════════════════════════════════════════════════
function WeeklyCalendar({projects,user,users,onUpdateProject}){
  const [weekStart,setWeekStart]=useState(()=>{
    const d=new Date();d.setDate(d.getDate()-d.getDay());return d;
  });
  const [viewMode,setViewMode]=useState("byWorker");
  const [detail,setDetail]=useState(null);
  const [addModal,setAddModal]=useState(null); // {date, hour}
  const [ns,setNs]=useState({type:"editing",person:"",projId:"",timeStart:"09:00",timeEnd:"18:00",note:""});

  const allDays=Array.from({length:14},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d;});
  const week1=allDays.slice(0,7);
  const week2=allDays.slice(7,14);
  const canEdit=user.role==="admin"||user.role==="producer";
  const canSeeAll=user.role==="admin"||user.role==="producer";
  const workers=users.filter(u=>u.role!=="admin"||u.id===user.id);

  // Build event map: date → person → shifts[]
  const evMap={};
  projects.forEach(proj=>{
    (proj.shifts||[]).forEach(s=>{
      if(!evMap[s.date])evMap[s.date]={};
      if(!evMap[s.date][s.person||"_"])evMap[s.date][s.person||"_"]=[];
      const show=canSeeAll||s.person===user.id;
      if(show)evMap[s.date][s.person||"_"].push({...s,projName:proj.name,proj});
    });
  });

  const saveShift=()=>{
    if(!ns.projId||!addModal)return;
    const proj=projects.find(p=>p.id===ns.projId);if(!proj)return;
    const shift={id:uid(),date:addModal.date,...ns};
    onUpdateProject({...proj,shifts:[...(proj.shifts||[]),shift]});
    setAddModal(null);
  };

  const renderGrid=(days,label)=>(
    <div style={{marginBottom:28}}>
      <div style={{fontSize:12,fontWeight:700,color:"var(--muted2)",marginBottom:8,padding:"4px 10px",background:"var(--card2)",borderRadius:8,display:"inline-block"}}>
        {label} · {fmtDate(days[0])} – {fmtDate(days[6])}
      </div>
      <div style={{overflowX:"auto"}}>
        <div style={{minWidth:600}}>
          {/* Header */}
          <div style={{display:"grid",gridTemplateColumns:"50px repeat(7,1fr)",gap:2,marginBottom:2}}>
            <div style={{background:"var(--surf)",borderRadius:6,padding:6}}/>
            {days.map((d,i)=>{
              const key=isoDate(d);const isToday=key===todayStr();const wknd=isWeekend(d);
              return(
                <div key={key} style={{background:isToday?"var(--gold)20":wknd?"var(--bg)":"var(--surf)",borderRadius:6,padding:"6px 4px",textAlign:"center",opacity:wknd?.5:1}}>
                  <div style={{fontSize:10,fontWeight:700,color:isToday?"var(--gold)":wknd?"var(--muted)":"var(--muted2)"}}>{HEB_DAYS[d.getDay()]}</div>
                  <div style={{fontSize:13,fontWeight:800,color:isToday?"var(--gold)":"var(--text)"}}>{fmtDate(d)}</div>
                  {wknd&&<div style={{fontSize:9,color:"var(--muted)"}}>סגור</div>}
                </div>
              );
            })}
          </div>

          {/* Hour rows */}
          {WORK_HOURS.map(h=>(
            <div key={h} style={{display:"grid",gridTemplateColumns:"50px repeat(7,1fr)",gap:2,marginBottom:2}}>
              <div className="hour-lbl">{h}:00</div>
              {days.map((d,di)=>{
                const key=isoDate(d);const wknd=isWeekend(d);
                const isNowCell=key===todayStr()&&new Date().getHours()===h;
                // Collect events that overlap this hour
                const allEv=Object.values(evMap[key]||{}).flat().filter(ev=>{
                  const s=parseInt((ev.timeStart||"09:00").split(":")[0]);
                  const e=parseInt((ev.timeEnd||"18:00").split(":")[0]);
                  return h>=s&&h<e;
                });
                const displayEv=canSeeAll?allEv:allEv.filter(ev=>ev.person===user.id);
                return(
                  <div key={di} className={`hour-cell${!wknd?" workday":""}${isNowCell?" now-line":""}`}
                    onClick={()=>{if(!wknd&&canEdit){setNs(x=>({...x,timeStart:`${h}:00`,timeEnd:`${h+1}:00`,projId:"",person:"",note:""}));setAddModal({date:key,hour:h});}}}
                  >
                    {displayEv.map((ev,ei)=>{
                      const col=stColor(ev.type);
                      const workerName=users.find(u=>u.id===ev.person)?.name||"";
                      return(
                        <div key={`${ev.id}_${ei}`} className="week-event"
                          style={{background:col+"28",color:col,border:`1px solid ${col}40`,marginBottom:2}}
                          onClick={e=>{e.stopPropagation();setDetail(ev);}}>
                          <div style={{fontWeight:700}}>{stLabel(ev.type)}</div>
                          {viewMode==="byWorker"&&workerName&&<div style={{fontSize:9,opacity:.8}}>{workerName.split(" ")[0]}</div>}
                          <div style={{fontSize:9,opacity:.7}}>{ev.projName?.slice(0,12)}</div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div className="section-title" style={{marginBottom:0}}>לוח שבועי</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn-ghost btn-sm" onClick={()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());setWeekStart(d);}}>היום</button>
          <button className="btn-ghost btn-sm" onClick={()=>{const d=new Date(weekStart);d.setDate(d.getDate()-14);setWeekStart(d);}}>→ קודם</button>
          <button className="btn-ghost btn-sm" onClick={()=>{const d=new Date(weekStart);d.setDate(d.getDate()+14);setWeekStart(d);}}>הבא ←</button>
        </div>
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {SHIFT_TYPES.map(t=>(
          <span key={t.id} className="tag" style={{color:t.color,background:t.color+"20",border:`1px solid ${t.color}30`}}>{t.label}</span>
        ))}
      </div>

      {renderGrid(week1,"שבוע ראשון")}
      {renderGrid(week2,"שבוע שני")}

      {/* Add shift modal */}
      {addModal&&(
        <div className="modal-bg" onClick={()=>setAddModal(null)}>
          <div className="modal" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>+ הוספת אירוע</div>
            <div style={{fontSize:13,color:"var(--muted)",marginBottom:18}}>📅 {addModal.date}</div>
            <div className="frow">
              <div className="fcol">
                <Lbl>פרויקט (אופציונלי)</Lbl>
                <select value={ns.projId} onChange={e=>setNs(x=>({...x,projId:e.target.value}))}>
                  <option value="">— ללא פרויקט —</option>
                  {projects.filter(p=>p.status==="active").map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
              <div className="fcol">
                <Lbl>עובד</Lbl>
                <select value={ns.person} onChange={e=>setNs(x=>({...x,person:e.target.value}))}>
                  <option value="">— בחר עובד —</option>
                  {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
              </div>
            </div>
            <div className="frow">
              <div className="fcol">
                <Lbl>סוג</Lbl>
                <select value={ns.type} onChange={e=>setNs(x=>({...x,type:e.target.value}))}>
                  {SHIFT_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
              </div>
              <div className="fcol"><Lbl>משעה</Lbl><input type="time" value={ns.timeStart} onChange={e=>setNs(x=>({...x,timeStart:e.target.value}))}/></div>
              <div className="fcol"><Lbl>עד שעה</Lbl><input type="time" value={ns.timeEnd} onChange={e=>setNs(x=>({...x,timeEnd:e.target.value}))}/></div>
            </div>
            <div style={{marginBottom:14}}><Lbl>הערה</Lbl><input value={ns.note} onChange={e=>setNs(x=>({...x,note:e.target.value}))} placeholder="חופש, הערה, תיאור..."/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn-gold" onClick={saveShift}>💾 שמור</button>
              <button className="btn-ghost" onClick={()=>setAddModal(null)}>ביטול</button>
            </div>
          </div>
        </div>
      )}

      {/* Detail modal */}
      {detail&&(
        <div className="modal-bg" onClick={()=>setDetail(null)}>
          <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:18,marginBottom:14}}>פרטי אירוע</div>
            <div style={{lineHeight:2,fontSize:13}}>
              <div>📁 <b>{detail.projName||"ללא פרויקט"}</b></div>
              <div>🎬 {stLabel(detail.type)}</div>
              <div>👤 {users.find(u=>u.id===detail.person)?.name||"—"}</div>
              <div>📅 {detail.date} · {detail.timeStart}–{detail.timeEnd}</div>
              {detail.note&&<div>📝 {detail.note}</div>}
            </div>
            <div style={{marginTop:16,display:"flex",gap:10}}>
              {detail.proj&&<a href={gcalLink(detail,detail.projName,detail.proj?.client)} target="_blank" rel="noreferrer"><button className="btn-blue btn-sm">📅 Google Calendar</button></a>}
              <button className="btn-ghost btn-sm" onClick={()=>setDetail(null)}>סגור</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// HOURS LOG
// ═══════════════════════════════════════════════════════════
function HoursLog({projects,user,users,onChange,sheetsUrl}){
  const isAdmin=user.role==="admin";
  const isProd=user.role==="producer";
  const [form,setForm]=useState({projId:"",worker:user.id,date:todayStr(),timeIn:"09:00",timeOut:"18:00",hours:"",note:""});
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const calcH=()=>{
    if(form.timeIn&&form.timeOut){
      const [h1,m1]=form.timeIn.split(":").map(Number);
      const [h2,m2]=form.timeOut.split(":").map(Number);
      return Math.max(0,((h2*60+m2)-(h1*60+m1))/60).toFixed(1);
    }
    return form.hours||"0";
  };

  const submit=()=>{
    if(!form.projId)return;
    const proj=projects.find(p=>p.id===form.projId);if(!proj)return;
    const h=parseFloat(form.hours)||parseFloat(calcH())||0;
    const workerObj=users.find(u=>u.id===form.worker);
    const workerName=workerObj?.name||form.worker;
    const entryId=uid();
    const newEntry={id:entryId,worker:form.worker,date:form.date,timeIn:form.timeIn,timeOut:form.timeOut,hours:h,note:form.note,correction:false};
    onChange({...proj,hours:[...(proj.hours||[]),newEntry]});

    // כתיבה ל-Sheets בזמן אמת
    if(sheetsUrl){
      // hours_report — נוכחות כללית
      sheetsPost(sheetsUrl,{
        action:"appendRow",sheet:"hours_report",
        row:{id:entryId,workerName,date:form.date,timeIn:form.timeIn,timeOut:form.timeOut,totalHours:h,note:form.note}
      }).catch(()=>{});
      // project_hours — שעות לפי פרויקט
      sheetsPost(sheetsUrl,{
        action:"appendRow",sheet:"project_hours",
        row:{id:entryId,workerName,date:form.date,projectName:proj.name,hours:h,note:form.note}
      }).catch(()=>{});
    }

    setForm(p=>({...p,projId:"",hours:"",note:""}));
  };
  const addCorrection=(projId,note)=>{
    const proj=projects.find(p=>p.id===projId);if(!proj)return;
    onChange({...proj,hours:[...(proj.hours||[]),{id:uid(),worker:user.id,date:todayStr(),timeIn:"",timeOut:"",hours:0,note:`[תיקון] ${note}`,correction:true}]});
  };

  // My hours across projects
  const myHours=[];
  projects.forEach(p=>(p.hours||[]).filter(h=>isAdmin||isProd||h.worker===user.id).forEach(h=>{
    const u=users.find(u=>u.id===h.worker);
    myHours.push({...h,projName:p.name,workerName:u?.name||h.worker});
  }));
  myHours.sort((a,b)=>b.date.localeCompare(a.date));
  const total=myHours.filter(h=>!isAdmin&&!isProd?h.worker===user.id:true).reduce((s,h)=>s+h.hours,0);

  return(
    <div className="fade">
      <div className="section-title">דיווח שעות</div>
      <div className="card" style={{marginBottom:20}}>
        <div style={{fontWeight:700,marginBottom:14}}>הוספת דיווח כניסה / יציאה</div>
        <div className="frow">
          <div className="fcol">
            <Lbl>פרויקט</Lbl>
            <select value={form.projId} onChange={f("projId")}>
              <option value="">— בחר פרויקט —</option>
              {projects.filter(p=>p.status==="active").map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          {(isAdmin||isProd)&&(
            <div className="fcol">
              <Lbl>עובד</Lbl>
              <select value={form.worker} onChange={f("worker")}>
                {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
            </div>
          )}
          <div className="fcol"><Lbl>תאריך</Lbl><input type="date" value={form.date} onChange={f("date")}/></div>
        </div>
        <div className="frow">
          <div className="fcol"><Lbl>שעת כניסה</Lbl><input type="time" value={form.timeIn} onChange={f("timeIn")}/></div>
          <div className="fcol"><Lbl>שעת יציאה</Lbl><input type="time" value={form.timeOut} onChange={f("timeOut")}/></div>
          <div className="fcol" style={{maxWidth:90}}>
            <Lbl>סה"כ</Lbl>
            <div style={{fontWeight:900,color:"var(--gold)",fontSize:20,paddingTop:6}}>{calcH()}h</div>
          </div>
        </div>
        <div style={{marginBottom:12}}><Lbl>הערה</Lbl><input value={form.note} onChange={f("note")} placeholder="תיאור עבודה..."/></div>
        <button className="btn-gold" onClick={submit}>+ הוסף דיווח</button>
      </div>

      {/* History */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:700,color:"var(--muted2)"}}>היסטוריית שעות</div>
        <div style={{fontWeight:900,color:"var(--gold)",fontSize:18}}>{total.toFixed(1)}h סה"כ</div>
      </div>

      {(isAdmin||isProd)?(
        // Group by worker
        [...new Set(myHours.map(h=>h.worker))].map(wid=>{
          const wh=myHours.filter(h=>h.worker===wid);
          const wt=wh.reduce((s,h)=>s+h.hours,0);
          const wn=wh[0]?.workerName||wid;
          return(
            <div key={wid} className="card" style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontWeight:700}}>{wn}</div>
                <div style={{fontWeight:900,color:"var(--gold)",fontSize:18}}>{wt.toFixed(1)}h</div>
              </div>
              {wh.map(h=>(
                <div key={h.id} style={{display:"flex",gap:10,justifyContent:"space-between",fontSize:12,color:"var(--muted)",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
                  <span style={{minWidth:80}}>{h.date}</span>
                  <span style={{minWidth:100}}>{h.projName}</span>
                  <span>{h.timeIn&&h.timeOut?`${h.timeIn}–${h.timeOut}`:""}</span>
                  <span style={{color:h.correction?"var(--orange)":"var(--text)",fontWeight:700}}>{h.correction?"[תיקון]":h.hours.toFixed(1)+"h"}</span>
                  <span style={{flex:1,textOverflow:"ellipsis",overflow:"hidden",whiteSpace:"nowrap"}}>{h.note}</span>
                </div>
              ))}
            </div>
          );
        })
      ):(
        // Worker sees only own
        <>
          {myHours.filter(h=>h.worker===user.id).map(h=>(
            <div key={h.id} className="card2" style={{marginBottom:8,borderRight:`3px solid ${h.correction?"var(--orange)":"var(--green)"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{h.projName}</div>
                  <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{h.date}{h.timeIn?` · ${h.timeIn}–${h.timeOut}`:""}</div>
                  {h.note&&<div style={{fontSize:11,color:"var(--muted2)",marginTop:1}}>{h.note}</div>}
                </div>
                <div style={{fontWeight:800,color:h.correction?"var(--orange)":"var(--gold)",fontSize:16}}>{h.correction?"תיקון":h.hours.toFixed(1)+"h"}</div>
              </div>
            </div>
          ))}
          {/* Add correction */}
          <div className="card" style={{marginTop:16,borderRight:"3px solid var(--orange)"}}>
            <div style={{fontWeight:700,marginBottom:10,color:"var(--orange)"}}>הוספת שורת תיקון</div>
            <div className="inf-box">עובד יכול להוסיף הערת תיקון לדיווח קיים. המנהל יעדכן את השעות בפועל.</div>
            <AddCorrectionForm projects={projects} userId={user.id} onAdd={addCorrection}/>
          </div>
        </>
      )}

      {/* Export */}
      {(isAdmin||isProd)&&(
        <div style={{marginTop:16}}>
          <button className="btn-green btn-sm" onClick={()=>{
            const rows=[["עובד","פרויקט","תאריך","כניסה","יציאה","שעות","הערה"]];
            myHours.forEach(h=>rows.push([h.workerName,h.projName,h.date,h.timeIn||"",h.timeOut||"",h.hours,h.note||""]));
            dlCSV(rows,`שעות_${todayStr()}.csv`);
          }}>📤 ייצוא שעות לאקסל</button>
        </div>
      )}
    </div>
  );
}

function AddCorrectionForm({projects,userId,onAdd}){
  const [projId,setProjId]=useState("");
  const [note,setNote]=useState("");
  return(
    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
      <select value={projId} onChange={e=>setProjId(e.target.value)} style={{flex:1}}>
        <option value="">— בחר פרויקט —</option>
        {projects.filter(p=>p.status==="active").map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
      </select>
      <input value={note} onChange={e=>setNote(e.target.value)} placeholder="הסבר..." style={{flex:2}}/>
      <button className="btn-orange btn-sm" onClick={()=>{if(projId&&note){onAdd(projId,note);setProjId("");setNote("");}}} >+ הוסף</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// PROJECT DETAIL
// ═══════════════════════════════════════════════════════════
function ProjectDetail({project,user,users,onChange,onBack}){
  const [tab,setTab]=useState("overview");
  const isAdmin=user.role==="admin";
  const canEdit=user.role==="admin"||user.role==="producer";
  const workerName=id=>users.find(u=>u.id===id)?.name||id;

  // Tasks
  const [nt,setNt]=useState({title:"",type:"editing"});
  const addTask=()=>{if(!nt.title.trim())return;onChange({...project,tasks:[...(project.tasks||[]),{id:uid(),title:nt.title,type:nt.type,done:false}]});setNt(p=>({...p,title:""}));};
  const toggleTask=id=>onChange({...project,tasks:(project.tasks||[]).map(t=>t.id===id?{...t,done:!t.done}:t)});
  const removeTask=id=>onChange({...project,tasks:(project.tasks||[]).filter(t=>t.id!==id)});

  // Shifts
  const [ns,setNs]=useState({date:"",timeStart:"09:00",timeEnd:"18:00",type:"editing",person:"",note:""});
  const addShift=()=>{if(!ns.date)return;onChange({...project,shifts:[...(project.shifts||[]),{id:uid(),...ns}]});setNs(p=>({...p,date:"",note:""}));};
  const removeShift=id=>onChange({...project,shifts:(project.shifts||[]).filter(s=>s.id!==id)});

  // Hours
  const [nh,setNh]=useState({worker:user.id,date:todayStr(),timeIn:"09:00",timeOut:"18:00",hours:"",note:""});
  const addHour=()=>{
    const h=parseFloat(nh.hours)||(()=>{const[h1,m1]=nh.timeIn.split(":").map(Number);const[h2,m2]=nh.timeOut.split(":").map(Number);return Math.max(0,((h2*60+m2)-(h1*60+m1))/60);})();
    onChange({...project,hours:[...(project.hours||[]),{id:uid(),worker:nh.worker,date:nh.date,timeIn:nh.timeIn,timeOut:nh.timeOut,hours:h,note:nh.note,correction:false}]});
    setNh(p=>({...p,hours:"",note:""}));
  };

  const done=(project.tasks||[]).filter(t=>t.done).length;
  const taskPct=(project.tasks||[]).length?pct(done,(project.tasks||[]).length):0;

  const TABS=[
    {id:"overview",label:"סקירה"},
    ...(canEdit?[{id:"tasks",label:"משימות"},{id:"schedule",label:"לוז"}]:[]),
    {id:"hours",label:"שעות"},
    ...(canEdit?[{id:"planning",label:"תכנון"}]:[]),
    ...(isAdmin?[{id:"budget",label:"תקציב"}]:[]),
  ];

  return(
    <div className="fade">
      <button className="btn-ghost btn-sm" style={{marginBottom:14}} onClick={onBack}>← חזרה</button>
      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontWeight:800,fontSize:11,color:"var(--gold)",background:"var(--gold)18",border:"1px solid var(--gold)40",borderRadius:6,padding:"2px 8px"}}>#{project.projectNumber||"—"}</span>
            <span style={{fontSize:22,fontWeight:900}}>{project.name}</span>
          </div>
          <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{project.client}{project.producer?` · 👤 ${project.producer}`:""}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <StatusBadge s={project.status}/>
          {canEdit&&(
            <select value={project.status} onChange={e=>onChange({...project,status:e.target.value})} style={{width:"auto",fontSize:12}}>
              {Object.entries(STATUS_CFG).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* Status note */}
      <div className="card2" style={{marginBottom:16,borderRight:"3px solid var(--blue)"}}>
        <div style={{fontSize:11,color:"var(--blue)",fontWeight:700,marginBottom:5}}>סטטוס עדכני</div>
        {canEdit
          ?<textarea value={project.statusNote||""} onChange={e=>onChange({...project,statusNote:e.target.value})} placeholder="מה הסטטוס הנוכחי?" style={{background:"transparent",border:"none",padding:0,minHeight:40,fontSize:13,width:"100%"}}/>
          :<div style={{fontSize:13}}>{project.statusNote||"—"}</div>
        }
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {TABS.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>

      {/* ── OVERVIEW ── */}
      {tab==="overview"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:14}}>
          <div className="card">
            <Lbl>התקדמות</Lbl>
            <div style={{fontSize:34,fontWeight:900,color:"var(--gold)"}}>{project.progress}%</div>
            <PBar v={project.progress}/>
            {canEdit&&<input type="range" min={0} max={100} value={project.progress} onChange={e=>onChange({...project,progress:+e.target.value})} style={{width:"100%",marginTop:8}}/>}
          </div>
          <div className="card">
            <Lbl>משימות</Lbl>
            <div style={{fontSize:34,fontWeight:900,color:"var(--blue)"}}>{done}/{(project.tasks||[]).length}</div>
            <PBar v={taskPct} color="var(--blue)"/>
          </div>
          <div className="card">
            <Lbl>שעות עבודה</Lbl>
            <div style={{fontSize:34,fontWeight:900,color:"var(--gold)"}}>{(project.hours||[]).reduce((s,h)=>s+h.hours,0).toFixed(1)}h</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>{[...new Set((project.hours||[]).map(h=>h.worker))].length} עובדים</div>
          </div>
          <div className="card">
            <Lbl>תאריכים</Lbl>
            {[
              {l:"📷 צילום",v:project.shootDate},
              {l:"🎬 הקרנת אופליין",v:project.offlineScreening},
              {l:"📽 הקרנת אונליין",v:project.onlineScreening},
              {l:"📦 מסירה",v:project.deliveryDate},
            ].filter(x=>x.v).map(x=>(
              <div key={x.l} style={{fontSize:12,marginBottom:4}}><span style={{color:"var(--muted)"}}>{x.l}:</span> <b style={{color:"var(--red)"}}>{x.v}</b></div>
            ))}
            {canEdit&&(
              <div style={{marginTop:10}}>
                <Lbl>עדכן הקרנת אונליין</Lbl>
                <input type="date" value={project.onlineScreening||""} onChange={e=>onChange({...project,onlineScreening:e.target.value})}/>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── TASKS ── */}
      {tab==="tasks"&&(
        <div>
          <div className="frow">
            <div className="fcol"><input placeholder="שם משימה" value={nt.title} onChange={e=>setNt(p=>({...p,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTask()}/></div>
            <div className="fcol" style={{maxWidth:160}}>
              <select value={nt.type} onChange={e=>setNt(p=>({...p,type:e.target.value}))}>
                {SHIFT_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
              </select>
            </div>
            <button className="btn-gold btn-sm" onClick={addTask}>+ הוסף</button>
          </div>
          {(project.tasks||[]).map(t=>{
            const col=stColor(t.type);
            return(
              <div key={t.id} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                <div style={{width:20,height:20,borderRadius:6,background:t.done?"var(--green)":"transparent",border:`2px solid ${t.done?"var(--green)":"var(--border2)"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .2s",flexShrink:0}} onClick={()=>toggleTask(t.id)}>
                  {t.done&&<span style={{color:"#07090f",fontSize:11,fontWeight:900}}>✓</span>}
                </div>
                <div style={{flex:1,fontWeight:600,textDecoration:t.done?"line-through":"none",color:t.done?"var(--muted)":"var(--text)"}}>{t.title}</div>
                <span className="tag" style={{background:col+"20",color:col,border:`1px solid ${col}30`}}>{stLabel(t.type)}</span>
                <button className="btn-red" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>removeTask(t.id)}>✕</button>
              </div>
            );
          })}
        </div>
      )}

      {/* ── SCHEDULE ── */}
      {tab==="schedule"&&(
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontWeight:700,marginBottom:12}}>+ הוספת משמרת / אירוע</div>
            <div className="frow">
              <div className="fcol"><Lbl>תאריך</Lbl><input type="date" value={ns.date} onChange={e=>setNs(x=>({...x,date:e.target.value}))}/></div>
              <div className="fcol"><Lbl>משעה</Lbl><input type="time" value={ns.timeStart} onChange={e=>setNs(x=>({...x,timeStart:e.target.value}))}/></div>
              <div className="fcol"><Lbl>עד שעה</Lbl><input type="time" value={ns.timeEnd} onChange={e=>setNs(x=>({...x,timeEnd:e.target.value}))}/></div>
            </div>
            <div className="frow">
              <div className="fcol">
                <Lbl>סוג</Lbl>
                <select value={ns.type} onChange={e=>setNs(x=>({...x,type:e.target.value}))}>
                  {SHIFT_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
              </div>
              <div className="fcol">
                <Lbl>עובד</Lbl>
                <select value={ns.person} onChange={e=>setNs(x=>({...x,person:e.target.value}))}>
                  <option value="">— בחר עובד —</option>
                  {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
              </div>
              <div className="fcol"><Lbl>הערה</Lbl><input value={ns.note} onChange={e=>setNs(x=>({...x,note:e.target.value}))} placeholder="הערה..."/></div>
            </div>
            <button className="btn-gold btn-sm" onClick={addShift}>+ הוסף</button>
          </div>
          {(project.shifts||[]).sort((a,b)=>a.date.localeCompare(b.date)).map(s=>{
            const col=stColor(s.type);
            return(
              <div key={s.id} className="card2" style={{marginBottom:8,borderRight:`3px solid ${col}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{s.date} · {s.timeStart}–{s.timeEnd}</div>
                    <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>
                      <span className="tag" style={{background:col+"20",color:col,marginLeft:6}}>{stLabel(s.type)}</span>
                      {s.person&&workerName(s.person)}
                      {s.note&&<span style={{marginRight:8,opacity:.7}}>· {s.note}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <a href={gcalLink(s,project.name,project.client)} target="_blank" rel="noreferrer">
                      <button className="btn-blue btn-sm">📅 Google</button>
                    </a>
                    <button className="btn-red" onClick={()=>removeShift(s.id)}>הסר</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── HOURS ── */}
      {tab==="hours"&&(
        <div>
          {(isAdmin||user.role==="producer")&&(
            <div className="card" style={{marginBottom:16}}>
              <div style={{fontWeight:700,marginBottom:12}}>הוספת שעות ידנית</div>
              <div className="frow">
                {isAdmin&&<div className="fcol"><Lbl>עובד</Lbl>
                  <select value={nh.worker} onChange={e=>setNh(x=>({...x,worker:e.target.value}))}>
                    {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                  </select>
                </div>}
                <div className="fcol"><Lbl>תאריך</Lbl><input type="date" value={nh.date} onChange={e=>setNh(x=>({...x,date:e.target.value}))}/></div>
                <div className="fcol"><Lbl>כניסה</Lbl><input type="time" value={nh.timeIn} onChange={e=>setNh(x=>({...x,timeIn:e.target.value}))}/></div>
                <div className="fcol"><Lbl>יציאה</Lbl><input type="time" value={nh.timeOut} onChange={e=>setNh(x=>({...x,timeOut:e.target.value}))}/></div>
              </div>
              <div style={{marginBottom:12}}><Lbl>הערה</Lbl><input value={nh.note} onChange={e=>setNh(x=>({...x,note:e.target.value}))} placeholder="הערה..."/></div>
              <button className="btn-gold btn-sm" onClick={addHour}>+ הוסף</button>
            </div>
          )}
          {users.map(u=>{
            const wh=(project.hours||[]).filter(h=>h.worker===u.id);
            if(!wh.length)return null;
            return(
              <div key={u.id} className="card" style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{fontWeight:700}}>{u.name}</div>
                  <div style={{fontWeight:900,color:"var(--gold)",fontSize:18}}>{wh.reduce((s,h)=>s+h.hours,0).toFixed(1)}h</div>
                </div>
                {wh.sort((a,b)=>b.date.localeCompare(a.date)).map(h=>(
                  <div key={h.id} style={{display:"flex",gap:10,justifyContent:"space-between",fontSize:12,color:"var(--muted)",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
                    <span>{h.date}</span>
                    <span>{h.timeIn&&h.timeOut?`${h.timeIn}–${h.timeOut}`:""}</span>
                    <span style={{color:h.correction?"var(--orange)":"var(--text)",fontWeight:700}}>{h.correction?"[תיקון]":h.hours.toFixed(1)+"h"}</span>
                    <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.note}</span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}

      {/* ── PLANNING ── */}
      {tab==="planning"&&(
        <ProjectPlanning project={project} users={users} onChange={onChange} canEdit={canEdit}/>
      )}

      {/* ── BUDGET ── */}
      {tab==="budget"&&isAdmin&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div className="card">
              <Lbl>תקציב מתוכנן</Lbl>
              <div style={{fontSize:30,fontWeight:900,color:"var(--blue)"}}>{fmtMoney(project.budgetPlanned)}</div>
              <div style={{marginTop:10}}><Lbl>עדכון</Lbl><input type="number" value={project.budgetPlanned||0} onChange={e=>onChange({...project,budgetPlanned:+e.target.value})}/></div>
            </div>
            <div className="card">
              <Lbl>תקציב בפועל</Lbl>
              <div style={{fontSize:30,fontWeight:900,color:pct(project.budgetActual,project.budgetPlanned)>80?"var(--red)":"var(--green)"}}>{fmtMoney(project.budgetActual)}</div>
              <div style={{marginTop:10}}><Lbl>עדכון</Lbl><input type="number" value={project.budgetActual||0} onChange={e=>onChange({...project,budgetActual:+e.target.value})}/></div>
            </div>
          </div>
          <div className="card">
            <Lbl>ניצול תקציב</Lbl>
            <div style={{fontSize:26,fontWeight:900,color:"var(--gold)",marginBottom:8}}>{pct(project.budgetActual,project.budgetPlanned)}%</div>
            <PBar v={pct(project.budgetActual,project.budgetPlanned)} color={pct(project.budgetActual,project.budgetPlanned)>80?"var(--red)":"var(--green)"}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--muted)",marginTop:8}}>
              <span>נותר: {fmtMoney((project.budgetPlanned||0)-(project.budgetActual||0))}</span>
              <span>מתוכנן: {fmtMoney(project.budgetPlanned)}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// PROJECT PLANNING
// ═══════════════════════════════════════════════════════════
function ProjectPlanning({project,users,onChange,canEdit}){
  const plan=project.plan||{crew:[],milestones:[],notes:""};
  const upd=p=>onChange({...project,plan:{...plan,...p}});

  const [nc,setNc]=useState({userId:"",role:"",note:""});
  const addCrew=()=>{
    if(!nc.userId)return;
    upd({crew:[...(plan.crew||[]),{id:uid(),...nc}]});
    setNc({userId:"",role:"",note:""});
  };
  const removeCrew=id=>upd({crew:(plan.crew||[]).filter(c=>c.id!==id)});

  const [nm,setNm]=useState({title:"",date:"",done:false});
  const addMs=()=>{
    if(!nm.title)return;
    upd({milestones:[...(plan.milestones||[]),{id:uid(),...nm}]});
    setNm({title:"",date:"",done:false});
  };
  const toggleMs=id=>upd({milestones:(plan.milestones||[]).map(m=>m.id===id?{...m,done:!m.done}:m)});

  return(
    <div>
      {/* Dates */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:12}}>📅 תאריכי מפתח</div>
        <div className="frow">
          <div className="fcol"><Lbl>צילום</Lbl><input type="date" value={project.shootDate||""} disabled={!canEdit} onChange={e=>onChange({...project,shootDate:e.target.value})}/></div>
          <div className="fcol"><Lbl>הקרנת אופליין</Lbl><input type="date" value={project.offlineScreening||""} disabled={!canEdit} onChange={e=>onChange({...project,offlineScreening:e.target.value})}/></div>
          <div className="fcol"><Lbl>הקרנת אונליין</Lbl><input type="date" value={project.onlineScreening||""} disabled={!canEdit} onChange={e=>onChange({...project,onlineScreening:e.target.value})}/></div>
          <div className="fcol"><Lbl>מסירה</Lbl><input type="date" value={project.deliveryDate||""} disabled={!canEdit} onChange={e=>onChange({...project,deliveryDate:e.target.value})}/></div>
        </div>
      </div>

      {/* Crew */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:12}}>👥 צוות פרויקט</div>
        {canEdit&&(
          <div className="frow">
            <div className="fcol">
              <select value={nc.userId} onChange={e=>setNc(x=>({...x,userId:e.target.value}))}>
                <option value="">— בחר עובד —</option>
                {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
            </div>
            <div className="fcol"><input placeholder="תפקיד בפרויקט" value={nc.role} onChange={e=>setNc(x=>({...x,role:e.target.value}))}/></div>
            <button className="btn-gold btn-sm" onClick={addCrew}>+ הוסף</button>
          </div>
        )}
        {(plan.crew||[]).map(c=>{
          const u=users.find(u=>u.id===c.userId);
          return(
            <div key={c.id} className="card2" style={{marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <Avatar name={u?.name||"?"} idx={0} size={32}/>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>{u?.name||c.userId}</div>
                  <div style={{fontSize:11,color:"var(--muted)"}}>{c.role}</div>
                </div>
              </div>
              {canEdit&&<button className="btn-red" onClick={()=>removeCrew(c.id)}>הסר</button>}
            </div>
          );
        })}
      </div>

      {/* Milestones */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:12}}>🏁 אבני דרך</div>
        {canEdit&&(
          <div className="frow">
            <div className="fcol"><input placeholder="כותרת" value={nm.title} onChange={e=>setNm(x=>({...x,title:e.target.value}))}/></div>
            <div className="fcol"><input type="date" value={nm.date} onChange={e=>setNm(x=>({...x,date:e.target.value}))}/></div>
            <button className="btn-gold btn-sm" onClick={addMs}>+ הוסף</button>
          </div>
        )}
        {(plan.milestones||[]).map(m=>(
          <div key={m.id} style={{display:"flex",gap:10,alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
            <div style={{width:18,height:18,borderRadius:4,background:m.done?"var(--green)":"transparent",border:`2px solid ${m.done?"var(--green)":"var(--border2)"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} onClick={()=>toggleMs(m.id)}>
              {m.done&&<span style={{color:"#07090f",fontSize:10,fontWeight:900}}>✓</span>}
            </div>
            <div style={{flex:1,textDecoration:m.done?"line-through":"none",color:m.done?"var(--muted)":"var(--text)",fontSize:13}}>{m.title}</div>
            {m.date&&<div style={{fontSize:11,color:"var(--red)"}}>{m.date}</div>}
          </div>
        ))}
      </div>

      {/* Notes */}
      <div className="card">
        <div style={{fontWeight:700,marginBottom:10}}>📝 הערות תכנון</div>
        <textarea value={plan.notes||""} onChange={e=>upd({notes:e.target.value})} placeholder="הערות חופשיות לתכנון..." disabled={!canEdit} style={{minHeight:80,width:"100%"}}/>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// REPORTS
// ═══════════════════════════════════════════════════════════
function Reports({projects,users,sheetsUrl}){
  const [tab,setTab]=useState("hours");
  const [month,setMonth]=useState(()=>new Date().toISOString().slice(0,7));
  const [wFilter,setWFilter]=useState("all");

  const allHours=[];
  projects.forEach(p=>(p.hours||[]).forEach(h=>{
    const u=users.find(u=>u.id===h.worker);
    allHours.push({...h,projName:p.name,workerName:u?.name||h.worker});
  }));
  const filteredH=allHours.filter(h=>h.date&&h.date.startsWith(month)&&(wFilter==="all"||h.worker===wFilter));

  const TABS=[
    {id:"hours",label:"⏱ שעות עובדים"},
    {id:"projects",label:"🎬 סטטוס פרויקטים"},
    {id:"quotes",label:"📝 הצעות מחיר"},
    {id:"monthly",label:"📅 סיכום חודש"},
  ];

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div className="section-title" style={{marginBottom:0}}>📊 דוחות</div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <input type="month" value={month} onChange={e=>setMonth(e.target.value)} style={{width:"auto"}}/>
          <select value={wFilter} onChange={e=>setWFilter(e.target.value)} style={{width:"auto",fontSize:12}}>
            <option value="all">כל העובדים</option>
            {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
      </div>

      <div style={{display:"flex",gap:0,marginBottom:22,borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {TABS.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>

      {tab==="hours"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{color:"var(--muted2)",fontSize:13}}>חודש {month} · סה"כ: <span style={{color:"var(--gold)",fontWeight:800}}>{filteredH.reduce((s,h)=>s+h.hours,0).toFixed(1)}h</span></div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn-green btn-sm" onClick={()=>{
                const rows=[["עובד","פרויקט","תאריך","כניסה","יציאה","שעות","הערה"]];
                filteredH.forEach(h=>rows.push([h.workerName,h.projName,h.date,h.timeIn||"",h.timeOut||"",h.hours.toFixed(1),h.note||""]));
                dlCSV(rows,`שעות_${month}.csv`);
              }}>📤 יצוא CSV</button>
              {sheetsUrl&&<button className="btn-blue btn-sm" onClick={async()=>{
                const rows=filteredH.map(h=>({id:h.id||uid(),workerName:h.workerName,date:h.date,timeIn:h.timeIn||"",timeOut:h.timeOut||"",totalHours:h.hours,note:h.note||""}));
                await sheetsPost(sheetsUrl,{action:"batchUpdate",sheet:"hours_report",rows});
                alert("✅ דוח שעות נדחף ל-hours_report בגיליון");
              }}>☁️ דחוף ל-Sheets</button>}
            </div>
          </div>
          {[...new Set(filteredH.map(h=>h.worker))].map(wid=>{
            const wh=filteredH.filter(h=>h.worker===wid);
            const tot=wh.reduce((s,h)=>s+h.hours,0);
            return(
              <div key={wid} className="card" style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>

                  <div style={{fontWeight:900,color:"var(--gold)",fontSize:20}}>{tot.toFixed(1)}h</div>
                </div>
                {wh.map(h=>(
                  <div key={h.id} style={{display:"flex",gap:10,justifyContent:"space-between",fontSize:12,color:"var(--muted)",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
                    <span style={{minWidth:80}}>{h.date}</span>
                    <span style={{flex:1}}>{h.projName}</span>
                    <span>{h.timeIn&&h.timeOut?`${h.timeIn}–${h.timeOut}`:""}</span>
                    <span style={{color:"var(--text)",fontWeight:700}}>{h.hours.toFixed(1)}h</span>
                    <span style={{opacity:.6}}>{h.note}</span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}

      {tab==="projects"&&(
        <div>
          <button className="btn-green btn-sm" style={{marginBottom:14}} onClick={()=>{
            const rows=[["מספר","שם","לקוח","מפיקה","סטטוס","התקדמות","הקרנה","דד-ליין","הערות"]];
            projects.filter(p=>p.status!=="cancelled").forEach(p=>rows.push([p.projectNumber||"",p.name,p.client,p.producer,STATUS_CFG[p.status]?.label||"",p.progress+"%",p.onlineScreening||"",p.deliveryDate||"",p.statusNote||""]));
            dlCSV(rows,`סטטוס_פרויקטים_${todayStr()}.csv`);
          }}>📤 יצוא CSV</button>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:"2px solid var(--border)"}}>
                {["#","שם","לקוח","מפיקה","סטטוס","התקדמות","הקרנה","הערות"].map(h=>(
                  <th key={h} style={{textAlign:"right",padding:"8px 6px",color:"var(--muted)",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {projects.filter(p=>p.status!=="cancelled").map(p=>(
                  <tr key={p.id} style={{borderBottom:"1px solid var(--border)"}}>
                    <td style={{padding:"8px 6px",fontWeight:700,color:"var(--gold)"}}>{p.projectNumber||"—"}</td>
                    <td style={{padding:"8px 6px",fontWeight:700}}>{p.name}</td>
                    <td style={{padding:"8px 6px",color:"var(--muted)"}}>{p.client}</td>
                    <td style={{padding:"8px 6px",color:"var(--green)"}}>{p.producer}</td>
                    <td style={{padding:"8px 6px"}}><StatusBadge s={p.status}/></td>
                    <td style={{padding:"8px 6px"}}>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <div style={{width:50}}><PBar v={p.progress}/></div>
                        <span style={{color:"var(--gold)"}}>{p.progress}%</span>
                      </div>
                    </td>
                    <td style={{padding:"8px 6px",color:"var(--red)"}}>{p.onlineScreening||"—"}</td>
                    <td style={{padding:"8px 6px",color:"var(--muted)",maxWidth:160}}>{p.statusNote||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==="quotes"&&(
        <div>
          {projects.flatMap(p=>(p.quotes||[]).map(q=>({...q,projName:p.name}))).length===0
            ?<div style={{color:"var(--muted)",padding:32,textAlign:"center"}}>אין הצעות מחיר</div>
            :projects.flatMap(p=>(p.quotes||[]).map(q=>({...q,projName:p.name}))).map(q=>(
              <div key={q.id} className="card2" style={{marginBottom:10,borderRight:`3px solid ${q.approved?"var(--green)":"var(--border2)"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontWeight:700}}>{q.projName} · {q.client}</div>
                    <div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>{q.date} · {q.template}</div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{fontWeight:800,color:"var(--gold)",fontSize:18}}>{fmtMoney(q.total)}</div>
                    {q.approved&&<span className="tag" style={{color:"var(--green)",background:"var(--green)20"}}>✅ אושרה</span>}
                  </div>
                </div>
              </div>
            ))
          }
        </div>
      )}

      {tab==="monthly"&&(
        <div>
          {projects.filter(p=>{const d=p.onlineScreening||p.deliveryDate||"";return d.startsWith(month);}).map(p=>(
            <div key={p.id} className="card" style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontWeight:800,fontSize:15}}>{p.name}</div>
                  <div style={{fontSize:12,color:"var(--muted)"}}>{p.client}</div>
                </div>
                <StatusBadge s={p.status}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10}}>
                {[
                  {l:"התקדמות",v:`${p.progress}%`,c:"var(--gold)"},
                  {l:"משימות",v:`${(p.tasks||[]).filter(t=>t.done).length}/${(p.tasks||[]).length}`,c:"var(--blue)"},
                  {l:"שעות",v:`${(p.hours||[]).reduce((s,h)=>s+h.hours,0).toFixed(1)}h`,c:"var(--green)"},
                  {l:"הקרנה",v:p.onlineScreening||"—",c:"var(--red)"},
                ].map(x=>(
                  <div key={x.l} className="card2" style={{padding:"10px 12px"}}>
                    <div style={{fontSize:10,color:"var(--muted)",marginBottom:3}}>{x.l}</div>
                    <div style={{fontWeight:800,color:x.c,fontSize:14}}>{x.v}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// QUOTE BUILDER
// ═══════════════════════════════════════════════════════════
function QuoteBuilder({projects,users,quoteTemplates,onSave,onUpdateTemplates,onAddProject}){
  const [step,setStep]=useState(1);
  const [projId,setProjId]=useState("");
  const [template,setTemplate]=useState(null);
  const [lines,setLines]=useState([]);
  const [clientName,setClientName]=useState("");
  const [note,setNote]=useState("");
  const [editingTemplate,setEditingTemplate]=useState(null);

  const loadTemplate=tid=>{
    const t=(quoteTemplates||QUOTE_TEMPLATES).find(t=>t.id===tid);if(!t)return;
    setTemplate(t);setLines(t.lines.map(l=>({...l,id:uid()})));setStep(2);
  };
  const total=lines.reduce((s,l)=>s+(l.qty*l.price),0);
  const updLine=(id,k,v)=>setLines(ls=>ls.map(l=>l.id===id?{...l,[k]:k==="qty"||k==="price"?+v||0:v}:l));
  const addLine=()=>setLines(ls=>[...ls,{id:uid(),desc:"",qty:1,unit:"פרויקט",price:0}]);

  const save=()=>{
    if(!projId)return;
    const q={id:uid(),date:todayStr(),client:clientName,lines,total,note,template:template?.name||"מותאם",approved:false};
    onSave(projId,q);setStep(1);setLines([]);setProjId("");setClientName("");setNote("");
  };

  const print=()=>{
    const w=window.open("","_blank");
    w.document.write(`<html dir="rtl"><head><meta charset="utf-8"><title>הצעת מחיר</title>
    <style>body{font-family:Arial,sans-serif;padding:40px;direction:rtl}table{width:100%;border-collapse:collapse;margin:20px 0}th,td{border:1px solid #ddd;padding:10px;text-align:right}th{background:#f9f9f9}tfoot td{font-weight:bold}h1{color:#e8c547}</style></head><body>
    <h1>הצעת מחיר — PostFlow</h1>
    <p><b>לקוח:</b> ${clientName}</p><p><b>תאריך:</b> ${todayStr()}</p>
    <table><thead><tr><th>תיאור</th><th>כמות</th><th>יחידה</th><th>מחיר</th><th>סה"כ</th></tr></thead><tbody>
    ${lines.map(l=>`<tr><td>${l.desc}</td><td>${l.qty}</td><td>${l.unit}</td><td>₪${Number(l.price).toLocaleString()}</td><td>₪${(l.qty*l.price).toLocaleString()}</td></tr>`).join("")}
    </tbody><tfoot><tr><td colspan="4">סה"כ</td><td>₪${total.toLocaleString()}</td></tr></tfoot></table>
    ${note?`<p><b>הערות:</b> ${note}</p>`:""}
    </body></html>`);
    w.document.close();w.print();
  };

  return(

            <div className="card2" style={{cursor:"pointer",borderStyle:"dashed",transition:"border-color .2s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--gold)"}

              onClick={()=>{setTemplate(null);setLines([{id:uid(),desc:"",qty:1,unit:"פרויקט",price:0}]);setStep(2);}}>

              <div style={{fontWeight:700,fontSize:13,color:"var(--muted2)",marginBottom:10}}>הצעות שמורות</div>
              {projects.flatMap(p=>(p.quotes||[]).map(q=>({...q,projName:p.name,projId:p.id}))).map(q=>(

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>

                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <div style={{fontWeight:800,color:"var(--gold)",fontSize:16}}>{fmtMoney(q.total)}</div>
                      {!q.approved&&<button className="btn-green btn-sm" onClick={()=>{
                        const proj=projects.find(p=>p.id===q.projId);
                        if(proj)onSave(q.projId,{...q,approved:true},true);
                      }}>✓ אשר</button>}
                      {q.approved&&<span className="tag" style={{color:"var(--green)",background:"var(--green)20"}}>✅ אושרה</span>}

          <div style={{marginBottom:14}}><Lbl>שם לקוח</Lbl><input value={clientName} onChange={e=>setClientName(e.target.value)} placeholder="שם לקוח..."/></div>

                    <td style={{padding:"5px 3px",fontWeight:700,color:"var(--gold)"}}>{fmtMoney(l.qty*l.price)}</td>
                    <td style={{padding:"5px 3px"}}><button className="btn-red" onClick={()=>setLines(ls=>ls.filter(x=>x.id!==l.id))}>✕</button></td>

          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// PASSWORD VAULT
// ═══════════════════════════════════════════════════════════
function PasswordVault({passwords,onUpdate,currentUser}){
  const VAULT_PASS_LOCAL="pf_vault_unlocked";
  const savedVaultPass=localStorage.getItem(VAULT_PASS_KEY)||"";
  const [unlocked,setUnlocked]=useState(()=>sessionStorage.getItem(VAULT_PASS_LOCAL)==="1");
  const [vpass,setVpass]=useState("");
  const [setNewPass,setSetNewPass]=useState(!savedVaultPass);
  const [vpassConf,setVpassConf]=useState("");
  const [vErr,setVErr]=useState("");
  const [search,setSearch]=useState("");
  const [showPw,setShowPw]=useState({});
  const [copied,setCopied]=useState(null);
  const [form,setForm]=useState({service:"",username:"",password:"",description:"",category:"כללי",url:""});
  const isAdmin=currentUser.role==="admin";

  const unlock=()=>{
    if(setNewPass){
      if(vpass.length<4){setVErr("סיסמה חייבת להיות לפחות 4 תווים");return;}
      if(vpass!==vpassConf){setVErr("הסיסמאות אינן תואמות");return;}
      localStorage.setItem(VAULT_PASS_KEY,vpass);
      sessionStorage.setItem(VAULT_PASS_LOCAL,"1");
      setUnlocked(true);setSetNewPass(false);
    }else{
      if(vpass===savedVaultPass||currentUser.email===ADMIN_EMAIL){
        sessionStorage.setItem(VAULT_PASS_LOCAL,"1");setUnlocked(true);
      }else{setVErr("סיסמת כספת שגויה");}
    }
  };

  if(!unlocked)return(
    <div className="fade">
      <div className="section-title">🔐 כספת סיסמאות</div>
      <div style={{maxWidth:400}}>
        <div className="card">
          <div style={{textAlign:"center",fontSize:48,marginBottom:16}}>🔐</div>
          <div style={{fontWeight:700,marginBottom:14,textAlign:"center"}}>{setNewPass?"הגדר סיסמת כספת":"הכנס סיסמת כספת"}</div>
          <div style={{marginBottom:12}}><Lbl>סיסמת כספת</Lbl><input type="password" value={vpass} onChange={e=>setVpass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&unlock()}/></div>
          {setNewPass&&<div style={{marginBottom:12}}><Lbl>אימות סיסמה</Lbl><input type="password" value={vpassConf} onChange={e=>setVpassConf(e.target.value)}/></div>}
          {vErr&&<div style={{color:"var(--red)",fontSize:12,marginBottom:10}}>⚠ {vErr}</div>}
          <button className="btn-gold" style={{width:"100%"}} onClick={unlock}>{setNewPass?"הגדר ✓":"פתח כספת →"}</button>
        </div>
      </div>
    </div>
  );

  const cats=[...new Set(passwords.map(p=>p.category||"כללי"))];
  const filtered=passwords.filter(p=>
    !search||
    (p.service||"").toLowerCase().includes(search.toLowerCase())||
    (p.username||"").toLowerCase().includes(search.toLowerCase())||
    (p.category||"").toLowerCase().includes(search.toLowerCase())||
    (p.description||"").toLowerCase().includes(search.toLowerCase())||
    (p.url||"").toLowerCase().includes(search.toLowerCase())
  );
  const copyPw=(pw,id)=>{navigator.clipboard.writeText(pw).catch(()=>{});setCopied(id);setTimeout(()=>setCopied(null),2000);};
  const addEntry=()=>{if(!form.service)return;onUpdate([...passwords,{id:uid(),...form,createdAt:todayStr()}]);setForm({service:"",username:"",password:"",description:"",category:"כללי",url:""});};
  const remove=id=>{if(isAdmin)onUpdate(passwords.filter(p=>p.id!==id));};

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div className="section-title" style={{marginBottom:0}}>🔐 כספת סיסמאות</div>
        <button className="btn-ghost btn-sm" onClick={()=>{sessionStorage.removeItem(VAULT_PASS_LOCAL);setUnlocked(false);}}>🔒 נעל כספת</button>
      </div>

      <div className="search-wrap" style={{marginBottom:16,maxWidth:400}}>
        <span className="search-icon">🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש לפי שירות, קטגוריה, משתמש..."/>
      </div>

      {isAdmin&&(
        <div className="card" style={{marginBottom:20}}>
          <div style={{fontWeight:700,marginBottom:12}}>+ הוספת סיסמה</div>
          <div className="frow">
            <div className="fcol"><Lbl>שירות</Lbl><input placeholder="Frame.io, Adobe..." value={form.service} onChange={e=>setForm(p=>({...p,service:e.target.value}))}/></div>
            <div className="fcol"><Lbl>קטגוריה</Lbl><input placeholder="תוכנות, לקוחות..." value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}/></div>
          </div>
          <div className="frow">
            <div className="fcol"><Lbl>שם משתמש</Lbl><input value={form.username} onChange={e=>setForm(p=>({...p,username:e.target.value}))}/></div>
            <div className="fcol"><Lbl>סיסמה</Lbl><input value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))}/></div>
          </div>
          <div className="frow">
            <div className="fcol"><Lbl>URL</Lbl><input placeholder="https://..." value={form.url} onChange={e=>setForm(p=>({...p,url:e.target.value}))}/></div>
            <div className="fcol"><Lbl>תיאור</Lbl><input value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/></div>
          </div>
          <button className="btn-gold btn-sm" onClick={addEntry}>+ הוסף</button>
        </div>
      )}

      {cats.map(cat=>{
        const items=filtered.filter(p=>(p.category||"כללי")===cat);
        if(!items.length)return null;
        return(
          <div key={cat} style={{marginBottom:22}}>
            <div style={{fontWeight:700,fontSize:13,color:"var(--muted2)",marginBottom:10,paddingBottom:6,borderBottom:"1px solid var(--border)"}}>📂 {cat}</div>
            {items.map(pw=>(
              <div key={pw.id} style={{padding:"12px 0",borderBottom:"1px solid var(--border)22",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                <div style={{flex:1,minWidth:140}}>
                  <div style={{fontWeight:700,fontSize:13}}>{pw.service}</div>
                  {pw.description&&<div style={{fontSize:11,color:"var(--muted)"}}>{pw.description}</div>}
                  {pw.url&&<a href={pw.url} target="_blank" rel="noreferrer" style={{fontSize:11,color:"var(--blue)"}}>{pw.url}</a>}
                </div>
                <div style={{fontSize:12,color:"var(--muted2)",minWidth:120}}>{pw.username}</div>
                <div style={{fontFamily:"monospace",fontSize:12,letterSpacing:1,minWidth:120}}>{showPw[pw.id]?pw.password:"••••••••••"}</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>setShowPw(p=>({...p,[pw.id]:!p[pw.id]}))} style={{background:"var(--border2)",border:"none",borderRadius:6,padding:"4px 8px",color:"var(--muted2)",cursor:"pointer",fontSize:14}}>{showPw[pw.id]?"🙈":"👁"}</button>
                  <button onClick={()=>copyPw(pw.password,pw.id)} style={{background:copied===pw.id?"var(--green)20":"var(--border2)",border:"none",borderRadius:6,padding:"4px 10px",color:copied===pw.id?"var(--green)":"var(--muted2)",cursor:"pointer",fontSize:12}}>{copied===pw.id?"✓":"📋"}</button>
                  {isAdmin&&<button className="btn-red" onClick={()=>remove(pw.id)}>✕</button>}
                </div>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// USER MANAGEMENT
// ═══════════════════════════════════════════════════════════
function UserMgmt({users,onUpdate,currentUser}){
  const [form,setForm]=useState({name:"",email:"",role:"worker",password:"",phone:"",active:"true"});
  const [editId,setEditId]=useState(null);
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const save=()=>{
    if(!form.name||!form.email)return;
    if(editId){
      onUpdate(users.map(u=>u.id===editId?{...u,...form}:u));setEditId(null);
    }else{
      onUpdate([...users,{id:uid(),...form}]);
    }
    setForm({name:"",email:"",role:"worker",password:"",phone:"",active:"true"});
  };
  const startEdit=u=>{setEditId(u.id);setForm({name:u.name,email:u.email,role:u.role,password:u.password||"",phone:u.phone||"",active:u.active||"true"});};
  const remove=id=>{if(id===currentUser.id)return;onUpdate(users.filter(u=>u.id!==id));};
  const resetPass=id=>onUpdate(users.map(u=>u.id===id?{...u,password:"1234"}:u));

  return(
    <div className="fade">
      <div className="section-title">👥 ניהול משתמשים</div>
      <div className="card" style={{marginBottom:20}}>
        <div style={{fontWeight:700,marginBottom:14}}>{editId?"עריכת משתמש":"+ הוספת משתמש"}</div>
        <div className="frow">
          <div className="fcol"><Lbl>שם מלא</Lbl><input value={form.name} onChange={f("name")}/></div>
          <div className="fcol"><Lbl>אימייל *</Lbl><input type="email" value={form.email} onChange={f("email")}/></div>
          <div className="fcol"><Lbl>טלפון</Lbl><input value={form.phone} onChange={f("phone")}/></div>
        </div>
        <div className="frow">
          <div className="fcol">
            <Lbl>תפקיד / הרשאה</Lbl>
            <select value={form.role} onChange={f("role")}>
              <option value="admin">מנהל — גישה מלאה</option>
              <option value="producer">מפיקה — ניהול פרויקט</option>
              <option value="worker">עובד — לוח + שעות</option>
            </select>
          </div>
          <div className="fcol"><Lbl>סיסמה</Lbl><input type="text" value={form.password} onChange={f("password")} placeholder="לפחות 4 תווים"/></div>
          <div className="fcol">
            <Lbl>פעיל</Lbl>
            <select value={form.active} onChange={f("active")}>
              <option value="true">פעיל</option>
              <option value="false">לא פעיל</option>
              <option value="admin">מנהל</option>
              <option value="producer">מפיקה</option>
              <option value="worker">עובד</option>
            </select>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn-gold btn-sm" onClick={save}>{editId?"💾 שמור שינויים":"+ הוסף"}</button>
          {editId&&<button className="btn-ghost btn-sm" onClick={()=>{setEditId(null);setForm({name:"",email:"",role:"worker",password:"",phone:"",active:"true"});}}>ביטול</button>}
        </div>
      </div>

      <div style={{display:"grid",gap:10}}>
        {users.map(u=>(
          <div key={u.id} className="card2" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <Avatar name={u.name} idx={users.indexOf(u)} size={36}/>
              <div>
                <div style={{fontWeight:700}}>{u.name}</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>{u.email}{u.phone?` · ${u.phone}`:""}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <RoleBadge role={u.role}/>
              {u.id!==currentUser.id&&(
                <>
                  <button className="btn-blue btn-sm" onClick={()=>startEdit(u)}>✏️ ערוך</button>
                  <button className="btn-ghost btn-sm" onClick={()=>resetPass(u.id)}>🔑 אפס סיסמה</button>
                  <button className="btn-red" onClick={()=>remove(u.id)}>הסר</button>
                </>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// GOOGLE SHEETS SETTINGS
// ═══════════════════════════════════════════════════════════
function SheetsSettings({projects,passwords,users,onProjectsLoaded,onPasswordsLoaded,onStaffLoaded,onHoursReportLoaded,onProjectHoursLoaded}){
  const [url,setUrl]=useState(getSheetsUrl);
  const [status,setStatus]=useState("idle");
  const [msg,setMsg]=useState("");
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(()=>localStorage.getItem("pf_v6_last_sync")||"");

  const save=()=>{setSheetsUrl(url.trim());setMsg("✅ URL נשמר");};

  const test=async()=>{
    setStatus("testing");setMsg("בודק חיבור...");
    try{
      const res=await fetch(`${url.trim()}?action=ping`);
      const d=await res.json();
      setStatus(d.ok?"ok":"error");setMsg(d.ok?"✅ החיבור תקין!":"❌ שגיאה: "+d.error);
    }catch(e){setStatus("error");setMsg("❌ לא ניתן להתחבר: "+e.message);}
  };

  const pull=async()=>{
    setSyncing(true);setMsg("מושך נתונים...");
    try{
      const u=getSheetsUrl();
      const [projs,pws,staff,hoursRep,projHrs]=await Promise.all([
        sheetsCall(u,{action:"getAll",sheet:"projects"}),
        sheetsCall(u,{action:"getAll",sheet:"passwords"}),
        sheetsCall(u,{action:"getAll",sheet:"staff"}),
        sheetsCall(u,{action:"getAll",sheet:"hours_report"}),
        sheetsCall(u,{action:"getAll",sheet:"project_hours"}),
      ]);
      if(projs){onProjectsLoaded(projs.map(mapProjectRow));}
      if(pws){onPasswordsLoaded(pws.map(mapPasswordRow));}
      if(staff){onStaffLoaded(staff.map(mapStaffRow));}
      if(hoursRep){onHoursReportLoaded(hoursRep.map(mapHoursReportRow));}
      if(projHrs){onProjectHoursLoaded(projHrs.map(mapProjectHoursRow));}
      const now=new Date().toLocaleString("he-IL");
      setLastSync(now);localStorage.setItem("pf_v6_last_sync",now);
      setMsg(`✅ נמשכו ${projs?.length||0} פרויקטים · ${pws?.length||0} סיסמאות · ${staff?.length||0} עובדים · ${hoursRep?.length||0} נוכחות · ${projHrs?.length||0} שעות פרויקט`);
    }catch(e){setMsg("❌ שגיאה: "+e.message);}
    setSyncing(false);
  };

  const push=async()=>{
    setSyncing(true);setMsg("שולח נתונים...");
    try{
      const u=getSheetsUrl();
      // project_hours — בנה מתוך כל הפרויקטים
      const projHoursRows=[];
      projects.forEach(p=>(p.hours||[]).forEach(h=>{
        const wn=users.find(u=>u.id===h.worker)?.name||h.worker;
        projHoursRows.push({id:h.id,workerName:wn,date:h.date,projectName:p.name,hours:h.hours,note:h.note||""});
      }));
      // hours_report — כל הנוכחות הכללית
      const hoursRepRows=[];
      projects.forEach(p=>(p.hours||[]).forEach(h=>{
        const wn=users.find(u=>u.id===h.worker)?.name||h.worker;
        hoursRepRows.push({id:h.id,workerName:wn,date:h.date,timeIn:h.timeIn||"",timeOut:h.timeOut||"",totalHours:h.hours,note:h.note||""});
      }));
      await Promise.all([
        sheetsPost(u,{action:"batchUpdate",sheet:"projects",rows:projects}),
        sheetsPost(u,{action:"batchUpdate",sheet:"passwords",rows:passwords}),
        sheetsPost(u,{action:"batchUpdate",sheet:"staff",rows:users}),
        sheetsPost(u,{action:"batchUpdate",sheet:"hours_report",rows:hoursRepRows}),
        sheetsPost(u,{action:"batchUpdate",sheet:"project_hours",rows:projHoursRows}),
      ]);
      const now=new Date().toLocaleString("he-IL");
      setLastSync(now);localStorage.setItem("pf_v6_last_sync",now);
      setMsg("✅ כל הנתונים עודכנו ב-Sheets (כולל שעות)");
    }catch(e){setMsg("❌ שגיאה: "+e.message);}
    setSyncing(false);
  };

  return(
    <div className="fade">
      <div className="section-title">☁️ Google Sheets Sync</div>

      <div className="card2" style={{marginBottom:16,borderRight:`3px solid ${status==="ok"?"var(--green)":status==="error"?"var(--red)":"var(--border2)"}`}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>

// ═══════════════════════════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════════════════════════
function BackupPanel({users,projects,passwords,onRestore}){
  const [confirm,setConfirm]=useState(false);
  const [restoreData,setRestoreData]=useState(null);
  const [err,setErr]=useState("");

  const exportFull=()=>dlJSON({users,projects,passwords},`postflow_backup_${todayStr()}.json`);
  const exportProj=()=>dlJSON({projects},`postflow_projects_${todayStr()}.json`);
  const exportHours=()=>{
    const rows=[["עובד","פרויקט","תאריך","כניסה","יציאה","שעות","הערה"]];
    projects.forEach(p=>(p.hours||[]).forEach(h=>{
      const u=users.find(u=>u.id===h.worker);
      rows.push([u?.name||h.worker,p.name,h.date,h.timeIn||"",h.timeOut||"",h.hours.toFixed(1),h.note||""]);
    }));
    dlCSV(rows,`שעות_${todayStr()}.csv`);
  };

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);if(d.projects||d.users){setRestoreData(d);setConfirm(true);}else setErr("קובץ לא תקין");}
      catch{setErr("שגיאה בקריאת הקובץ");}
    };
    reader.readAsText(file);
  };

  return(
    <div className="fade">
      <div className="section-title">💾 גיבוי ושחזור</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:20}}>
        {[
          {icon:"🗄️",label:"גיבוי מלא (JSON)",desc:"משתמשים + פרויקטים + סיסמאות",action:exportFull,color:"var(--blue)"},
          {icon:"🎬",label:"פרויקטים בלבד",desc:"JSON של כל הפרויקטים",action:exportProj,color:"var(--gold)"},
          {icon:"⏱",label:"שעות עבודה",desc:"CSV של כל דיווחי השעות",action:exportHours,color:"var(--green)"},
        ].map(b=>(
          <div key={b.label} className="card" style={{textAlign:"center",cursor:"pointer",transition:"border-color .2s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=b.color}
            onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}
            onClick={b.action}>
            <div style={{fontSize:32,marginBottom:8}}>{b.icon}</div>
            <div style={{fontWeight:700,marginBottom:4}}>{b.label}</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>{b.desc}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div style={{fontWeight:700,marginBottom:12}}>📥 שחזור מקובץ JSON</div>
        {err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:10}}>{err}</div>}
        <label className="btn-ghost" style={{cursor:"pointer",display:"inline-block"}}>
          📁 בחר קובץ JSON
          <input type="file" accept=".json" style={{display:"none"}} onChange={handleFile}/>
        </label>
      </div>

      {confirm&&restoreData&&(
        <div className="modal-bg" onClick={()=>setConfirm(false)}>
          <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:18,marginBottom:14}}>⚠️ אישור שחזור</div>
            <div style={{fontSize:13,color:"var(--muted2)",marginBottom:20}}>
              נמצאו: {restoreData.projects?.length||0} פרויקטים · {restoreData.users?.length||0} משתמשים · {restoreData.passwords?.length||0} סיסמאות<br/><br/>
              <b style={{color:"var(--red)"}}>פעולה זו תחליף את כל הנתונים הקיימים!</b>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn-gold" onClick={()=>{onRestore(restoreData);setConfirm(false);}}>✓ אשר שחזור</button>
              <button className="btn-ghost" onClick={()=>setConfirm(false)}>ביטול</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Settings({quoteTemplates,onUpdateTemplates,shiftTypes,onUpdateShiftTypes}){
  const [tab,setTab]=useState("shifts");
  const [qt,setQt]=useState(quoteTemplates||QUOTE_TEMPLATES);
  const [selectedTpl,setSelectedTpl]=useState(null);

  const updShift=(id,k,v)=>onUpdateShiftTypes(shiftTypes.map(t=>t.id===id?{...t,[k]:v}:t));
  const addShift=()=>onUpdateShiftTypes([...shiftTypes,{id:uid(),label:"חדש",color:"#94a3b8"}]);
  const removeShift=id=>onUpdateShiftTypes(shiftTypes.filter(t=>t.id!==id));

  const updTplLine=(tid,lid,k,v)=>setQt(ts=>ts.map(t=>t.id===tid?{...t,lines:t.lines.map(l=>l.id===lid?{...l,[k]:k==="qty"||k==="price"?+v||0:v}:l)}:t));
  const removeTplLine=(tid,lid)=>setQt(ts=>ts.map(t=>t.id===tid?{...t,lines:t.lines.filter(l=>l.id!==lid)}:t));
  const addTplLine=tid=>setQt(ts=>ts.map(t=>t.id===tid?{...t,lines:[...t.lines,{id:uid(),desc:"",qty:1,unit:"פרויקט",price:0}]}:t));

      <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"1px solid var(--border)"}}>
        {[{id:"shifts",l:"🎬 סוגי משמרות"},{id:"templates",l:"📝 תבניות הצעות"}].map(t=>(
          <button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>

      {tab==="shifts"&&(
        <div>
          <div style={{fontWeight:700,marginBottom:14}}>עריכת סוגי משמרות / פעילויות</div>
